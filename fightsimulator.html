<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ ETERNAL KUNG FU EVOLUTION | SAVES ITSELF ⚡</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Orbitron', monospace;
            overflow: hidden;
        }

        #menu-corner {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 200;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .menu-btn {
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            border: 2px solid;
            border-radius: 14px;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover { transform: scale(1.08); filter: drop-shadow(0 0 8px currentColor); }
        .menu-btn.super { border-color: #ff0044; color: #ff0044; }
        .menu-btn.taunt { border-color: #ffaa00; color: #ffaa00; }
        .menu-btn.slowmo { border-color: #00ffff; color: #00ffff; }
        .menu-btn.camera { border-color: #ff44ff; color: #ff44ff; }
        .menu-btn.reset { border-color: #00ffaa; color: #00ffaa; }
        .menu-btn.evolve { border-color: #ffaa44; color: #ffaa44; }

        #hp-corner {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 200;
            width: 180px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .hp-mini {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 20px;
            border-left: 4px solid;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
        }
        .hp-mini.p1 { border-color: #ff3366; }
        .hp-mini.p2 { border-color: #33ff66; }
        .hp-name { font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 5px; }
        .hp-bar-mini { height: 8px; background: #2a1a2a; border-radius: 10px; overflow: hidden; }
        .hp-fill-mini { height: 100%; width: 100%; transition: width 0.1s linear; border-radius: 10px; }
        .p1 .hp-fill-mini { background: linear-gradient(90deg, #ff3366, #ff8844); }
        .p2 .hp-fill-mini { background: linear-gradient(90deg, #33ff66, #22ccaa); }
        .rage-indicator { font-size: 0.6rem; color: #ff4444; font-weight: bold; margin-top: 4px; display: none; text-shadow: 0 0 4px red; }

        #round-timer {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 60px;
            border: 2px solid #ffaa44;
            color: #ffcc66;
            text-shadow: 0 0 8px #ff6600;
            letter-spacing: 4px;
            z-index: 250;
            pointer-events: none;
        }

        #arena-name {
            position: fixed;
            bottom: 90px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: monospace;
            color: #ffaa66;
            border-left: 3px solid gold;
            pointer-events: none;
            z-index: 200;
        }

        #evolution-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            z-index: 250;
            border: 1px solid rgba(255,215,0,0.6);
            font-family: 'Orbitron', monospace;
            pointer-events: auto;
        }
        .evo-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .fighter-evo {
            background: #111;
            padding: 6px 14px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            align-items: baseline;
            border: 1px solid #ffaa33;
        }
        .evo-label { font-size: 0.7rem; color: #ffaa66; }
        .evo-value { font-size: 1rem; font-weight: bold; color: #ffdd88; margin-right: 6px; }
        .evo-btn {
            background: #2a2a2a;
            border: none;
            color: gold;
            font-weight: bold;
            border-radius: 30px;
            padding: 2px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.1s;
        }
        .evo-btn:active { transform: scale(0.9); background: #ffaa33; color: black; }
        .code-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #reset-evo {
            background: #aa3333;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        #reset-evo:hover { background: #ff4444; }

        /* Effects */
        .commentary-box {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(0,0,0,0.95), #220011);
            border: 2px solid #ffd966;
            border-radius: 40px;
            padding: 12px 28px;
            font-family: 'Bangers', cursive;
            font-size: 1.3rem;
            color: #ffdf88;
            text-align: center;
            z-index: 210;
            white-space: nowrap;
            animation: popIn 0.25s cubic-bezier(0.34,1.2,0.8,1);
            pointer-events: none;
            text-shadow: 0 0 6px #ff6600;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: translateX(-50%) scale(0.6); }
            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }
        .impact-text {
            position: absolute;
            font-family: 'Bangers', cursive;
            font-size: 2.2rem;
            font-weight: bold;
            pointer-events: none;
            z-index: 300;
            animation: impactFly 0.8s forwards;
            text-shadow: 0 0 20px magenta;
        }
        @keyframes impactFly {
            0% { opacity: 1; transform: scale(0.2) translateY(0); }
            40% { transform: scale(1.4) translateY(-30px); opacity: 1; }
            100% { opacity: 0; transform: scale(1) translateY(-100px); }
        }
        .super-banner {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-family: 'Bangers', cursive;
            background: linear-gradient(45deg, #ff0044, #ffaa00, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            z-index: 500;
            animation: superFlash 1.2s forwards;
            white-space: nowrap;
            pointer-events: none;
        }
        @keyframes superFlash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        .slow-mo-badge {
            position: fixed;
            top: 20%;
            right: 20px;
            background: #0ff;
            color: black;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            z-index: 300;
            display: none;
            animation: pulse 0.8s infinite;
        }
        .winner-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, gold, #ff6600);
            padding: 35px 60px;
            border-radius: 70px;
            text-align: center;
            z-index: 600;
            display: none;
            box-shadow: 0 0 100px rgba(255,215,0,0.9);
            border: 4px solid white;
        }
        .combo-display {
            position: fixed;
            right: 35px;
            top: 45%;
            font-size: 2.2rem;
            font-family: 'Bangers';
            color: #ffcc22;
            text-shadow: 0 0 12px red;
            opacity: 0;
            transition: 0.1s;
            z-index: 220;
        }
        .combo-display.show { opacity: 1; animation: comboBump 0.3s ease; }
        @keyframes comboBump { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
        .tooltip { position: fixed; background: #000; border: 1px solid cyan; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; display: none; z-index: 1000; pointer-events: none; }
        .screen-flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 1000; mix-blend-mode: overlay; }
        @media (max-width: 800px) {
            .menu-btn { width: 42px; height: 42px; font-size: 1.3rem; }
            .commentary-box { font-size: 1rem; padding: 6px 16px; }
            #round-timer { font-size: 1.5rem; top: 12px; padding: 4px 18px; }
        }
    </style>
</head>
<body>
    <div id="menu-corner">
        <button class="menu-btn super" onclick="game.superMove()" title="SUPER MOVE">💥</button>
        <button class="menu-btn taunt" onclick="game.forceTaunt()" title="TAUNT">🗣️</button>
        <button class="menu-btn slowmo" onclick="game.toggleSlowMo()" title="SLOW MOTION">⏱️</button>
        <button class="menu-btn camera" onclick="game.toggleCamera()" title="EPIC CAM">📷</button>
        <button class="menu-btn reset" onclick="game.resetFight()" title="NEW FIGHT">🔄</button>
        <button class="menu-btn evolve" onclick="game.openEvolutionPanel()" title="EVOLVE & SAVE">🧬</button>
    </div>
    <div id="hp-corner">
        <div class="hp-mini p1"><div class="hp-name">🔴 CRIMSON</div><div class="hp-bar-mini"><div class="hp-fill-mini" id="p1-hp-fill"></div></div><div class="rage-indicator" id="p1-rage">⚡ RAGE MODE</div></div>
        <div class="hp-mini p2"><div class="hp-name">🟢 EMERALD</div><div class="hp-bar-mini"><div class="hp-fill-mini" id="p2-hp-fill"></div></div><div class="rage-indicator" id="p2-rage">⚡ RAGE MODE</div></div>
    </div>
    <div id="round-timer">10.0</div>
    <div id="arena-name">🏟️ ARENA: BRIDGE OF DOOM</div>
    <div id="evolution-panel">
        <div class="evo-stats">
            <div class="fighter-evo" id="evo-p1-panel"><span>🔴 CRIMSON</span><span class="evo-label">💪 DMG:</span><span class="evo-value" id="p1-dmg">1.0</span><button class="evo-btn" onclick="game.evolveStat('p1','damage')">+</button><span class="evo-label">❤️ HP:</span><span class="evo-value" id="p1-hp-mod">0</span><button class="evo-btn" onclick="game.evolveStat('p1','health')">+</button><span class="evo-label">🧠 WISDOM:</span><span class="evo-value" id="p1-skill">0.0</span></div>
            <div class="fighter-evo" id="evo-p2-panel"><span>🟢 EMERALD</span><span class="evo-label">💪 DMG:</span><span class="evo-value" id="p2-dmg">1.0</span><button class="evo-btn" onclick="game.evolveStat('p2','damage')">+</button><span class="evo-label">❤️ HP:</span><span class="evo-value" id="p2-hp-mod">0</span><button class="evo-btn" onclick="game.evolveStat('p2','health')">+</button><span class="evo-label">🧠 WISDOM:</span><span class="evo-value" id="p2-skill">0.0</span></div>
        </div>
        <div class="code-section">
            <button id="reset-evo" onclick="game.resetEvolution()">🔄 RESET EVOLUTION</button>
        </div>
        <div style="font-size:0.6rem; color:#aaa;">🏆 each win increases WISDOM → faster combos, better dodges, more crits</div>
    </div>
    <div class="slow-mo-badge" id="slowMoBadge">⏳ SLOW MOTION</div>
    <div class="combo-display" id="comboDisplay">🔥 COMBO!</div>
    <div class="winner-banner" id="winnerBanner"><div class="winner-text">🏆 VICTORY</div><div id="winnerName"></div></div>
    <div class="screen-flash" id="screenFlash"></div>
    <div class="tooltip" id="globalTooltip"></div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script>
        (function(){
            // ---------- 6 UNIQUE ARENAS ----------
            const ARENAS = [
                { name: "🌉 BRIDGE OF DOOM", bgColor: 0x2a2a2a, groundColor: 0x8b5a2b, fogColor: 0x331c0c, build: (scene) => {
                    const bridgeMat = new THREE.MeshStandardMaterial({ color: 0xbc9a6c });
                    const bridgePlank = new THREE.Mesh(new THREE.BoxGeometry(12, 0.3, 2.2), bridgeMat);
                    bridgePlank.position.set(0, -0.1, 0);
                    scene.add(bridgePlank);
                    return {};
                } },
                { name: "⭕ SACRED SUMO RING", bgColor: 0x4a2a1a, groundColor: 0xc99e6f, fogColor: 0x442200, build: (scene) => {
                    const ringMat = new THREE.MeshStandardMaterial({ color: 0xd4b48c });
                    const platform = new THREE.Mesh(new THREE.CylinderGeometry(4.5, 4.5, 0.2, 32), ringMat);
                    platform.position.set(0, -0.2, 0);
                    scene.add(platform);
                    return {};
                } },
                { name: "🕳️ PIT OF DESPAIR", bgColor: 0x1a1a2e, groundColor: 0x444455, fogColor: 0x111122, build: (scene) => {
                    const pitHole = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 2, 32), new THREE.MeshStandardMaterial({ color: 0x220000, emissive: 0x330000 }));
                    pitHole.position.set(0, -1.2, 0);
                    scene.add(pitHole);
                    return {};
                } },
                { name: "🏯 ROOFTOP GARDEN", bgColor: 0x2c5a3a, groundColor: 0x8fbc8f, fogColor: 0x1c3a2a, build: (scene) => {
                    const roofMat = new THREE.MeshStandardMaterial({ color: 0xa5d6a5 });
                    const roof = new THREE.Mesh(new THREE.BoxGeometry(10, 0.3, 10), roofMat);
                    roof.position.set(0, -0.1, 0);
                    scene.add(roof);
                    return {};
                } },
                { name: "⛓️ STEEL CAGE", bgColor: 0x332222, groundColor: 0x886666, fogColor: 0x221111, build: (scene) => {
                    const cageMat = new THREE.MeshStandardMaterial({ color: 0xccaa88, metalness: 0.8 });
                    for (let i = -5; i <= 5; i+=2) {
                        const post = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, 0.2), cageMat);
                        post.position.set(i, 1.2, -5);
                        scene.add(post);
                        const post2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 3, 0.2), cageMat);
                        post2.position.set(i, 1.2, 5);
                        scene.add(post2);
                    }
                    return {};
                } },
                { name: "⚡ THUNDERDOME", bgColor: 0x112244, groundColor: 0x4488aa, fogColor: 0x001133, build: (scene) => {
                    const domeMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, wireframe: true });
                    const dome = new THREE.Mesh(new THREE.SphereGeometry(7, 32, 16), domeMat);
                    dome.scale.set(1, 0.5, 1);
                    dome.position.set(0, 1, 0);
                    scene.add(dome);
                    return {};
                } }
            ];

            // Global persistent data (saved to localStorage)
            let evolution = {
                p1: { damageBonus: 1.0, healthBonus: 0, skill: 0.0, wins: 0 },
                p2: { damageBonus: 1.0, healthBonus: 0, skill: 0.0, wins: 0 },
                arenaIndex: 0,
                version: 4
            };

            // Load from localStorage
            function loadEvolution() {
                try {
                    const saved = localStorage.getItem('kungfu_eternal');
                    if (saved) {
                        const data = JSON.parse(saved);
                        if (data.version === 4 && data.p1 && data.p2) {
                            evolution = data;
                            console.log("Loaded evolution:", evolution);
                        }
                    }
                } catch(e) { console.warn(e); }
                // ensure skill between 0-1
                evolution.p1.skill = Math.min(1.0, Math.max(0, evolution.p1.skill));
                evolution.p2.skill = Math.min(1.0, Math.max(0, evolution.p2.skill));
            }
            function saveEvolution() {
                try {
                    localStorage.setItem('kungfu_eternal', JSON.stringify(evolution));
                } catch(e) {}
            }

            // Update winner's skill based on win
            function awardWin(winnerIsP1) {
                const winner = winnerIsP1 ? evolution.p1 : evolution.p2;
                winner.wins++;
                // Skill increases: each win gives +0.02, capped at 1.0
                winner.skill = Math.min(1.0, winner.skill + 0.02);
                // Also increase damage and health slowly with wins (every 5 wins)
                if (winner.wins % 5 === 0 && winner.wins > 0) {
                    winner.damageBonus = Math.min(2.5, winner.damageBonus + 0.05);
                    winner.healthBonus = Math.min(80, winner.healthBonus + 5);
                }
                saveEvolution();
                game.updateEvoUI();
            }

            // Reset all evolution data
            function resetEvolution() {
                evolution = {
                    p1: { damageBonus: 1.0, healthBonus: 0, skill: 0.0, wins: 0 },
                    p2: { damageBonus: 1.0, healthBonus: 0, skill: 0.0, wins: 0 },
                    arenaIndex: 0,
                    version: 4
                };
                saveEvolution();
                game.updateEvoUI();
                game.resetFight(true);
                showCommentary("🔥 EVOLUTION RESET! THE GURUS START ANEW 🔥");
            }

            // ---------- Three.js & Physics Setup ----------
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.025);
            const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 50);
            camera.position.set(0, 3.5, 11);
            const renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0x444444);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xffeedd, 1.0);
            mainLight.position.set(4, 8, 3);
            mainLight.castShadow = true;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0x6688ff, 0.6);
            fillLight.position.set(-2, 3, 4);
            scene.add(fillLight);
            const rimLight = new THREE.PointLight(0xff88aa, 0.7);
            rimLight.position.set(0, 3, -4);
            scene.add(rimLight);

            // Physics world
            const world = new CANNON.World();
            world.gravity.set(0, -18, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            const groundPhys = new CANNON.Body({mass:0});
            groundPhys.addShape(new CANNON.Plane());
            groundPhys.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
            world.addBody(groundPhys);

            // Game state
            let p1, p2;
            let matchActive = true;
            let slowMo = false, epicCamera = false, timeScale = 1;
            let particles = [];
            let roundTimer = 10.0;
            let roundInterval = null;
            let roundEnded = false;
            let currentArenaIndex = evolution.arenaIndex;

            // Helper functions (particles, commentary, etc.)
            function showCommentary(text) { const old = document.querySelector('.commentary-box'); if(old) old.remove(); const div = document.createElement('div'); div.className='commentary-box'; div.innerText=text; document.body.appendChild(div); setTimeout(()=>div.remove(),2000);}
            function showImpactText(msg, worldPos) {
                const vector = worldPos.clone().project(camera);
                const x = (vector.x*0.5+0.5)*window.innerWidth;
                const y = (-(vector.y*0.5)+0.5)*window.innerHeight;
                const el = document.createElement('div'); el.className='impact-text'; el.innerText=msg; el.style.left=x+'px'; el.style.top=y+'px'; el.style.color='#ffaa44'; document.body.appendChild(el); setTimeout(()=>el.remove(),700);
            }
            function createParticle(pos, color, vel) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.08,4,4), new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.5}));
                mesh.position.copy(pos); scene.add(mesh);
                particles.push({mesh, velocity: vel || new THREE.Vector3((Math.random()-0.5)*0.6, Math.random()*0.8, (Math.random()-0.5)*0.6), life:1});
            }
            function updateParticles() { for(let i=particles.length-1;i>=0;i--) { let p=particles[i]; p.life-=0.025; p.mesh.position.add(p.velocity); p.velocity.y-=0.02; p.mesh.material.emissiveIntensity = p.life*0.8; if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); } } }
            function showCombo(cnt) { const d=document.getElementById('comboDisplay'); d.innerHTML=`🔥 ${cnt} HIT COMBO! 🔥`; d.classList.add('show'); setTimeout(()=>d.classList.remove('show'),1200);}
            
            function buildArena(index) {
                if(window._currentArenaMeshes) window._currentArenaMeshes.forEach(m => scene.remove(m));
                window._currentArenaMeshes = [];
                const arena = ARENAS[index % ARENAS.length];
                scene.background.setHex(arena.bgColor);
                if (scene.fog) scene.fog.color.setHex(arena.fogColor);
                else scene.fog = new THREE.FogExp2(arena.fogColor, 0.025);
                document.getElementById('arena-name').innerHTML = `🏟️ ${arena.name}`;
                arena.build(scene);
                const baseGround = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: arena.groundColor, roughness: 0.7 }));
                baseGround.rotation.x = -Math.PI/2;
                baseGround.position.y = -0.5;
                baseGround.receiveShadow = true;
                scene.add(baseGround);
                window._currentArenaMeshes = [baseGround];
            }
            
            function applyArenaConstraints(fighterPos) {
                const arenaName = ARENAS[currentArenaIndex % ARENAS.length].name;
                const x = fighterPos.x, z = fighterPos.z;
                if (arenaName.includes("BRIDGE")) {
                    if (Math.abs(z) > 1.5 || Math.abs(x) > 6) return true;
                } else if (arenaName.includes("PIT")) {
                    if (Math.hypot(x, z) < 3.2 && fighterPos.y < -0.2) return true;
                }
                return false;
            }
            
            function endRoundByTimer() {
                if(roundEnded || !matchActive) return;
                roundEnded = true;
                if(roundInterval) clearInterval(roundInterval);
                let winner = null;
                if(p1.hp <= 0 && p2.hp <= 0) winner = null;
                else if(p1.hp <= 0) winner = p2;
                else if(p2.hp <= 0) winner = p1;
                else winner = (p1.hp > p2.hp) ? p1 : p2;
                if(winner) {
                    awardWin(winner.isP1);
                    showWinner(winner.name);
                    showCommentary(`⏰ TIME'S UP! ${winner.name} WINS! WISDOM +0.02`);
                } else {
                    showCommentary("⏰ DOUBLE K.O.! NO EVOLUTION");
                }
                matchActive = false;
                setTimeout(() => { game.nextArenaAndReset(); }, 3500);
            }
            
            function startRoundTimer() {
                if(roundInterval) clearInterval(roundInterval);
                roundTimer = 10.0;
                roundEnded = false;
                document.getElementById('round-timer').innerText = roundTimer.toFixed(1);
                roundInterval = setInterval(() => {
                    if(!matchActive) return;
                    roundTimer -= 0.1;
                    if(roundTimer <= 0) {
                        roundTimer = 0;
                        document.getElementById('round-timer').innerText = "0.0";
                        clearInterval(roundInterval);
                        endRoundByTimer();
                    } else {
                        document.getElementById('round-timer').innerText = roundTimer.toFixed(1);
                    }
                }, 100);
            }
            
            function showWinner(name) {
                const banner=document.getElementById('winnerBanner');
                document.getElementById('winnerName').innerText=name;
                banner.style.display='block';
                for(let i=0;i<60;i++) createParticle(new THREE.Vector3((Math.random()-0.5)*12,4,(Math.random()-0.5)*12), 0xffaa44, new THREE.Vector3((Math.random()-0.5)*2, Math.random()*2, (Math.random()-0.5)*2));
                setTimeout(()=>{banner.style.display='none';}, 2800);
            }
            
            // ========== MARTIAL ARTIST WITH SKILL-BASED AI ==========
            function createMartialArtist(x, colorHex, name, isP1) {
                const group = new THREE.Group();
                const material = new THREE.MeshStandardMaterial({color: colorHex, roughness: 0.3, metalness: 0.5, emissive: colorHex, emissiveIntensity: 0.1});
                const jointMat = new THREE.MeshStandardMaterial({color: 0xccaa77, metalness: 0.7});
                const rageMat = new THREE.MeshStandardMaterial({color: 0xff3333, emissive: 0xff2222, emissiveIntensity: 0.7});
                function addPart(w,h,d,mass, px,py,pz, mat) {
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
                    mesh.position.set(px,py,pz); mesh.castShadow=true; mesh.receiveShadow=true; group.add(mesh);
                    const body = new CANNON.Body({mass: mass, material: new CANNON.Material()});
                    body.addShape(new CANNON.Box(new CANNON.Vec3(w/2,h/2,d/2)));
                    body.position.set(x+px, py, pz);
                    body.linearDamping=0.3; body.angularDamping=0.2;
                    world.addBody(body);
                    return {mesh, body};
                }
                const pelvis = addPart(0.52,0.28,0.38,12, 0,0.95,0, material);
                const stomach = addPart(0.48,0.42,0.32,10, 0,1.38,0, material);
                const chest = addPart(0.58,0.52,0.38,14, 0,1.88,0, material);
                const head = addPart(0.28,0.32,0.28,5, 0,2.45,0, material);
                const lShoulder = addPart(0.2,0.2,0.2,2, -0.48,2.0,0, jointMat);
                const lUpper = addPart(0.19,0.48,0.19,3.5, -0.68,1.78,0, material);
                const lElbow = addPart(0.17,0.17,0.17,1.5, -0.68,1.44,0, jointMat);
                const lFore = addPart(0.16,0.42,0.16,2.5, -0.68,1.08,0, material);
                const lHand = addPart(0.18,0.22,0.12,1, -0.68,0.75,0, material);
                const rShoulder = addPart(0.2,0.2,0.2,2, 0.48,2.0,0, jointMat);
                const rUpper = addPart(0.19,0.48,0.19,3.5, 0.68,1.78,0, material);
                const rElbow = addPart(0.17,0.17,0.17,1.5, 0.68,1.44,0, jointMat);
                const rFore = addPart(0.16,0.42,0.16,2.5, 0.68,1.08,0, material);
                const rHand = addPart(0.18,0.22,0.12,1, 0.68,0.75,0, material);
                const lHip = addPart(0.19,0.19,0.19,1.8, -0.24,0.72,0, jointMat);
                const lThigh = addPart(0.23,0.58,0.23,6, -0.27,0.38,0, material);
                const lKnee = addPart(0.18,0.18,0.18,1.5, -0.27,0.02,0, jointMat);
                const lShin = addPart(0.21,0.52,0.21,4.5, -0.27,-0.46,0, material);
                const lFoot = addPart(0.24,0.12,0.38,1.8, -0.27,-0.86,0.06, material);
                const rHip = addPart(0.19,0.19,0.19,1.8, 0.24,0.72,0, jointMat);
                const rThigh = addPart(0.23,0.58,0.23,6, 0.27,0.38,0, material);
                const rKnee = addPart(0.18,0.18,0.18,1.5, 0.27,0.02,0, jointMat);
                const rShin = addPart(0.21,0.52,0.21,4.5, 0.27,-0.46,0, material);
                const rFoot = addPart(0.24,0.12,0.38,1.8, 0.27,-0.86,0.06, material);
                const parts = {pelvis,stomach,chest,head, lShoulder,lUpper,lElbow,lFore,lHand, rShoulder,rUpper,rElbow,rFore,rHand, lHip,lThigh,lKnee,lShin,lFoot, rHip,rThigh,rKnee,rShin,rFoot};
                function constrain(a,b,pa,pb){ world.addConstraint(new CANNON.PointToPointConstraint(a.body,pa,b.body,pb,1e6)); }
                constrain(pelvis,stomach,new CANNON.Vec3(0,0.15,0),new CANNON.Vec3(0,-0.2,0));
                constrain(stomach,chest,new CANNON.Vec3(0,0.2,0),new CANNON.Vec3(0,-0.25,0));
                constrain(chest,head,new CANNON.Vec3(0,0.28,0),new CANNON.Vec3(0,-0.15,0));
                constrain(chest,lShoulder,new CANNON.Vec3(-0.28,0.15,0),new CANNON.Vec3(0,0,0));
                constrain(chest,rShoulder,new CANNON.Vec3(0.28,0.15,0),new CANNON.Vec3(0,0,0));
                constrain(lShoulder,lUpper,new CANNON.Vec3(0,-0.1,0),new CANNON.Vec3(0,0.2,0));
                constrain(lUpper,lElbow,new CANNON.Vec3(0,-0.22,0),new CANNON.Vec3(0,0,0));
                constrain(lElbow,lFore,new CANNON.Vec3(0,-0.08,0),new CANNON.Vec3(0,0.2,0));
                constrain(lFore,lHand,new CANNON.Vec3(0,-0.2,0),new CANNON.Vec3(0,0.1,0));
                constrain(rShoulder,rUpper,new CANNON.Vec3(0,-0.1,0),new CANNON.Vec3(0,0.2,0));
                constrain(rUpper,rElbow,new CANNON.Vec3(0,-0.22,0),new CANNON.Vec3(0,0,0));
                constrain(rElbow,rFore,new CANNON.Vec3(0,-0.08,0),new CANNON.Vec3(0,0.2,0));
                constrain(rFore,rHand,new CANNON.Vec3(0,-0.2,0),new CANNON.Vec3(0,0.1,0));
                constrain(pelvis,lHip,new CANNON.Vec3(-0.18,-0.12,0),new CANNON.Vec3(0,0,0));
                constrain(lHip,lThigh,new CANNON.Vec3(0,-0.1,0),new CANNON.Vec3(0,0.26,0));
                constrain(lThigh,lKnee,new CANNON.Vec3(0,-0.28,0),new CANNON.Vec3(0,0,0));
                constrain(lKnee,lShin,new CANNON.Vec3(0,-0.08,0),new CANNON.Vec3(0,0.25,0));
                constrain(lShin,lFoot,new CANNON.Vec3(0,-0.25,0),new CANNON.Vec3(0,0.06,0));
                constrain(pelvis,rHip,new CANNON.Vec3(0.18,-0.12,0),new CANNON.Vec3(0,0,0));
                constrain(rHip,rThigh,new CANNON.Vec3(0,-0.1,0),new CANNON.Vec3(0,0.26,0));
                constrain(rThigh,rKnee,new CANNON.Vec3(0,-0.28,0),new CANNON.Vec3(0,0,0));
                constrain(rKnee,rShin,new CANNON.Vec3(0,-0.08,0),new CANNON.Vec3(0,0.25,0));
                constrain(rShin,rFoot,new CANNON.Vec3(0,-0.25,0),new CANNON.Vec3(0,0.06,0));
                scene.add(group);
                
                let lastAttack = 0;
                let strafeTimer = 0;
                let strafeDir = (Math.random() - 0.5) * 1.5;
                const skill = isP1 ? evolution.p1.skill : evolution.p2.skill;
                
                return { group, parts, mainBody: pelvis.body, colorHex, name, isP1, 
                    hp: 100 + (isP1 ? evolution.p1.healthBonus : evolution.p2.healthBonus), 
                    maxHp: 100 + (isP1 ? evolution.p1.healthBonus : evolution.p2.healthBonus), 
                    rage: false, combo:0,
                    takeDamage: function(amt) { 
                        let dmg = amt * (this.isP1 ? evolution.p1.damageBonus : evolution.p2.damageBonus);
                        this.hp = Math.max(0, this.hp - dmg); 
                        document.getElementById('screenFlash').style.opacity='0.25'; setTimeout(()=>document.getElementById('screenFlash').style.opacity='0',80);
                        for(let i=0;i<6;i++) createParticle(this.parts.chest.body.position.clone(), 0xff3300, new THREE.Vector3((Math.random()-0.5)*1, Math.random()*1.2, (Math.random()-0.5)*1));
                        if(this.hp<30 && !this.rage) { 
                            this.rage=true; 
                            Object.values(this.parts).forEach(p=>{ if(p.mesh.material!==jointMat) p.mesh.material = rageMat; }); 
                            showCommentary(this.name+" ENRAGED!"); 
                            document.getElementById(this.isP1?'p1-rage':'p2-rage').style.display='block';
                        }
                        if(this.hp<=0) this.die();
                        return this.hp<=0;
                    },
                    die: function() { 
                        if(!matchActive) return; matchActive=false;
                        Object.values(this.parts).forEach(p=>{ p.body.mass=4; p.body.linearDamping=0.1; p.body.velocity.set((Math.random()-0.5)*4, Math.random()*4, (Math.random()-0.5)*4); });
                        for(let i=0;i<70;i++) createParticle(this.parts.chest.body.position.clone(), this.colorHex, new THREE.Vector3((Math.random()-0.5)*3, Math.random()*3, (Math.random()-0.5)*3));
                        let winner = this.isP1 ? p2 : p1; 
                        awardWin(winner.isP1);
                        showWinner(winner.name);
                        setTimeout(()=>game.nextArenaAndReset(), 3000);
                    },
                    update: function(dt, opponent) {
                        if(this.hp<=0) { 
                            Object.values(this.parts).forEach(p=>{ p.mesh.position.copy(p.body.position); p.mesh.quaternion.copy(p.body.quaternion); }); 
                            return; 
                        }
                        Object.values(this.parts).forEach(p=>{ p.mesh.position.copy(p.body.position); p.mesh.quaternion.copy(p.body.quaternion); });
                        
                        let dx = opponent.parts.chest.body.position.x - this.parts.chest.body.position.x;
                        let dz = opponent.parts.chest.body.position.z - this.parts.chest.body.position.z;
                        let dist = Math.hypot(dx, dz);
                        let angleToOpp = Math.atan2(dz, dx);
                        const fighterSkill = this.isP1 ? evolution.p1.skill : evolution.p2.skill;
                        // Movement: higher skill = better positioning (less wasted movement)
                        let moveForce = 420 + fighterSkill * 150;
                        let forward = Math.cos(angleToOpp) * (dist > 2.0 ? 1.2 : 0.5);
                        let strafeSpeed = (Math.sin(angleToOpp) * strafeDir * (0.6 + fighterSkill * 0.8));
                        this.mainBody.applyForce(new CANNON.Vec3(forward * moveForce + strafeSpeed * 280, 0, (Math.sin(angleToOpp)*forward + Math.cos(angleToOpp)*strafeSpeed)*240), this.mainBody.position);
                        
                        // Attack: skill reduces cooldown, increases combo chance, critical chance
                        let now = Date.now();
                        let baseCooldown = this.rage ? 0.28 : 0.48;
                        let cooldown = baseCooldown * (1 - fighterSkill * 0.3); // skill reduces cooldown up to 30%
                        if(dist < 2.0 && now - lastAttack > cooldown * 1000 && matchActive) {
                            lastAttack = now;
                            let isKick = (Math.random() < 0.35 + fighterSkill * 0.2); // skill makes more kicks
                            let baseDamage = isKick ? 7 + Math.random()*13 : 6 + Math.random()*12;
                            let critChance = 0.2 + fighterSkill * 0.25;
                            let crit = Math.random() < critChance;
                            let finalDamage = baseDamage * (crit?2:1) * (this.isP1 ? evolution.p1.damageBonus : evolution.p2.damageBonus);
                            let hitPos = isKick ? this.parts.lShin.body.position : this.parts.rHand.body.position;
                            if(opponent.takeDamage(finalDamage)) {
                                showImpactText("💀 FATAL", hitPos);
                            } else {
                                showImpactText(isKick ? "🦵 KICK!" : "👊 PUNCH!", hitPos);
                                this.combo++;
                                if(this.combo >= 2) showCombo(this.combo);
                                if(crit) showCommentary("CRITICAL HIT!");
                            }
                        }
                        
                        // Idle animation & head tracking
                        let anim = Date.now() * 0.01;
                        this.parts.lShoulder.body.quaternion.setFromEuler(0,0, Math.sin(anim)*0.5);
                        this.parts.rShoulder.body.quaternion.setFromEuler(0,0, Math.cos(anim)*0.5);
                        this.parts.head.body.quaternion.setFromEuler(0, Math.atan2(dx, 2)*0.3, 0);
                        if(now - lastAttack > 2000) this.combo = 0;
                        
                        // Strafe timer
                        strafeTimer += dt;
                        if(strafeTimer > 1.2) { strafeDir = (Math.random() - 0.5) * 1.5; strafeTimer = 0; }
                        
                        // Arena hazard
                        let pos = this.parts.chest.body.position;
                        if(applyArenaConstraints(pos)) {
                            this.takeDamage(999);
                            showCommentary(`${this.name} FELL TO THEIR DOOM!`);
                        }
                    }
                };
            }
            
            const game = {
                init: function() { 
                    loadEvolution();
                    currentArenaIndex = evolution.arenaIndex;
                    buildArena(currentArenaIndex);
                    this.resetFight(true);
                    this.updateEvoUI();
                },
                resetFight: function(keepEvo=true) {
                    if(p1) { Object.values(p1.parts).forEach(b=>world.removeBody(b.body)); scene.remove(p1.group); }
                    if(p2) { Object.values(p2.parts).forEach(b=>world.removeBody(b.body)); scene.remove(p2.group); }
                    if(!keepEvo) { resetEvolution(); }
                    p1 = createMartialArtist(-3.2, 0xff3366, "CRIMSON", true);
                    p2 = createMartialArtist(3.2, 0x33ff66, "EMERALD", false);
                    matchActive = true;
                    roundEnded = false;
                    document.getElementById('p1-hp-fill').style.width='100%'; document.getElementById('p2-hp-fill').style.width='100%';
                    document.getElementById('p1-rage').style.display='none'; document.getElementById('p2-rage').style.display='none';
                    startRoundTimer();
                    showCommentary(`⚡ ETERNAL WAR CONTINUES! ${ARENAS[currentArenaIndex].name} ⚡`);
                },
                nextArenaAndReset: function() {
                    currentArenaIndex = (currentArenaIndex + 1) % ARENAS.length;
                    evolution.arenaIndex = currentArenaIndex;
                    saveEvolution();
                    buildArena(currentArenaIndex);
                    this.resetFight(true);
                },
                superMove: function() { if(!matchActive) return; const bannerDiv=document.createElement('div'); bannerDiv.className='super-banner'; bannerDiv.innerText=["💀 FATALITY!","🔥 OBLITERATION!","⚡ SUPERNOVA!"][Math.floor(Math.random()*3)]; document.body.appendChild(bannerDiv); setTimeout(()=>bannerDiv.remove(),1200); p1.takeDamage(18); p2.takeDamage(18); for(let i=0;i<80;i++) createParticle(new THREE.Vector3(0,2,0),0xffaa44,new THREE.Vector3((Math.random()-0.5)*2.5, Math.random()*2.5, (Math.random()-0.5)*2.5)); this.triggerSlowMo(0.15,900); },
                forceTaunt: function() { const taunts=["YOUR STANCE IS WEAK!","IS THAT MARTIAL ARTS?","MY GRANDMA FIGHTS BETTER!"]; showCommentary(taunts[Math.floor(Math.random()*taunts.length)]); },
                toggleSlowMo: function() { slowMo=!slowMo; timeScale=slowMo?0.32:1; document.getElementById('slowMoBadge').style.display=slowMo?'block':'none'; showCommentary(slowMo?"SLOW MOTION ON":"NORMAL SPEED"); },
                toggleCamera: function() { epicCamera=!epicCamera; showCommentary(epicCamera?"🎬 EPIC CINEMA MODE":"🎥 CLASSIC VIEW"); },
                triggerSlowMo: function(speed, dur) { timeScale=speed; document.getElementById('slowMoBadge').style.display='block'; setTimeout(()=>{ if(!slowMo) { timeScale=1; document.getElementById('slowMoBadge').style.display='none'; } else timeScale=0.32; }, dur); },
                evolveStat: function(fighter, stat) { 
                    let evo = evolution[fighter]; 
                    if(evo.skill < 1.0) { 
                        showCommentary("❌ WISDOM GROWS ONLY THROUGH VICTORY! WIN FIGHTS!");
                        return;
                    }
                    if(stat==='damage') { evo.damageBonus = Math.min(2.5, evo.damageBonus+0.1); evo.skill = Math.max(0, evo.skill-0.05); showCommentary(`${fighter.toUpperCase()} DAMAGE UP! 💪`); } 
                    else if(stat==='health') { evo.healthBonus = Math.min(80, evo.healthBonus+8); evo.skill = Math.max(0, evo.skill-0.05); showCommentary(`${fighter.toUpperCase()} MAX HEALTH +8 ❤️`); } 
                    saveEvolution(); this.updateEvoUI(); this.resetFight(true); 
                },
                updateEvoUI: function() { 
                    document.getElementById('p1-dmg').innerText=evolution.p1.damageBonus.toFixed(2); 
                    document.getElementById('p1-hp-mod').innerText=evolution.p1.healthBonus; 
                    document.getElementById('p1-skill').innerText=evolution.p1.skill.toFixed(2);
                    document.getElementById('p2-dmg').innerText=evolution.p2.damageBonus.toFixed(2); 
                    document.getElementById('p2-hp-mod').innerText=evolution.p2.healthBonus; 
                    document.getElementById('p2-skill').innerText=evolution.p2.skill.toFixed(2);
                },
                resetEvolution: function() { resetEvolution(); this.resetFight(true); },
                openEvolutionPanel: function() { showCommentary("EACH WIN INCREASES WISDOM → FASTER, SMARTER FIGHTERS"); }
            };
            
            function updateCamera() { 
                if(!p1 || !p2) return; 
                let mid = (p1.parts.chest.body.position.x + p2.parts.chest.body.position.x)/2; 
                let dist = Math.abs(p1.parts.chest.body.position.x - p2.parts.chest.body.position.x); 
                if(epicCamera) { 
                    let t=Date.now()*0.002; 
                    camera.position.x = mid + Math.sin(t)*2.2; 
                    camera.position.y = 3 + Math.cos(t*0.7)*1.5; 
                    camera.position.z = 9 + Math.sin(t*0.5)*1.2; 
                } else { 
                    camera.position.x += (mid - camera.position.x)*0.06; 
                    camera.position.y = 4 + dist*0.08; 
                    camera.position.z = 11 + dist*0.1; 
                } 
                camera.lookAt(mid, 1.6, 0); 
            }
            
            let lastTimestamp=0;
            function animate(){ 
                requestAnimationFrame(animate); 
                let now=performance.now()/1000; 
                let dt = Math.min(0.033, (now-lastTimestamp)*timeScale); 
                lastTimestamp=now; 
                if(matchActive && p1 && p2 && p1.hp>0 && p2.hp>0) { 
                    world.step(1/60, dt, 3); 
                    p1.update(dt, p2); 
                    p2.update(dt, p1); 
                    let p1hp = (p1.hp/p1.maxHp)*100; 
                    let p2hp = (p2.hp/p2.maxHp)*100; 
                    document.getElementById('p1-hp-fill').style.width = Math.max(0,p1hp)+'%'; 
                    document.getElementById('p2-hp-fill').style.width = Math.max(0,p2hp)+'%'; 
                } 
                updateParticles(); 
                updateCamera(); 
                renderer.render(scene,camera); 
            }
            window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
            game.init();
            animate();
        })();
    </script>
</body>
</html>
