// AUDIO SOURCES
// =============================================================================
const recordingCache = new Map();

async function fetchXenoCanto(latinName) {
  const queries = [
    `${latinName} cnt:"united kingdom" q:A len:0-15`,
    `${latinName} cnt:"united kingdom" q:A`,
    `${latinName} q:A len:0-20`,
    `${latinName} q:A`,
  ];
  for (const query of queries) {
    try {
      const url = `https://xeno-canto.org/api/2/recordings?query=${encodeURIComponent(query)}`;
      const response = await fetch(url);
      if (!response.ok) continue;
      const data = await response.json();
      if (data.recordings && data.recordings.length > 0) {
        const recordings = data.recordings.slice(0, 12).filter(r => r.file).map(r => ({
          id: `xc-${r.id}`,
          url: r.file.startsWith('//') ? `https:${r.file}` : r.file,
          recordist: r.rec || 'Unknown',
          location: r.loc || 'Unknown',
          country: r.cnt || '',
          length: r.length || '',
          type: r.type || 'song',
          quality: r.q || '',
          date: r.date || '',
          license: r.lic ? (r.lic.startsWith('//') ? `https:${r.lic}` : r.lic) : '',
          source: 'xeno-canto',
          attribution: `XC${r.id} · ${r.rec || 'Unknown'} · xeno-canto.org`,
        }));
        if (recordings.length > 0) return recordings;
      }
    } catch (e) { console.warn('xc failed:', query, e); }
  }
  return [];
}

async function fetchWikimedia(latinName, commonName) {
  try {
    const searches = [`${latinName} song`, `${latinName} call`, `${commonName} song`, latinName];
    for (const searchTerm of searches) {
      const url = `https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}+filetype:audio&srnamespace=6&format=json&origin=*&srlimit=10`;
      try {
        const response = await fetch(url);
        if (!response.ok) continue;
        const data = await response.json();
        if (data.query?.search?.length > 0) {
          const recordings = [];
          for (const item of data.query.search.slice(0, 5)) {
            const title = item.title;
            const detailUrl = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=imageinfo&iiprop=url|mime|extmetadata&format=json&origin=*`;
            try {
              const detailResp = await fetch(detailUrl);
              const detailData = await detailResp.json();
              const pages = detailData.query?.pages;
              if (!pages) continue;
              const page = Object.values(pages)[0];
              const info = page?.imageinfo?.[0];
              if (!info) continue;
              const mime = info.mime || '';
              if (!mime.startsWith('audio/')) continue;
              const meta = info.extmetadata || {};
              const artist = (meta.Artist?.value?.replace(/<[^>]+>/g, '').trim()) || 'Unknown';
              const license = meta.LicenseShortName?.value || 'CC';
              const description = (meta.ImageDescription?.value?.replace(/<[^>]+>/g, '').trim()) || '';
              recordings.push({
                id: `wm-${title.replace(/\s+/g, '_')}`,
                url: info.url,
                recordist: artist,
                location: 'Wikimedia Commons',
                country: '',
                length: '',
                type: description.toLowerCase().includes('call') ? 'call' : 'song',
                quality: '',
                date: '',
                license: meta.LicenseUrl?.value || '',
                source: 'wikimedia',
                attribution: `${title.replace('File:', '')} · ${artist} · ${license} · Wikimedia Commons`,
              });
            } catch (e) { continue; }
          }
          if (recordings.length > 0) return recordings;
        }
      } catch (e) { continue; }
    }
  } catch (e) { console.warn('wm failed:', e); }
  return [];
}

async function fetchRecordings(latinName, commonName) {
  if (recordingCache.has(latinName)) return recordingCache.get(latinName);
  const [xc, wm] = await Promise.allSettled([fetchXenoCanto(latinName), fetchWikimedia(latinName, commonName)]);
  const all = [];
  if (xc.status === 'fulfilled') all.push(...xc.value);
  if (wm.status === 'fulfilled') all.push(...wm.value);
  recordingCache.set(latinName, all);
  return all;
}

// =============================================================================
// NOISE BUFFER FACTORY
// =============================================================================
function createNoiseBuffer(ctx, duration, type) {
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  if (type === 'white') {
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  } else if (type === 'pink') {
    let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99886 * b0 + white * 0.0555179;
      b1 = 0.99332 * b1 + white * 0.0750759;
      b2 = 0.96900 * b2 + white * 0.1538520;
      b3 = 0.86650 * b3 + white * 0.3104856;
      b4 = 0.55000 * b4 + white * 0.5329522;
      b5 = -0.7616 * b5 - white * 0.0168980;
      data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
      b6 = white * 0.115926;
    }
  } else {
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      data[i] = (lastOut + (0.02 * white)) / 1.02;
      lastOut = data[i];
      data[i] *= 3.5;
    }
  }
  return buffer;
}

const AMBIENT_GENERATORS = {
  'amb-leaves': (ctx, out, vol) => {
    const buf = createNoiseBuffer(ctx, 3, 'pink');
    const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2500; f.Q.value = 1.5;
    const g = ctx.createGain(); g.gain.value = 0;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.4;
    const lfoG = ctx.createGain(); lfoG.gain.value = vol * 0.15;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.08, ctx.currentTime + 1);
    src.connect(f); f.connect(g); g.connect(out);
    src.start(); lfo.start();
    return () => { g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5); setTimeout(() => { try { src.stop(); lfo.stop(); } catch(e) {} }, 600); };
  },
  'amb-water': (ctx, out, vol) => {
    const mg = ctx.createGain(); mg.gain.value = vol * 0.4; mg.connect(out);
    let stopped = false;
    const drip = () => {
      if (stopped) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      const sf = 800 + Math.random() * 400;
      osc.frequency.setValueAtTime(sf, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(sf * 0.5, ctx.currentTime + 0.08);
      osc.type = 'sine';
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.4, ctx.currentTime + 0.005);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      const nb = createNoiseBuffer(ctx, 0.05);
      const n = ctx.createBufferSource(); n.buffer = nb;
      const nf = ctx.createBiquadFilter(); nf.type = 'lowpass'; nf.frequency.value = 600;
      const ng = ctx.createGain(); ng.gain.setValueAtTime(0.15, ctx.currentTime); ng.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
      n.connect(nf); nf.connect(ng); ng.connect(mg);
      osc.connect(g); g.connect(mg);
      osc.start(); n.start();
      osc.stop(ctx.currentTime + 0.2); n.stop(ctx.currentTime + 0.1);
      setTimeout(drip, 1500 + Math.random() * 2500);

    drip();
    return () => { stopped = true; mg.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3); };
  },
  'amb-soil': (ctx, out, vol) => {
    const mg = ctx.createGain(); mg.gain.value = 0; mg.connect(out);

    const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 250; f.Q.value = 2;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.15;
    const lfoG = ctx.createGain(); lfoG.gain.value = vol * 0.05;
    lfo.connect(lfoG); lfoG.connect(mg.gain);
    mg.gain.setValueAtTime(0, ctx.currentTime);
    mg.gain.linearRampToValueAtTime(vol * 0.06, ctx.currentTime + 1);
    src.connect(f); f.connect(mg);
    src.start(); lfo.start();
    return () => { mg.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5); setTimeout(() => { try { src.stop(); lfo.stop(); } catch(e) {} }, 600); };
  },
  'amb-seeds': (ctx, out, vol) => {
    const mg = ctx.createGain(); mg.gain.value = vol * 0.5; mg.connect(out);
    let stopped = false;
    const patter = () => {
      if (stopped) return;
      for (let i = 0; i < 8 + Math.random() * 8; i++) {
        setTimeout(() => {
          if (stopped) return;
          const buf = createNoiseBuffer(ctx, 0.02);
          const src = ctx.createBufferSource(); src.buffer = buf;
          const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 3000;
          const g = ctx.createGain();
          const pg = 0.05 + Math.random() * 0.08;
          g.gain.setValueAtTime(0, ctx.currentTime);
          g.gain.linearRampToValueAtTime(pg, ctx.currentTime + 0.001);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
          src.connect(f); f.connect(g); g.connect(mg);
          src.start(); src.stop(ctx.currentTime + 0.05);
        }, i * (10 + Math.random() * 40));
      }
      setTimeout(patter, 4000 + Math.random() * 6000);
    };
    patter();
    return () => { stopped = true; mg.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3); };
  },

    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
    const lfoG = ctx.createGain(); lfoG.gain.value = vol * 0.04;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.05, ctx.currentTime + 2);
    src.connect(f); f.connect(g); g.connect(out);
    src.start(); lfo.start();
    return () => { g.gain.linearRampToValueAtTime(0, ctx.currentTime + 1); setTimeout(() => { try { src.stop(); lfo.stop(); } catch(e) {} }, 1100); };
  },
  'amb-rain': (ctx, out, vol) => {
    const buf = createNoiseBuffer(ctx, 3, 'pink');
    const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1500; f.Q.value = 0.3;
    const g = ctx.createGain(); g.gain.value = 0;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.07, ctx.currentTime + 1);
    src.connect(f); f.connect(g); g.connect(out);
    src.start();
    return () => { g.gain.linearRampToValueAtTime(0, ctx.currentTime + 1); setTimeout(() => { try { src.stop(); } catch(e) {} }, 1100); };
  },
  'amb-bees': (ctx, out, vol) => {
    const mg = ctx.createGain(); mg.gain.value = vol * 0.15; mg.connect(out);
    const oscs = [];
    for (let i = 0; i < 3; i++) {
      const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 220 + Math.random() * 30;
      const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 12 + Math.random() * 8;
      const lfoG = ctx.createGain(); lfoG.gain.value = 15 + Math.random() * 10;
      lfo.connect(lfoG); lfoG.connect(osc.frequency);
      const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = osc.frequency.value; f.Q.value = 2;
      const og = ctx.createGain(); og.gain.value = 0.15 + Math.random() * 0.1;
      osc.connect(f); f.connect(og); og.connect(mg);
      osc.start(); lfo.start();
      oscs.push(osc, lfo);
    }
    return () => { mg.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5); setTimeout(() => { oscs.forEach(o => { try { o.stop(); } catch(e) {} }); }, 600); };
  },
  'amb-cricket': (ctx, out, vol) => {
    const mg = ctx.createGain(); mg.gain.value = vol * 0.3; mg.connect(out);
    let stopped = false;
    const chirp = () => {
      if (stopped) return;
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          if (stopped) return;
          const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = 4500 + Math.random() * 200;
          const g = ctx.createGain();
          g.gain.setValueAtTime(0, ctx.currentTime);
          g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + 0.005);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
          osc.connect(g); g.connect(mg);
          osc.start(); osc.stop(ctx.currentTime + 0.1);
        }, i * 350);
      }
      setTimeout(chirp, 1500 + Math.random() * 1500);
    };
    chirp();
    return () => { stopped = true; mg.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3); };
  },
  'amb-stream': (ctx, out, vol) => {
    const buf = createNoiseBuffer(ctx, 4, 'pink');
    const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 3000; f.Q.value = 0.8;
    const f2 = ctx.createBiquadFilter(); f2.type = 'peaking'; f2.frequency.value = 2000; f2.Q.value = 1; f2.gain.value = 4;
    const g = ctx.createGain(); g.gain.value = 0;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.3;
    const lfoG = ctx.createGain(); lfoG.gain.value = 200;
    lfo.connect(lfoG); lfoG.connect(f.frequency);
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(vol * 0.1, ctx.currentTime + 1.5);
    src.connect(f); f.connect(f2); f2.connect(g); g.connect(out);
    src.start(); lfo.start();
    return () => { g.gain.linearRampToValueAtTime(0, ctx.currentTime + 1); setTimeout(() => { try { src.stop(); lfo.stop(); } catch(e) {} }, 1100); };
  },
};

// =============================================================================
// ATMOSPHERE GENERATORS
// =============================================================================
function createWindLayer(ctx, output, intensity) {
  const bufSz = ctx.sampleRate * 5;
  const buf = ctx.createBuffer(1, bufSz, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufSz; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSz, 3);
  const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 300 * intensity;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 60;
  const g = ctx.createGain(); g.gain.value = 0.02 * intensity;
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
  const lfoG = ctx.createGain(); lfoG.gain.value = g.gain.value * 0.5;
  lfo.connect(lfoG); lfoG.connect(g.gain);
  src.connect(lp); lp.connect(hp); hp.connect(g); g.connect(output);
  src.start(); lfo.start();
  return () => { try { src.stop(); lfo.stop(); } catch(e) {} };
}

function createInsectDrone(ctx, output, species) {
  const g = ctx.createGain(); g.gain.value = species === 'dusk' ? 0.012 : 0.006; g.connect(output);
  const stops = [];
  const count = species === 'dusk' ? 5 : 2;
  for (let i = 0; i < count; i++) {
    const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = 350 + Math.random() * 200 + i * 50;
    const oscG = ctx.createGain(); oscG.gain.value = 0.08;
    const lfo = ctx.createOscillator(); lfo.frequency.value = 18 + Math.random() * 8;
    const lfoG = ctx.createGain(); lfoG.gain.value = 60;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = osc.frequency.value; bp.Q.value = 3;
    osc.connect(bp); bp.connect(oscG); oscG.connect(g);
    osc.start(); lfo.start();
    stops.push(() => { try { osc.stop(); lfo.stop(); } catch(e) {} });
  }
  return () => stops.forEach(s => s());
}

// =============================================================================
// GARDEN SOUNDSCAPE ENGINE
// =============================================================================
class GardenSoundscape {
  constructor() {
    this.calls = [];
    this.volume = 0.5;
    this.maxLayers = 4;
    this.onChange = null;
    this.stage = 'morning';
  }

  setVolume(v) { this.volume = v; this.calls.forEach(c => c.audio.volume = v); }
  setMaxLayers(n) {
    this.maxLayers = n;
    while (this.calls.length > n) {
      const c = this.calls.shift();
      if (c) { c.audio.pause(); c.audio.src = ''; }
    }
  }
  setOnChange(cb) { this.onChange = cb; }
  getActive() { return this.calls; }
  setStage(s) { this.stage = s; }

  async play(species, rec) {
    while (this.calls.length >= this.maxLayers) {
      const c = this.calls.shift();
      if (c) { c.audio.pause(); c.audio.src = ''; }
    }

    const zone = GARDEN_ZONES[Math.floor(Math.random() * GARDEN_ZONES.length)];
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.src = rec.url;
    audio.volume = 0;

    try {
      const ctx = new AudioContext();
      const panner = ctx.createStereoPanner();
      panner.pan.value = zone.pan;
      const src = ctx.createMediaElementSource(audio);
      src.connect(panner);
      panner.connect(ctx.destination);
    } catch(e) {}

    const call = {
      id: `${species.id}-${Date.now()}-${Math.random()}`,
      speciesId: species.id,
      audio, pan: zone.pan,
      recording: rec,
      species,
      startedAt: Date.now(),
    };

    audio.addEventListener('ended', () => this.remove(call.id));
    audio.addEventListener('error', () => this.remove(call.id));

    this.calls.push(call);
    if (this.onChange) this.onChange();

    try {
      await audio.play();
      audio.volume = 0;
      this.fadeTo(audio, this.volume * 0.85, 800);
      setTimeout(() => {
        if (audio.duration) {
          const remaining = (audio.duration - audio.currentTime) * 1000;
          if (remaining > 0 && remaining < 3000) this.fadeTo(audio, 0, remaining * 0.9);
        }
      }, Math.max(0, (audio.duration || 5) * 1000 - 2000));
    } catch(e) { this.remove(call.id); }
  }

  fadeTo(audio, target, ms) {
    const start = audio.volume;
    const diff = target - start;
    const steps = 20;
    const stepMs = ms / steps;
    for (let i = 1; i <= steps; i++) {
      setTimeout(() => { try { audio.volume = start + diff * (i / steps); } catch(e) {} }, i * stepMs);
    }
  }

  remove(id) {
    this.calls = this.calls.filter(c => c.id !== id);
    if (this.onChange) this.onChange();
  }

  stopAll() {
    this.calls.forEach(c => { c.audio.pause(); c.audio.src = ''; });
    this.calls = [];
    if (this.onChange) this.onChange();
  }

  getActivityForStage() {
    const rates = { dawn: 0.6, morning: 0.4, midday: 0.12, afternoon: 0.25, dusk: 0.45, night: 0.05 };
    return rates[this.stage];
  }
}

// MAIN APP
// =============================================================================
const app = document.getElementById('app');

let engine = null;
let audioCtx = null;
let ambientGain = null;
let activeAtmos = [];
let ambientStops = new Map();
let autoTimer = null;
let stageTimer = null;
let currentAmbientId = null;

let state = {
  started: false,
  volume: 45,
  layers: 4,
  activeIds: [],
  loading: null,
  auto: true,
  stage: 'morning',
  cache: {},
  currentSong: null,
};

function setState(u) { state = { ...state, ...u }; render(); }

function clearAtmos() {
  activeAtmos.forEach(s => s());
  activeAtmos = [];
}

function clearAmbient() {
  ambientStops.forEach(s => s());
  ambientStops.clear();
  currentAmbientId = null;
}

// Pick ambient appropriate for stage
function pickAmbientForStage(stage) {
  const map = {
    dawn: ['amb-wind', 'amb-leaves', 'amb-water'],
    morning: ['amb-bees', 'amb-wind', 'amb-leaves', 'amb-water'],
    midday: ['amb-bees', 'amb-wind', 'amb-cricket'],
    afternoon: ['amb-wind', 'amb-leaves', 'amb-seeds', 'amb-water'],
    dusk: ['amb-cricket', 'amb-wind', 'amb-stream', 'amb-soil'],
    night: ['amb-wind', 'amb-stream', 'amb-rain', 'amb-soil'],
  };
  const pool = map[stage] || ['amb-wind'];
  return pool[Math.floor(Math.random() * pool.length)];
}

function startAmbientSound() {
  if (!audioCtx || !ambientGain) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // Stop current
  if (currentAmbientId && ambientStops.has(currentAmbientId)) {
    const s = ambientStops.get(currentAmbientId);
    if (s) s();
    ambientStops.delete(currentAmbientId);
  }

  const id = pickAmbientForStage(state.stage);
  const gen = AMBIENT_GENERATORS[id];
  if (gen) {
    const stop = gen(audioCtx, ambientGain, 1);
    ambientStops.set(id, stop);
    currentAmbientId = id;
  }
}

function advanceStage() {
  const order = ['dawn', 'morning', 'midday', 'afternoon', 'dusk', 'night'];
  const idx = order.indexOf(state.stage);
  const next = order[(idx + 1) % order.length];
  state.stage = next;
  if (engine) engine.setStage(next);

  clearAtmos();
  if (audioCtx && ambientGain) {
    if (next === 'dawn' || next === 'morning') {
      activeAtmos.push(createWindLayer(audioCtx, ambientGain, 0.3));
    } else if (next === 'dusk') {
      activeAtmos.push(createInsectDrone(audioCtx, ambientGain, 'dusk'));
      activeAtmos.push(createWindLayer(audioCtx, ambientGain, 0.5));
    } else if (next === 'night') {
      activeAtmos.push(createWindLayer(audioCtx, ambientGain, 0.2));
    } else if (next === 'midday') {
      activeAtmos.push(createInsectDrone(audioCtx, ambientGain, 'day'));
    }
  }

  startAmbientSound();
  render();
}

async function startApp() {
  if (!engine) {
    engine = new GardenSoundscape();
    engine.setVolume(state.volume / 100);
    engine.setMaxLayers(state.layers);
    engine.setOnChange(() => {
      const active = engine.getActive();
      state.activeIds = active.map(c => c.speciesId);
      if (active.length > 0) {
        const last = active[active.length - 1];
        state.currentSong = { species: last.species, zone: GARDEN_ZONES.find(z => Math.abs(z.pan - last.pan) < 0.2)?.label || 'Garden' };
      } else {
        state.currentSong = null;
      }
      render();
    });
  }
  if (!audioCtx) {
    audioCtx = new AudioContext();
    ambientGain = audioCtx.createGain();
    ambientGain.gain.value = state.volume / 100;
    ambientGain.connect(audioCtx.destination);
  }
  state.started = true;
  if (stageTimer) clearInterval(stageTimer);
  stageTimer = setInterval(advanceStage, 60000);

  startAmbientSound();
  startAutoInterval();
  render();
}

function startAutoInterval() {
  if (autoTimer) clearTimeout(autoTimer);
  if (!engine) return;

  const tick = () => {
    const pool = BIRDS.filter(s => s.welcoming);
    if (pool.length === 0) return;
    const bird = pool[Math.floor(Math.random() * pool.length)];
    const recs = state.cache[bird.latinName];
    if (recs && recs.length > 0) {
      const rec = recs[Math.floor(Math.random() * recs.length)];
      engine.play(bird, rec);
      state.currentSong = { species: bird, zone: 'garden' };
      render();
      // Call & response
      if (Math.random() < 0.3) {
        const pool2 = BIRDS.filter(x => x.welcoming && x.id !== bird.id);
        if (pool2.length > 0) {
          const reply = pool2[Math.floor(Math.random() * pool2.length)];
          setTimeout(() => {
            const repRecs = state.cache[reply.latinName];
            if (repRecs && repRecs.length > 0) {
              engine.play(reply, repRecs[Math.floor(Math.random() * repRecs.length)]);
            }
          }, 800 + Math.random() * 1200);
        }
      }
    }
    // Random interval based on stage activity
    const activity = engine.getActivityForStage();
    const delay = (3000 / Math.max(0.05, activity)) * (0.5 + Math.random());
    autoTimer = setTimeout(tick, delay);
  };

  autoTimer = setTimeout(tick, 800);
}

async function playSound(sound) {
  if (sound.type === 'ambient') {
    // Toggle ambient
    if (ambientStops.has(sound.id)) {
      const s = ambientStops.get(sound.id);
      if (s) s();
      ambientStops.delete(sound.id);
      if (currentAmbientId === sound.id) currentAmbientId = null;
    } else {
      if (!audioCtx) {
        audioCtx = new AudioContext();
        ambientGain = audioCtx.createGain();
        ambientGain.gain.value = state.volume / 100;
        ambientGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const gen = AMBIENT_GENERATORS[sound.id];
      if (gen) {
        const stop = gen(audioCtx, ambientGain, 1);
        ambientStops.set(sound.id, stop);
        currentAmbientId = sound.id;
      }
    }
    render();
    return;
  }

  // Bird
  if (!engine) return;
  state.loading = sound.id;
  render();
  try {
    let recs = state.cache[sound.latinName];
    if (!recs) {
      recs = await fetchRecordings(sound.latinName, sound.name);
      state.cache[sound.latinName] = recs;
    }
    state.loading = null;
    if (recs.length > 0) {
      const r = recs[Math.floor(Math.random() * recs.length)];
      state.currentSong = { species: sound, zone: 'center' };
      await engine.play(sound, r);
      if (Math.random() < 0.25) {
        setTimeout(() => {
          const r2 = recs[Math.floor(Math.random() * recs.length)];
          engine.play(sound, r2);
        }, 600 + Math.random() * 800);
      }
    }
  } catch(e) { state.loading = null; }
  render();
}

function stopAll() {
  if (engine) engine.stopAll();
  clearAmbient();
  clearAtmos();
  if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  state.auto = false;
  render();
}

function getLiveSounds() {
  if (!engine) return [];
  const birds = engine.getActive().map(c => ({
    id: c.speciesId,
    name: c.species.name,
    icon: c.species.icon,
    type: 'bird',
    zone: GARDEN_ZONES.find(z => Math.abs(z.pan - c.pan) < 0.2)?.label || 'Garden',
  }));
  const amb = [];
  if (currentAmbientId) {
    const a = AMBIENTS.find(x => x.id === currentAmbientId);
    if (a) amb.push({ id: a.id, name: a.name, icon: a.icon, type: 'ambient' });
  }
  return { birds, ambient: amb };
}

            <div class="card-glow">
              <div class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Now Playing</div>
              <div class="font-bold text-lg mt-1 text-white">${state.currentSong.species.icon} ${state.currentSong.species.name}</div>
              <div class="text-[10px] text-slate-400 mt-1">${state.currentSong.species.latinName} · ${state.currentSong.zone}</div>
              <div class="text-[9px] text-slate-500 mt-2">${state.currentSong.species.description}</div>
            </div>
          ` : ''}
        </div>

        <!-- RIGHT: Unified Grid -->
        <div class="lg:col-span-2 space-y-4">
          <div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">All Sounds — Click any to trigger</div>

          <!-- Ambient row -->
          <div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-1.5">
            ${AMBIENTS.map(a => {
              const on = ambientStops.has(a.id);
              const isCurrent = a.id === currentAmbientId;
              return `
                <button onclick="playSound(AMBIENTS.find(x=>x.id==='${a.id}'))"
                  class="ambient-btn ${on ? 'ambient-btn-active' : ''}">
                  <span class="text-xl">${a.icon}</span>
                  <span class="text-[8px] font-bold text-slate-300 text-center leading-tight mt-1 line-clamp-1">${a.name}</span>
                  ${isCurrent ? '<span class="absolute top-1 right-1 w-1.5 h-1.5 bg-amber-500 rounded-full"></span>' : ''}
                </button>
              `;
            }).join('')}
          </div>

          <div style="height:1px;background:#334155;margin:4px 0;"></div>

          <!-- Bird grid -->
          <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 gap-1.5">
            ${BIRDS.map(s => {
              const active = state.activeIds.includes(s.id);
              const isLoading = state.loading === s.id;
              const c = state.cache[s.latinName]?.length || 0;
              return `
                <button onclick="playSound(BIRDS.find(x=>x.id==='${s.id}'))"
                  class="bird-btn ${active ? 'bird-btn-active' : ''}">
                  <span class="text-xl drop-shadow-sm">${s.icon}</span>
                  <span class="text-[8px] font-bold text-slate-300 text-center leading-tight mt-0.5 line-clamp-1">${s.name}</span>
                  ${c > 0 && !active && !isLoading ? '<span class="absolute top-0.5 right-1 text-[7px] text-slate-600">●</span>' : ''}
                  ${isLoading ? '<div class="absolute inset-0 flex items-center justify-center bg-slate-900/60 rounded-2xl"><div class="spinner"></div></div>' : ''}
                </button>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    </main>
  `;
}

// Initial render
render();
</script>
</body>
</html>
