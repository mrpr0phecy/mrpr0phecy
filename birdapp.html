<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>🌿 Beds & Northants Garden Birds · Procedural Soundscape</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0b1120;
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  color: #eef2ff;
  line-height: 1.5;
  overflow-x: hidden;
}
.container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11, 17, 32, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}
.btn-primary {
  background: linear-gradient(135deg, #10b981, #059669);
  padding: 12px 28px;
  border-radius: 40px;
  color: white;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: 0.2s;
  font-size: 1rem;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
.btn-secondary {
  background: #1e293b;
  padding: 8px 18px;
  border-radius: 40px;
  color: #cbd5e6;
  font-weight: 600;
  font-size: 0.75rem;
  border: 1px solid #334155;
  cursor: pointer;
}
.btn-secondary:hover { background: #2d3a4e; color: white; }
.sound-card {
  background: #111827;
  border-radius: 1.25rem;
  border: 2px solid #1f2a3e;
  padding: 0.75rem 0.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.sound-card:hover { background: #1a2538; transform: translateY(-2px); }
.sound-card-enabled { border-color: #10b981; background: #0f1a1f; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
.sound-card-playing { animation: playingPulse 1s ease-in-out infinite; border-color: #fbbf24; }
@keyframes playingPulse {
  0% { box-shadow: 0 0 0 0 rgba(251,191,36,0.6); }
  70% { box-shadow: 0 0 0 6px rgba(251,191,36,0); }
  100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
}
.sound-icon { font-size: 1.8rem; }
.sound-name { font-size: 0.7rem; font-weight: 700; text-align: center; line-height: 1.3; }
@media (min-width: 768px) {
  .sound-name { font-size: 0.8rem; }
  .sound-icon { font-size: 2rem; }
}
.badge-enabled {
  position: absolute;
  top: 6px;
  right: 8px;
  width: 10px;
  height: 10px;
  background: #10b981;
  border-radius: 50%;
  box-shadow: 0 0 6px #10b981;
}
.badge-playing {
  position: absolute;
  top: 6px;
  left: 8px;
  width: 8px;
  height: 8px;
  background: #fbbf24;
  border-radius: 50%;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
.grid-sounds {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
  gap: 10px;
}
@media (min-width: 640px) { .grid-sounds { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); } }
.live-panel {
  background: #0f172a;
  border-radius: 1rem;
  padding: 14px 18px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}
.now-playing {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(16, 185, 129, 0.15);
  padding: 5px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #6ee7b7;
}
.now-playing span { width: 8px; height: 8px; background: #6ee7b7; border-radius: 50%; animation: pulse 1s infinite; }
input[type="range"] { -webkit-appearance: none; background: #1e293b; height: 4px; border-radius: 10px; width: 100%; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #10b981; border-radius: 50%; cursor: pointer; }
.card { background: #111827; border-radius: 1.25rem; padding: 1rem; border: 1px solid #1f2a3e; }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================================================
// 30 BIRDS OF BEDFORDSHIRE & NORTHAMPTONSHIRE
// Each bird has a unique synthesized voice using Web Audio API
// ============================================================================
const BIRDS = [
  { id: 'robin', name: 'Robin', icon: '🐦', activity: 0.95, voice: 'warble' },
  { id: 'blackbird', name: 'Blackbird', icon: '🎵', activity: 0.92, voice: 'flute' },
  { id: 'song-thrush', name: 'Song Thrush', icon: '🌿', activity: 0.9, voice: 'repeat' },
  { id: 'great-tit', name: 'Great Tit', icon: '💛', activity: 0.93, voice: 'tee-cher' },
  { id: 'blue-tit', name: 'Blue Tit', icon: '💙', activity: 0.91, voice: 'tsee-tsee' },
  { id: 'house-sparrow', icon: '🏠', name: 'House Sparrow', activity: 0.94, voice: 'chirrup' },
  { id: 'starling', name: 'Starling', icon: '⭐', activity: 0.88, voice: 'mimic' },
  { id: 'wren', name: 'Wren', icon: '🔥', activity: 0.96, voice: 'trill' },
  { id: 'goldfinch', name: 'Goldfinch', icon: '✨', activity: 0.89, voice: 'tinkling' },
  { id: 'chaffinch', name: 'Chaffinch', icon: '🐤', activity: 0.9, voice: 'pink' },
  { id: 'greenfinch', name: 'Greenfinch', icon: '💚', activity: 0.87, voice: 'wheezing' },
  { id: 'wood-pigeon', name: 'Wood Pigeon', icon: '🌳', activity: 0.8, voice: 'coo' },
  { id: 'collared-dove', name: 'Collared Dove', icon: '🕊️', activity: 0.82, voice: 'coo-coo' },
  { id: 'blackcap', name: 'Blackcap', icon: '🎼', activity: 0.9, voice: 'warble-fast' },
  { id: 'chiffchaff', name: 'Chiffchaff', icon: '🎶', activity: 0.92, voice: 'chiff-chaff' },
  { id: 'willow-warbler', name: 'Willow Warbler', icon: '🍃', activity: 0.88, voice: 'descend' },
  { id: 'cuckoo', name: 'Cuckoo', icon: '⏰', activity: 0.7, voice: 'cuckoo' },
  { id: 'nightingale', name: 'Nightingale', icon: '🌙', activity: 0.9, voice: 'nightingale' },
  { id: 'skylark', name: 'Skylark', icon: '☀️', activity: 0.85, voice: 'skylark' },
  { id: 'tawny-owl', name: 'Tawny Owl', icon: '🌙', activity: 0.55, voice: 'hoot' },
  { id: 'green-woodpecker', name: 'Green Woodpecker', icon: '🟢', activity: 0.7, voice: 'yaffle' },
  { id: 'great-spotted-woodpecker', name: 'Great Spotted', icon: '🪓', activity: 0.75, voice: 'drum' },
  { id: 'nuthatch', name: 'Nuthatch', icon: '🔵', activity: 0.78, voice: 'pip' },
  { id: 'bullfinch', name: 'Bullfinch', icon: '💗', activity: 0.72, voice: 'sad-pipe' },
  { id: 'yellowhammer', name: 'Yellowhammer', icon: '🟡', activity: 0.8, voice: 'a-little-bit' },
  { id: 'jay', name: 'Jay', icon: '🎨', activity: 0.62, voice: 'screech' },
  { id: 'magpie', name: 'Magpie', icon: '🖤', activity: 0.68, voice: 'magpie' },
  { id: 'jackdaw', name: 'Jackdaw', icon: '👁️', activity: 0.7, voice: 'jackdaw' },
  { id: 'buzzard', name: 'Buzzard', icon: '🪶', activity: 0.6, voice: 'mew' },
  { id: 'mallard', name: 'Mallard', icon: '🦆', activity: 0.6, voice: 'quack' }
];

// ============================================================================
// PROCEDURAL BIRD SYNTHESIZER - Web Audio API
// ============================================================================
class BirdSynth {
  constructor() {
    this.ctx = null;
  }

  ensureContext() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
    return this.ctx;
  }

  // Master output with reverb simulation
  createMasterGain() {
    const ctx = this.ensureContext();
    const master = ctx.createGain();
    master.gain.value = 0.3;
    
    // Simple reverb using delay
    const reverb = ctx.createConvolver();
    // Create impulse response for reverb
    const rate = ctx.sampleRate;
    const length = rate * 1.5;
    const impulse = ctx.createBuffer(2, length, rate);
    for (let channel = 0; channel < 2; channel++) {
      const data = impulse.getChannelData(channel);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 3) * 0.5;
      }
    }
    reverb.buffer = impulse;
    
    const reverbGain = ctx.createGain();
    reverbGain.gain.value = 0.15;
    
    const dryGain = ctx.createGain();
    dryGain.gain.value = 0.85;
    
    master.connect(dryGain);
    master.connect(reverbGain);
    reverbGain.connect(reverb);
    
    const output = ctx.createGain();
    dryGain.connect(output);
    reverb.connect(output);
    
    return { input: master, output };
  }

  // Play a bird sound based on voice type
  play(bird, volume = 0.7) {
    const ctx = this.ensureContext();
    const now = ctx.currentTime;
    const master = this.createMasterGain();
    master.output.connect(ctx.destination);
    master.output.gain.value = volume * (0.5 + Math.random() * 0.5);

    const voice = bird.voice;
    const duration = 0.5 + Math.random() * 2.5;

    switch (voice) {
      case 'warble':
        this.warble(ctx, master.input, now, duration, 1800, 2800);
        break;
      case 'flute':
        this.flute(ctx, master.input, now, duration, 1200, 2000);
        break;
      case 'repeat':
        this.repeatNotes(ctx, master.input, now, duration, 2000, 3000);
        break;
      case 'tee-cher':
        this.twoTone(ctx, master.input, now, duration, 3200, 2000);
        break;
      case 'tsee-tsee':
        this.highChirps(ctx, master.input, now, duration, 5000, 7000);
        break;
      case 'chirrup':
        this.chirrup(ctx, master.input, now, duration, 3000, 5000);
        break;
      case 'mimic':
        this.mimic(ctx, master.input, now, duration);
        break;
      case 'trill':
        this.trill(ctx, master.input, now, duration, 4000, 6000);
        break;
      case 'tinkling':
        this.tinkling(ctx, master.input, now, duration, 6000, 9000);
        break;
      case 'pink':
        this.pink(ctx, master.input, now, duration, 2500, 3500);
        break;
      case 'wheezing':
        this.wheezing(ctx, master.input, now, duration, 1500, 2500);
        break;
      case 'coo':
        this.coo(ctx, master.input, now, duration, 300, 500);
        break;
      case 'coo-coo':
        this.cooCoo(ctx, master.input, now, duration, 400, 600);
        break;
      case 'warble-fast':
        this.warbleFast(ctx, master.input, now, duration, 2500, 4500);
        break;
      case 'chiff-chaff':
        this.chiffChaff(ctx, master.input, now, duration, 3500, 4500);
        break;
      case 'descend':
        this.descending(ctx, master.input, now, duration, 5000, 3000);
        break;
      case 'cuckoo':
        this.cuckooCall(ctx, master.input, now, duration, 600, 900);
        break;
      case 'nightingale':
        this.nightingale(ctx, master.input, now, duration);
        break;
      case 'skylark':
        this.skylark(ctx, master.input, now, duration);
        break;
      case 'hoot':
        this.hoot(ctx, master.input, now, duration, 400, 600);
        break;
      case 'yaffle':
        this.yaffle(ctx, master.input, now, duration);
        break;
      case 'drum':
        this.drum(ctx, master.input, now, duration);
        break;
      case 'pip':
        this.pip(ctx, master.input, now, duration, 3000, 5000);
        break;
      case 'sad-pipe':
        this.sadPipe(ctx, master.input, now, duration, 1500, 2000);
        break;
      case 'a-little-bit':
        this.littleBit(ctx, master.input, now, duration, 2500, 3500);
        break;
      case 'screech':
        this.screech(ctx, master.input, now, duration, 2000, 4000);
        break;
      case 'magpie':
        this.magpie(ctx, master.input, now, duration);
        break;
      case 'jackdaw':
        this.jackdaw(ctx, master.input, now, duration);
        break;
      case 'mew':
        this.mew(ctx, master.input, now, duration, 800, 1200);
        break;
      case 'quack':
        this.quack(ctx, master.input, now, duration);
        break;
      default:
        this.warble(ctx, master.input, now, duration, 2000, 3000);
    }

    // Fade out master at end
    master.output.gain.setValueAtTime(master.output.gain.value, now + duration);
    master.output.gain.exponentialRampToValueAtTime(0.001, now + duration + 0.5);
    
    return duration + 0.5;
  }

  // Helper: create oscillator with envelope
  createOsc(ctx, type, freq, startTime, duration, dest, gain = 0.3) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startTime);
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(gain, startTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(g);
    g.connect(dest);
    osc.start(startTime);
    osc.stop(startTime + duration + 0.1);
    return osc;
  }

  // Warbling song (Robin, Blackcap)
  warble(ctx, dest, start, duration, f1, f2) {
    const notes = Math.floor(duration * 4);
    for (let i = 0; i < notes; i++) {
      const t = start + i * 0.25 + Math.random() * 0.1;
      const f = f1 + Math.random() * (f2 - f1);
      const len = 0.15 + Math.random() * 0.2;
      this.createOsc(ctx, 'sine', f, t, len, dest, 0.25);
      // Add harmonics
      this.createOsc(ctx, 'triangle', f * 2, t, len * 0.7, dest, 0.08);
    }
  }

  // Flute-like (Blackbird)
  flute(ctx, dest, start, duration, f1, f2) {
    const phrases = Math.floor(duration / 0.8);
    for (let p = 0; p < phrases; p++) {
      const pt = start + p * 0.8;
      const notes = 2 + Math.floor(Math.random() * 4);
      for (let n = 0; n < notes; n++) {
        const f = f1 + Math.random() * (f2 - f1);
        const len = 0.3 + Math.random() * 0.4;
        const t = pt + n * 0.35;
        this.createOsc(ctx, 'sine', f, t, len, dest, 0.3);
        this.createOsc(ctx, 'sine', f * 1.5, t, len * 0.5, dest, 0.1);
      }
    }
  }

  // Repeated phrases (Song Thrush)
  repeatNotes(ctx, dest, start, duration, f1, f2) {
    const repeats = Math.floor(duration / 1.2);
    for (let r = 0; r < repeats; r++) {
      const rt = start + r * 1.2;
      const baseF = f1 + Math.random() * (f2 - f1);
      for (let n = 0; n < 3; n++) {
        const t = rt + n * 0.18;
        this.createOsc(ctx, 'sine', baseF + n * 150, t, 0.2, dest, 0.25);
      }
    }
  }

  // Two-tone (Great Tit: tee-cher)
  twoTone(ctx, dest, start, duration, fHigh, fLow) {
    const pairs = Math.floor(duration / 0.5);
    for (let i = 0; i < pairs; i++) {
      const t = start + i * 0.5;
      this.createOsc(ctx, 'sine', fHigh, t, 0.12, dest, 0.3);
      this.createOsc(ctx, 'sine', fLow, t + 0.15, 0.15, dest, 0.3);
    }
  }

  // High chirps (Blue Tit)
  highChirps(ctx, dest, start, duration, f1, f2) {
    const count = Math.floor(duration * 6);
    for (let i = 0; i < count; i++) {
      const t = start + i * 0.16 + Math.random() * 0.05;
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, 0.08, dest, 0.2);
    }
  }

  // Chirruping (House Sparrow)
  chirrup(ctx, dest, start, duration, f1, f2) {
    const bursts = Math.floor(duration / 0.4);
    for (let b = 0; b < bursts; b++) {
      const bt = start + b * 0.4;
      for (let n = 0; n < 4; n++) {
        const f = f1 + Math.random() * (f2 - f1);
        this.createOsc(ctx, 'triangle', f, bt + n * 0.06, 0.05, dest, 0.15);
      }
    }
  }

  // Mimicry (Starling)
  mimic(ctx, dest, start, duration) {
    const segments = Math.floor(duration / 0.3);
    for (let i = 0; i < segments; i++) {
      const t = start + i * 0.3;
      const type = ['sine', 'triangle', 'sawtooth'][Math.floor(Math.random() * 3)];
      const f = 500 + Math.random() * 4000;
      const len = 0.1 + Math.random() * 0.2;
      this.createOsc(ctx, type, f, t, len, dest, 0.2);
    }
  }

  // Trill (Wren)
  trill(ctx, dest, start, duration, f1, f2) {
    const rate = 25; // notes per second
    const count = Math.floor(duration * rate);
    for (let i = 0; i < count; i++) {
      const t = start + i / rate;
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, 0.03, dest, 0.2);
    }
  }

  // Tinkling (Goldfinch)
  tinkling(ctx, dest, start, duration, f1, f2) {
    const notes = Math.floor(duration * 5);
    for (let i = 0; i < notes; i++) {
      const t = start + i * 0.2;
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, 0.08, dest, 0.15);
      this.createOsc(ctx, 'sine', f * 1.25, t + 0.02, 0.06, dest, 0.08);
    }
  }

  // Pink call (Chaffinch)
  pink(ctx, dest, start, duration, f1, f2) {
    this.createOsc(ctx, 'sine', f1, start, 0.15, dest, 0.3);
    if (duration > 0.5) {
      this.warble(ctx, dest, start + 0.3, duration - 0.3, f1 + 200, f2);
    }
  }

  // Wheezing (Greenfinch)
  wheezing(ctx, dest, start, duration, f1, f2) {
    const ctx2 = this.ensureContext();
    const osc = ctx2.createOscillator();
    const g = ctx2.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f1, start);
    osc.frequency.linearRampToValueAtTime(f2, start + duration * 0.5);
    osc.frequency.linearRampToValueAtTime(f1, start + duration);
    g.gain.setValueAtTime(0.15, start);
    g.gain.linearRampToValueAtTime(0.2, start + duration * 0.3);
    g.gain.linearRampToValueAtTime(0.05, start + duration);
    // Lowpass filter for wheeze
    const filter = ctx2.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800, start);
    filter.frequency.linearRampToValueAtTime(400, start + duration);
    osc.connect(filter);
    filter.connect(g);
    g.connect(dest);
    osc.start(start);
    osc.stop(start + duration + 0.1);
  }

  // Cooing (Wood Pigeon)
  coo(ctx, dest, start, duration, f1, f2) {
    const cooDuration = 0.4;
    const gap = 0.3;
    const count = Math.floor(duration / (cooDuration + gap));
    for (let i = 0; i < count; i++) {
      const t = start + i * (cooDuration + gap);
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, cooDuration, dest, 0.35);
      this.createOsc(ctx, 'sine', f * 0.5, t, cooDuration, dest, 0.15);
    }
  }

  // Coo-coo (Collared Dove)
  cooCoo(ctx, dest, start, duration, f1, f2) {
    const pairs = Math.floor(duration / 1.0);
    for (let i = 0; i < pairs; i++) {
      const t = start + i * 1.0;
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, 0.25, dest, 0.3);
      this.createOsc(ctx, 'sine', f * 0.8, t + 0.35, 0.3, dest, 0.3);
    }
  }

  // Fast warble
  warbleFast(ctx, dest, start, duration, f1, f2) {
    const notes = Math.floor(duration * 6);
    for (let i = 0; i < notes; i++) {
      const t = start + i * 0.16;
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, 0.1, dest, 0.22);
    }
  }

  // Chiff-chaff
  chiffChaff(ctx, dest, start, duration, f1, f2) {
    const pairs = Math.floor(duration / 0.4);
    for (let i = 0; i < pairs; i++) {
      const t = start + i * 0.4;
      this.createOsc(ctx, 'sine', f1, t, 0.1, dest, 0.25);
      this.createOsc(ctx, 'sine', f2, t + 0.15, 0.12, dest, 0.25);
    }
  }

  // Descending (Willow Warbler)
  descending(ctx, dest, start, duration, fStart, fEnd) {
    const ctx2 = this.ensureContext();
    const osc = ctx2.createOscillator();
    const g = ctx2.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(fStart, start);
    osc.frequency.exponentialRampToValueAtTime(fEnd, start + duration);
    g.gain.setValueAtTime(0.25, start);
    g.gain.linearRampToValueAtTime(0.05, start + duration);
    osc.connect(g);
    g.connect(dest);
    osc.start(start);
    osc.stop(start + duration + 0.1);
  }

  // Cuckoo call
  cuckooCall(ctx, dest, start, duration, f1, f2) {
    const pairs = Math.floor(duration / 1.5);
    for (let i = 0; i < pairs; i++) {
      const t = start + i * 1.5;
      this.createOsc(ctx, 'sine', f1, t, 0.3, dest, 0.3);
      this.createOsc(ctx, 'sine', f2, t + 0.5, 0.25, dest, 0.3);
    }
  }

  // Nightingale - complex beautiful song
  nightingale(ctx, dest, start, duration) {
    const phrases = Math.floor(duration / 0.6);
    for (let p = 0; p < phrases; p++) {
      const pt = start + p * 0.6;
      const notes = 3 + Math.floor(Math.random() * 5);
      for (let n = 0; n < notes; n++) {
        const f = 2000 + Math.random() * 3000;
        const len = 0.08 + Math.random() * 0.15;
        const t = pt + n * 0.12;
        this.createOsc(ctx, 'sine', f, t, len, dest, 0.2);
        // Add whistle overtones
        if (Math.random() > 0.5) {
          this.createOsc(ctx, 'sine', f * 1.5, t, len * 0.6, dest, 0.08);
        }
      }
    }
  }

  // Skylark - rising trill
  skylark(ctx, dest, start, duration) {
    const ctx2 = this.ensureContext();
    const osc = ctx2.createOscillator();
    const g = ctx2.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(3000, start);
    osc.frequency.exponentialRampToValueAtTime(6000, start + duration * 0.7);
    g.gain.setValueAtTime(0.15, start);
    g.gain.linearRampToValueAtTime(0.25, start + duration * 0.5);
    g.gain.linearRampToValueAtTime(0.05, start + duration);
    osc.connect(g);
    g.connect(dest);
    osc.start(start);
    osc.stop(start + duration + 0.1);
    
    // Add warbling
    this.warble(ctx, dest, start, duration, 3000, 5000);
  }

  // Owl hoot
  hoot(ctx, dest, start, duration, f1, f2) {
    const hoots = Math.floor(duration / 2.5);
    for (let i = 0; i < hoots; i++) {
      const t = start + i * 2.5;
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, 0.6, dest, 0.35);
      this.createOsc(ctx, 'sine', f * 0.5, t, 0.6, dest, 0.15);
    }
  }

  // Green Woodpecker yaffle (laughing)
  yaffle(ctx, dest, start, duration) {
    const bursts = Math.floor(duration / 0.3);
    for (let i = 0; i < bursts; i++) {
      const t = start + i * 0.3;
      const f = 400 + Math.random() * 300;
      this.createOsc(ctx, 'sawtooth', f, t, 0.1, dest, 0.15);
    }
  }

  // Woodpecker drumming
  drum(ctx, dest, start, duration) {
    const ctx2 = this.ensureContext();
    const bursts = Math.floor(duration / 1.0);
    for (let b = 0; b < bursts; b++) {
      const bt = start + b * 1.0;
      for (let n = 0; n < 12; n++) {
        const t = bt + n * 0.04;
        const osc = ctx2.createOscillator();
        const g = ctx2.createGain();
        const noise = ctx2.createBufferSource();
        const buffer = ctx2.createBuffer(1, ctx2.sampleRate * 0.02, ctx2.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        noise.buffer = buffer;
        g.gain.setValueAtTime(0.3, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
        noise.connect(g);
        g.connect(dest);
        noise.start(t);
        noise.stop(t + 0.03);
      }
    }
  }

  // Nuthatch pip
  pip(ctx, dest, start, duration, f1, f2) {
    const notes = Math.floor(duration * 3);
    for (let i = 0; i < notes; i++) {
      const t = start + i * 0.3 + Math.random() * 0.1;
      const f = f1 + Math.random() * (f2 - f1);
      this.createOsc(ctx, 'sine', f, t, 0.1, dest, 0.25);
    }
  }

  // Bullfinch sad pipe
  sadPipe(ctx, dest, start, duration, f1, f2) {
    const notes = Math.floor(duration / 0.8);
    for (let i = 0; i < notes; i++) {
      const t = start + i * 0.8;
      const f = f1 + Math.random() * (f2 - f1);
      const ctx2 = this.ensureContext();
      const osc = ctx2.createOscillator();
      const g = ctx2.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, t);
      osc.frequency.linearRampToValueAtTime(f * 0.9, t + 0.4);
      g.gain.setValueAtTime(0.25, t);
      g.gain.linearRampToValueAtTime(0.05, t + 0.4);
      osc.connect(g);
      g.connect(dest);
      osc.start(t);
      osc.stop(t + 0.5);
    }
  }

  // Yellowhammer "a-little-bit-of-bread"
  littleBit(ctx, dest, start, duration, f1, f2) {
    const phrases = Math.floor(duration / 1.2);
    for (let p = 0; p < phrases; p++) {
      const pt = start + p * 1.2;
      const notes = [1, 0.8, 0.6, 0.5];
      notes.forEach((mult, i) => {
        const f = f1 * mult + Math.random() * 100;
        this.createOsc(ctx, 'sine', f, pt + i * 0.15, 0.12, dest, 0.2);
      });
    }
  }

  // Jay screech
  screech(ctx, dest, start, duration, f1, f2) {
    const ctx2 = this.ensureContext();
    const osc = ctx2.createOscillator();
    const g = ctx2.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f1, start);
    osc.frequency.exponentialRampToValueAtTime(f2, start + duration * 0.3);
    osc.frequency.exponentialRampToValueAtTime(f1 * 0.5, start + duration);
    g.gain.setValueAtTime(0.15, start);
    g.gain.linearRampToValueAtTime(0.2, start + duration * 0.2);
    g.gain.linearRampToValueAtTime(0.05, start + duration);
    osc.connect(g);
    g.connect(dest);
    osc.start(start);
    osc.stop(start + duration + 0.1);
  }

  // Magpie chatter
  magpie(ctx, dest, start, duration) {
    const bursts = Math.floor(duration / 0.25);
    for (let i = 0; i < bursts; i++) {
      const t = start + i * 0.25;
      const f = 800 + Math.random() * 1500;
      this.createOsc(ctx, 'triangle', f, t, 0.08, dest, 0.15);
    }
  }

  // Jackdaw
  jackdaw(ctx, dest, start, duration) {
    const calls = Math.floor(duration / 0.6);
    for (let i = 0; i < calls; i++) {
      const t = start + i * 0.6;
      const f = 600 + Math.random() * 400;
      this.createOsc(ctx, 'sine', f, t, 0.2, dest, 0.25);
      this.createOsc(ctx, 'sine', f * 0.7, t + 0.15, 0.15, dest, 0.15);
    }
  }

  // Buzzard mew
  mew(ctx, dest, start, duration, f1, f2) {
    const ctx2 = this.ensureContext();
    const osc = ctx2.createOscillator();
    const g = ctx2.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f2, start);
    osc.frequency.exponentialRampToValueAtTime(f1, start + duration);
    g.gain.setValueAtTime(0.2, start);
    g.gain.linearRampToValueAtTime(0.05, start + duration);
    osc.connect(g);
    g.connect(dest);
    osc.start(start);
    osc.stop(start + duration + 0.1);
  }

  // Duck quack
  quack(ctx, dest, start, duration) {
    const quacks = Math.floor(duration / 0.5);
    for (let i = 0; i < quacks; i++) {
      const t = start + i * 0.5;
      const ctx2 = this.ensureContext();
      const osc = ctx2.createOscillator();
      const g = ctx2.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(400, t);
      osc.frequency.linearRampToValueAtTime(300, t + 0.15);
      osc.frequency.linearRampToValueAtTime(350, t + 0.25);
      g.gain.setValueAtTime(0.2, t);
      g.gain.linearRampToValueAtTime(0.05, t + 0.25);
      // Lowpass for quack sound
      const filter = ctx2.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(600, t);
      osc.connect(filter);
      filter.connect(g);
      g.connect(dest);
      osc.start(t);
      osc.stop(t + 0.3);
    }
  }
}

// ============================================================================
// SOUNDSCAPE ENGINE
// ============================================================================
class SoundscapeEngine {
  constructor() {
    this.enabled = new Map();
    this.currentlyPlaying = new Set();
    this.volume = 0.7;
    this.targetLayers = 5;
    this.onUpdate = null;
    this.isRunning = true;
    this.scheduleTimeouts = new Map();
    this.synth = new BirdSynth();
    this.maintenanceInterval = null;
  }

  setOnUpdate(cb) { this.onUpdate = cb; }
  setVolume(v) { this.volume = v; }
  setTargetLayers(n) { this.targetLayers = n; this.fillLayers(); }

  enableAll() {
    for (const bird of BIRDS) {
      this.enabled.set(bird.id, true);
    }
    this.fillLayers();
    this.startMaintenanceLoop();
    if (this.onUpdate) this.onUpdate();
  }

  fillLayers() {
    if (!this.isRunning) return;
    const currentActive = this.currentlyPlaying.size;
    const needed = this.targetLayers - currentActive;
    if (needed <= 0) return;
    
    const eligible = BIRDS.filter(b => 
      this.enabled.get(b.id) && 
      !this.currentlyPlaying.has(b.id)
    );
    if (eligible.length === 0) return;
    
    const shuffled = [...eligible];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    
    const toPlay = shuffled.slice(0, Math.min(needed, 3));
    for (const bird of toPlay) {
      this.playBirdNow(bird);
    }
  }

  playBirdNow(bird) {
    if (!this.enabled.get(bird.id)) return;
    if (this.currentlyPlaying.has(bird.id)) return;
    
    this.currentlyPlaying.add(bird.id);
    if (this.onUpdate) this.onUpdate();
    
    const duration = this.synth.play(bird, this.volume);
    
    setTimeout(() => {
      this.currentlyPlaying.delete(bird.id);
      if (this.onUpdate) this.onUpdate();
      if (this.enabled.get(bird.id) && this.isRunning) {
        this.scheduleBird(bird);
      }
    }, duration * 1000);
  }

  scheduleBird(bird) {
    if (!this.enabled.get(bird.id)) return;
    
    const existing = this.scheduleTimeouts.get(bird.id);
    if (existing) clearTimeout(existing);
    
    const activity = bird.activity || 0.7;
    const delay = Math.max(2000, 12000 / Math.max(0.2, activity)) * (0.5 + Math.random());
    
    const timeout = setTimeout(() => {
      if (this.enabled.get(bird.id) && this.isRunning && !this.currentlyPlaying.has(bird.id)) {
        this.playBirdNow(bird);
      }
    }, delay);
    
    this.scheduleTimeouts.set(bird.id, timeout);
  }

  startMaintenanceLoop() {
    if (this.maintenanceInterval) clearInterval(this.maintenanceInterval);
    this.maintenanceInterval = setInterval(() => {
      if (this.isRunning) {
        this.fillLayers();
      }
    }, 3000);
  }

  toggleBird(bird) {
    const wasEnabled = this.enabled.get(bird.id);
    if (wasEnabled) {
      this.enabled.set(bird.id, false);
      this.currentlyPlaying.delete(bird.id);
      const timeout = this.scheduleTimeouts.get(bird.id);
      if (timeout) clearTimeout(timeout);
      this.scheduleTimeouts.delete(bird.id);
    } else {
      this.enabled.set(bird.id, true);
      if (this.currentlyPlaying.size < this.targetLayers) {
        this.playBirdNow(bird);
      } else {
        this.scheduleBird(bird);
      }
    }
    if (this.onUpdate) this.onUpdate();
    return !wasEnabled;
  }

  stopAll() {
    for (const timeout of this.scheduleTimeouts.values()) {
      clearTimeout(timeout);
    }
    this.scheduleTimeouts.clear();
    this.currentlyPlaying.clear();
    if (this.onUpdate) this.onUpdate();
  }

  shutdown() {
    this.isRunning = false;
    if (this.maintenanceInterval) clearInterval(this.maintenanceInterval);
    this.stopAll();
    if (this.synth.ctx) {
      this.synth.ctx.close();
      this.synth.ctx = null;
    }
  }
}

// ============================================================================
// UI APP
// ============================================================================
let engine = null;
let uiState = { started: false, volume: 70, targetLayers: 5 };

function init() {
  if (engine) engine.shutdown();
  
  engine = new SoundscapeEngine();
  engine.setVolume(uiState.volume / 100);
  engine.setTargetLayers(uiState.targetLayers);
  engine.setOnUpdate(() => render());
  engine.enableAll();
  
  uiState.started = true;
  render();
}

function toggleBird(bird) { if (engine) engine.toggleBird(bird); }
function updateVolume(val) { uiState.volume = val; if (engine) engine.setVolume(val / 100); render(); }
function updateLayers(val) { uiState.targetLayers = val; if (engine) engine.setTargetLayers(val); render(); }
function stopAll() { if (engine) engine.stopAll(); }

function render() {
  if (!uiState.started) {
    document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div class="card" style="max-width:550px;text-align:center;background:linear-gradient(135deg,#0f172a,#0a0f1c);">
          <div style="font-size:4rem;">🌲🐦</div>
          <h1 style="font-size:1.8rem;font-weight:900;margin:1rem 0 0.5rem;">Bedfordshire & Northamptonshire Garden Birds</h1>
          <p style="color:#94a3b8;margin-bottom:1rem;">30 British bird species · Procedural synthesized soundscape<br><strong>All birds enabled by default</strong> — instant sound, zero loading!</p>
          <button class="btn-primary" onclick="init()">🌿 Enter the Garden</button>
          <p style="font-size:0.7rem;color:#475569;margin-top:1.5rem;">Synthesized in real-time using Web Audio API · No downloads · Works offline</p>
        </div>
      </div>
    `;
    return;
  }

  const enabledCount = engine.enabled ? Array.from(engine.enabled.values()).filter(v => v === true).length : 0;
  const currentlyPlaying = engine.currentlyPlaying || new Set();
  const activeCount = currentlyPlaying.size;
  const fillPercent = Math.min(100, (activeCount / uiState.targetLayers) * 100);

  const html = `
    <header class="sticky-header">
      <div class="container" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:1.8rem;">🌲</span>
          <div>
            <div style="font-weight:800;">Bedfordshire & Northamptonshire Garden Birds</div>
            <div style="font-size:0.7rem;color:#10b981;">${enabledCount} birds enabled · <span style="font-size:1.1rem;font-weight:800;color:#fbbf24;">${activeCount}</span> / ${uiState.targetLayers} singing now</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🔊</span>
            <input type="range" min="0" max="100" value="${uiState.volume}" oninput="updateVolume(this.value)" style="width:100px;">
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🎚️ Target layers</span>
            <input type="range" min="1" max="10" value="${uiState.targetLayers}" oninput="updateLayers(this.value)" style="width:80px;">
          </div>
          <button class="btn-secondary" onclick="stopAll()">⏹️ Silence</button>
        </div>
      </div>
    </header>
    <main class="container" style="padding:24px 20px;">
      <div class="live-panel">
        <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <span style="font-size:0.75rem;font-weight:600;color:#94a3b8;">🎵 CONTINUOUS LAYERED CHORUS — ${activeCount} birds singing right now!</span>
          <span style="font-size:0.7rem;color:#6ee7b7;">${activeCount} of ${uiState.targetLayers} layers active</span>
        </div>
        <div style="height:6px;background:#1e293b;border-radius:10px;margin-bottom:12px;overflow:hidden;">
          <div style="width:${fillPercent}%;height:100%;background:linear-gradient(90deg,#10b981,#fbbf24);border-radius:10px;transition:width 0.3s;"></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${Array.from(currentlyPlaying).slice(0, 18).map(id => {
            const b = BIRDS.find(bird => bird.id === id);
            return b ? `<div class="now-playing"><span></span>${b.icon} ${b.name}</div>` : '';
          }).join('')}
          ${activeCount === 0 ? '<span style="font-size:0.7rem;color:#fbbf24;">✨ Birds will start singing immediately ✨</span>' : ''}
          ${activeCount > 18 ? `<div class="now-playing">+${activeCount-18} more</div>` : ''}
        </div>
      </div>
      
      <div class="grid-sounds">
        ${BIRDS.map(bird => {
          const isEnabled = engine.enabled?.get(bird.id) || false;
          const isPlaying = currentlyPlaying.has(bird.id);
          return `
            <div class="sound-card ${isEnabled ? 'sound-card-enabled' : ''} ${isPlaying ? 'sound-card-playing' : ''}" onclick="toggleBird(BIRDS.find(b=>b.id==='${bird.id}'))">
              ${isEnabled ? '<div class="badge-enabled" title="Enabled"></div>' : ''}
              ${isPlaying ? '<div class="badge-playing" title="Singing now"></div>' : ''}
              <div class="sound-icon">${bird.icon}</div>
              <div class="sound-name">${bird.name}</div>
            </div>
          `;
        }).join('')}
      </div>
      
      <div style="margin-top:24px;padding:14px;background:#0f172a;border-radius:12px;border:1px solid #1e293b;">
        <div style="font-size:0.7rem;color:#94a3b8;text-align:center;">
          💫 <strong>Birds are singing RIGHT NOW!</strong> — All ${enabledCount} birds are enabled by default.<br>
          The engine maintains <strong>${uiState.targetLayers} layers</strong> of overlapping birdsong. Green border = enabled · Gold pulse = currently singing.<br>
          Sounds are synthesized in real-time using the Web Audio API — no external files, no loading delays, works offline!
        </div>
      </div>
    </main>
  `;
  document.getElementById('app').innerHTML = html;
}

window.init = init;
window.toggleBird = toggleBird;
window.updateVolume = updateVolume;
window.updateLayers = updateLayers;
window.stopAll = stopAll;
window.BIRDS = BIRDS;

render();
</script>
</body>
</html>
