// AUTONOMOUS SOUNDSCAPE ENGINE - ALL SELECTED BY DEFAULT, LAYERED, ENDLESS
// ============================================================================
class SoundscapeEngine {
  constructor() {
    this.enabled = new Map();      // soundId -> boolean
    this.activePlayers = new Map(); // soundId -> { audio, timeout }
    this.currentlyPlaying = new Set();
    this.volume = 0.6;
    this.maxConcurrent = 6;
    this.onUpdate = null;
    this.recordingCache = new Map();
    this.isRunning = true;
  }

  setOnUpdate(cb) { this.onUpdate = cb; }
  setVolume(v) { this.volume = v; }
  setMaxConcurrent(n) { this.maxConcurrent = n; }

  // Enable all sounds by default (beautiful welcoming cacophony)
  enableAll() {
    for (const s of ALL_SOUNDS) {
      if (!this.enabled.get(s.id)) {
        this.enabled.set(s.id, true);
        this.scheduleSound(s);
      }
    }
    if (this.onUpdate) this.onUpdate();
  }

  toggleSound(sound) {
    const wasEnabled = this.enabled.get(sound.id);
    if (wasEnabled) {
      this.stopSound(sound.id);
      this.enabled.set(sound.id, false);
    } else {
      this.enabled.set(sound.id, true);
      this.scheduleSound(sound);
    }
    if (this.onUpdate) this.onUpdate();
    return !wasEnabled;
  }

  stopSound(soundId) {
    const player = this.activePlayers.get(soundId);
    if (player) {
      if (player.timeout) clearTimeout(player.timeout);
      if (player.audio) {
        player.audio.pause();
        player.audio.src = '';
      }
      this.activePlayers.delete(soundId);
      this.currentlyPlaying.delete(soundId);
    }
  }

  async scheduleSound(sound) {
    if (!this.isRunning) return;
    if (!this.enabled.get(sound.id)) return;

    // Wait if we're at max concurrency
    if (this.currentlyPlaying.size >= this.maxConcurrent) {
      const delay = 1500 + Math.random() * 2500;
      const timeout = setTimeout(() => this.scheduleSound(sound), delay);
      this.activePlayers.set(sound.id, { timeout });
      return;
    }

    // Activity-based delay: more active birds sing more often (1s to 15s)
    const activity = sound.activity || 0.6;
    const baseDelay = Math.max(1200, 14000 / Math.max(0.2, activity));
    const delay = baseDelay * (0.4 + Math.random() * 0.8);
    
    const timeout = setTimeout(async () => {
      if (!this.enabled.get(sound.id) || !this.isRunning) return;
      
      let url = sound.url;
      if (!url && sound.type !== 'ambient') {
        url = await this.getBirdRecording(sound.latin);
        if (!url) {
          // retry later if failed
          this.scheduleSound(sound);
          return;
        }
      }
      
      // Play the sound
      const audio = new Audio();
      audio.crossOrigin = 'anonymous';
      audio.src = url;
      audio.volume = this.volume * (0.6 + Math.random() * 0.3);
      
      const onEnd = () => {
        if (this.currentlyPlaying.has(sound.id)) {
          this.currentlyPlaying.delete(sound.id);
          if (this.onUpdate) this.onUpdate();
        }
        // Schedule next occurrence
        this.scheduleSound(sound);
      };
      
      audio.addEventListener('ended', onEnd);
      audio.addEventListener('error', () => {
        console.warn(`Error playing ${sound.name}`);
        onEnd();
      });
      
      try {
        await audio.play();
        this.currentlyPlaying.add(sound.id);
        const existing = this.activePlayers.get(sound.id);
        if (existing && existing.timeout) clearTimeout(existing.timeout);
        this.activePlayers.set(sound.id, { audio });
        if (this.onUpdate) this.onUpdate();
      } catch(e) {
        console.warn(`Failed to play ${sound.name}`, e);
        this.scheduleSound(sound);
      }
    }, delay);
    
    this.activePlayers.set(sound.id, { timeout });
  }

  async getBirdRecording(latinName) {
    if (this.recordingCache.has(latinName)) return this.recordingCache.get(latinName);
    try {
      const url = `https://xeno-canto.org/api/2/recordings?query=${encodeURIComponent(latinName)}+q:A+len:0-25`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.recordings && data.recordings.length > 0) {
        const rec = data.recordings.find(r => r.file) || data.recordings[0];
        const audioUrl = rec.file.startsWith('//') ? `https:${rec.file}` : rec.file;
        this.recordingCache.set(latinName, audioUrl);
        return audioUrl;
      }
    } catch(e) { console.warn(e); }
    // graceful fallback - use a generic gentle bird ambience rather than failing
    const fallback = 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_5f5f5f5f5f.mp3';
    this.recordingCache.set(latinName, fallback);
    return fallback;
  }

  stopAll() {
    for (const [id, player] of this.activePlayers) {
      if (player.timeout) clearTimeout(player.timeout);
      if (player.audio) {
        player.audio.pause();
        player.audio.src = '';
      }
    }
    this.activePlayers.clear();
    this.currentlyPlaying.clear();
    if (this.onUpdate) this.onUpdate();
  }

  shutdown() {
    this.isRunning = false;
    this.stopAll();
  }
}

  render();
}
