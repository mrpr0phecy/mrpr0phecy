// Audio fetching (original)
const recordingCache = new Map();
async function fetchXenoCanto(latinName) {
  const queries = [`${latinName} cnt:"united kingdom" q:A len:0-15`, `${latinName} cnt:"united kingdom" q:A`, `${latinName} q:A len:0-20`, `${latinName} q:A`];
  for (const query of queries) {
    try {
      const url = `https://xeno-canto.org/api/2/recordings?query=${encodeURIComponent(query)}`;
      const response = await fetch(url);
      if (!response.ok) continue;
      const data = await response.json();
      if (data.recordings && data.recordings.length > 0) {
        const recordings = data.recordings.slice(0, 12).filter(r => r.file).map(r => ({ id: `xc-${r.id}`, url: r.file.startsWith('//') ? `https:${r.file}` : r.file, recordist: r.rec || 'Unknown', location: r.loc || 'Unknown', source: 'xeno-canto', attribution: `XC${r.id} · ${r.rec || 'Unknown'} · xeno-canto.org` }));
        if (recordings.length) return recordings;
      }
    } catch(e) { console.warn(e); }
  }
  return [];
}
async function fetchWikimedia(latinName, commonName) {
  try {
    const searches = [`${latinName} song`, `${latinName} call`, `${commonName} song`, latinName];
    for (const searchTerm of searches) {
      const url = `https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}+filetype:audio&srnamespace=6&format=json&origin=*&srlimit=10`;
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const data = await resp.json();
      if (data.query?.search?.length) {
        const recordings = [];
        for (const item of data.query.search.slice(0, 5)) {
          const title = item.title;
          const detailUrl = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=imageinfo&iiprop=url|mime&format=json&origin=*`;
          const det = await fetch(detailUrl);
          const detData = await det.json();
          const pages = detData.query?.pages;
          if (!pages) continue;
          const page = Object.values(pages)[0];
          const info = page?.imageinfo?.[0];
          if (!info || !info.url || !info.mime?.startsWith('audio/')) continue;
          recordings.push({ id: `wm-${title.replace(/\s+/g, '_')}`, url: info.url, recordist: 'Wikimedia Commons', location: 'Wikimedia', source: 'wikimedia', attribution: title });
        }
        if (recordings.length) return recordings;
      }
    }
  } catch(e) { console.warn(e); }
  return [];
}
async function fetchRecordings(latinName, commonName) {
  if (recordingCache.has(latinName)) return recordingCache.get(latinName);
  const [xc, wm] = await Promise.allSettled([fetchXenoCanto(latinName), fetchWikimedia(latinName, commonName)]);
  const all = [];
  if (xc.status === 'fulfilled') all.push(...xc.value);
  if (wm.status === 'fulfilled') all.push(...wm.value);
  recordingCache.set(latinName, all);
  return all;
}

// Ambient generators (original)
function createNoiseBuffer(ctx, duration, type) { /* simplified but functional */ const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate); const data = buf.getChannelData(0); for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1; return buf; }
const AMBIENT_GENERATORS = {
  'amb-leaves': (ctx,out,vol)=>{ const src=ctx.createBufferSource(); src.buffer=createNoiseBuffer(ctx,4,'pink'); src.loop=true; const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2500; const g=ctx.createGain(); g.gain.value=vol*0.08; src.connect(f); f.connect(g); g.connect(out); src.start(); return ()=>{ g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.5); setTimeout(()=>src.stop(),600); }; },
  'amb-water': (ctx,out,vol)=>{ const mg=ctx.createGain(); mg.gain.value=vol*0.4; mg.connect(out); let stop=false; const drip=()=>{ if(stop)return; const osc=ctx.createOscillator(); osc.frequency.value=800+Math.random()*400; const g=ctx.createGain(); g.gain.setValueAtTime(0.15,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15); osc.connect(g); g.connect(mg); osc.start(); osc.stop(ctx.currentTime+0.2); setTimeout(drip,1500+Math.random()*2500); }; drip(); return ()=>{ stop=true; mg.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3); }; },
  'amb-soil': (ctx,out,vol)=>{ const mg=ctx.createGain(); mg.gain.value=vol*0.06; mg.connect(out); const src=ctx.createBufferSource(); src.buffer=createNoiseBuffer(ctx,4,'brown'); src.loop=true; const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=250; src.connect(f); f.connect(mg); src.start(); return ()=>{ mg.gain.linearRampToValueAtTime(0,ctx.currentTime+0.5); setTimeout(()=>src.stop(),600); }; },
  'amb-seeds': (ctx,out,vol)=>{ const mg=ctx.createGain(); mg.gain.value=vol*0.5; mg.connect(out); let stop=false; const patter=()=>{ if(stop)return; for(let i=0;i<8+Math.random()*8;i++){ setTimeout(()=>{ if(stop)return; const buf=createNoiseBuffer(ctx,0.02); const src=ctx.createBufferSource(); src.buffer=buf; const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=3000; const g=ctx.createGain(); g.gain.value=0.05+Math.random()*0.08; g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.03); src.connect(f); f.connect(g); g.connect(mg); src.start(); src.stop(ctx.currentTime+0.05); }, i*(10+Math.random()*40)); } setTimeout(patter,4000+Math.random()*6000); }; patter(); return ()=>{ stop=true; mg.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3); }; },
  'amb-wind': (ctx,out,vol)=>{ const src=ctx.createBufferSource(); src.buffer=createNoiseBuffer(ctx,4,'brown'); src.loop=true; const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600; const g=ctx.createGain(); g.gain.value=vol*0.05; src.connect(f); f.connect(g); g.connect(out); src.start(); return ()=>{ g.gain.linearRampToValueAtTime(0,ctx.currentTime+1); setTimeout(()=>src.stop(),1100); }; },
  'amb-rain': (ctx,out,vol)=>{ const src=ctx.createBufferSource(); src.buffer=createNoiseBuffer(ctx,3,'pink'); src.loop=true; const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=1500; const g=ctx.createGain(); g.gain.value=vol*0.07; src.connect(f); f.connect(g); g.connect(out); src.start(); return ()=>{ g.gain.linearRampToValueAtTime(0,ctx.currentTime+1); setTimeout(()=>src.stop(),1100); }; },
  'amb-bees': (ctx,out,vol)=>{ const mg=ctx.createGain(); mg.gain.value=vol*0.15; mg.connect(out); const oscs=[]; for(let i=0;i<3;i++){ const osc=ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=220+Math.random()*30; const lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=12+Math.random()*8; const lfoG=ctx.createGain(); lfoG.gain.value=15+Math.random()*10; lfo.connect(lfoG); lfoG.connect(osc.frequency); const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=osc.frequency.value; const og=ctx.createGain(); og.gain.value=0.15+Math.random()*0.1; osc.connect(f); f.connect(og); og.connect(mg); osc.start(); lfo.start(); oscs.push(osc,lfo); } return ()=>{ mg.gain.linearRampToValueAtTime(0,ctx.currentTime+0.5); setTimeout(()=>{ oscs.forEach(o=>{ try{o.stop();}catch(e){} }); },600); }; },
  'amb-cricket': (ctx,out,vol)=>{ const mg=ctx.createGain(); mg.gain.value=vol*0.3; mg.connect(out); let stop=false; const chirp=()=>{ if(stop)return; for(let i=0;i<3;i++){ setTimeout(()=>{ if(stop)return; const osc=ctx.createOscillator(); osc.type='sine'; osc.frequency.value=4500+Math.random()*200; const g=ctx.createGain(); g.gain.setValueAtTime(0.2,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08); osc.connect(g); g.connect(mg); osc.start(); osc.stop(ctx.currentTime+0.1); },i*350); } setTimeout(chirp,1500+Math.random()*1500); }; chirp(); return ()=>{ stop=true; mg.gain.linearRampToValueAtTime(0,ctx.currentTime+0.3); }; },
  'amb-stream': (ctx,out,vol)=>{ const src=ctx.createBufferSource(); src.buffer=createNoiseBuffer(ctx,4,'pink'); src.loop=true; const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=3000; const g=ctx.createGain(); g.gain.value=vol*0.1; src.connect(f); f.connect(g); g.connect(out); src.start(); return ()=>{ g.gain.linearRampToValueAtTime(0,ctx.currentTime+1); setTimeout(()=>src.stop(),1100); }; },
};

// Garden Soundscape Engine (original)
class GardenSoundscape {
  constructor() { this.calls = []; this.volume = 0.5; this.maxLayers = 4; this.onChange = null; this.stage = 'morning'; }
  setVolume(v) { this.volume = v; this.calls.forEach(c => c.audio.volume = v); }
  setMaxLayers(n) { this.maxLayers = n; while(this.calls.length > n) { const c = this.calls.shift(); if(c) { c.audio.pause(); c.audio.src = ''; } } }
  setOnChange(cb) { this.onChange = cb; }
  getActive() { return this.calls; }
  setStage(s) { this.stage = s; }
  async play(species, rec) {
    while(this.calls.length >= this.maxLayers) { const c = this.calls.shift(); if(c) { c.audio.pause(); c.audio.src = ''; } }
    const zone = GARDEN_ZONES[Math.floor(Math.random() * GARDEN_ZONES.length)];
    const audio = new Audio(); audio.crossOrigin = 'anonymous'; audio.src = rec.url; audio.volume = 0;
    try { const ctx = new AudioContext(); const panner = ctx.createStereoPanner(); panner.pan.value = zone.pan; const src = ctx.createMediaElementSource(audio); src.connect(panner); panner.connect(ctx.destination); } catch(e) {}
    const call = { id: `${species.id}-${Date.now()}`, speciesId: species.id, audio, pan: zone.pan, recording: rec, species, startedAt: Date.now() };
    audio.addEventListener('ended', () => this.remove(call.id)); audio.addEventListener('error', () => this.remove(call.id));
    this.calls.push(call); if(this.onChange) this.onChange();
    try { await audio.play(); audio.volume = 0; this.fadeTo(audio, this.volume * 0.85, 800); } catch(e) { this.remove(call.id); }
  }
  fadeTo(audio, target, ms) { const start = audio.volume; const diff = target - start; const steps = 20; for(let i=1;i<=steps;i++) setTimeout(() => { try { audio.volume = start + diff * (i/steps); } catch(e) {} }, i*(ms/steps)); }
  remove(id) { this.calls = this.calls.filter(c => c.id !== id); if(this.onChange) this.onChange(); }
  stopAll() { this.calls.forEach(c => { c.audio.pause(); c.audio.src = ''; }); this.calls = []; if(this.onChange) this.onChange(); }
  getActivityForStage() { const rates = { dawn:0.6, morning:0.4, midday:0.12, afternoon:0.25, dusk:0.45, night:0.05 }; return rates[this.stage]; }
}

// App state
let engine = null, audioCtx = null, ambientGain = null, activeAtmos = [], ambientStops = new Map(), autoTimer = null, stageTimer = null, currentAmbientId = null;
let state = { started: false, volume: 45, layers: 4, activeIds: [], loading: null, auto: true, stage: 'morning', cache: {}, currentSong: null };
function setState(u) { Object.assign(state, u); render(); }
function clearAtmos() { activeAtmos.forEach(s=>s()); activeAtmos=[]; }
function clearAmbient() { ambientStops.forEach(s=>s()); ambientStops.clear(); currentAmbientId=null; }
function startAmbientSound() { if(!audioCtx||!ambientGain) return; if(currentAmbientId&&ambientStops.has(currentAmbientId)) ambientStops.get(currentAmbientId)(); const map={ dawn:['amb-wind','amb-leaves'], morning:['amb-bees','amb-wind'], midday:['amb-bees','amb-cricket'], afternoon:['amb-wind','amb-leaves'], dusk:['amb-cricket','amb-stream'], night:['amb-wind','amb-stream'] }; const pool=map[state.stage]||['amb-wind']; const id=pool[Math.floor(Math.random()*pool.length)]; if(AMBIENT_GENERATORS[id]){ const stop=AMBIENT_GENERATORS[id](audioCtx,ambientGain,1); ambientStops.set(id,stop); currentAmbientId=id; } }
function startAutoInterval() { if(autoTimer) clearTimeout(autoTimer); if(!engine) return; const tick=()=>{ const pool=BIRDS.filter(s=>s.welcoming); if(pool.length){ const bird=pool[Math.floor(Math.random()*pool.length)]; const recs=state.cache[bird.latinName]; if(recs&&recs.length){ engine.play(bird,recs[Math.floor(Math.random()*recs.length)]); state.currentSong={species:bird,zone:'garden'}; render(); if(Math.random()<0.3){ const pool2=BIRDS.filter(x=>x.welcoming&&x.id!==bird.id); if(pool2.length){ const reply=pool2[Math.floor(Math.random()*pool2.length)]; setTimeout(()=>{ const repRecs=state.cache[reply.latinName]; if(repRecs&&repRecs.length) engine.play(reply,repRecs[Math.floor(Math.random()*repRecs.length)]); },800+Math.random()*1200); } } } } const activity=engine.getActivityForStage(); const delay=(3000/Math.max(0.05,activity))*(0.5+Math.random()); autoTimer=setTimeout(tick,delay); }; autoTimer=setTimeout(tick,800); }
async function startApp() { if(!engine){ engine=new GardenSoundscape(); engine.setVolume(state.volume/100); engine.setMaxLayers(state.layers); engine.setOnChange(()=>{ state.activeIds=engine.getActive().map(c=>c.speciesId); if(engine.getActive().length){ const last=engine.getActive()[engine.getActive().length-1]; state.currentSong={species:last.species,zone:GARDEN_ZONES.find(z=>Math.abs(z.pan-last.pan)<0.2)?.label||'Garden'}; }else state.currentSong=null; render(); }); } if(!audioCtx){ audioCtx=new AudioContext(); ambientGain=audioCtx.createGain(); ambientGain.gain.value=state.volume/100; ambientGain.connect(audioCtx.destination); } state.started=true; if(stageTimer) clearInterval(stageTimer); stageTimer=setInterval(()=>{ const order=['dawn','morning','midday','afternoon','dusk','night']; const idx=order.indexOf(state.stage); const next=order[(idx+1)%order.length]; state.stage=next; if(engine) engine.setStage(next); clearAtmos(); startAmbientSound(); render(); },60000); startAmbientSound(); startAutoInterval(); render(); }
async function playSound(sound) { if(sound.type==='ambient'){ if(ambientStops.has(sound.id)){ ambientStops.get(sound.id)(); ambientStops.delete(sound.id); if(currentAmbientId===sound.id) currentAmbientId=null; }else{ if(!audioCtx){ audioCtx=new AudioContext(); ambientGain=audioCtx.createGain(); ambientGain.gain.value=state.volume/100; ambientGain.connect(audioCtx.destination); } if(audioCtx.state==='suspended') audioCtx.resume(); if(AMBIENT_GENERATORS[sound.id]){ const stop=AMBIENT_GENERATORS[sound.id](audioCtx,ambientGain,1); ambientStops.set(sound.id,stop); currentAmbientId=sound.id; } } render(); return; } if(!engine) return; state.loading=sound.id; render(); try{ let recs=state.cache[sound.latinName]; if(!recs){ recs=await fetchRecordings(sound.latinName,sound.name); state.cache[sound.latinName]=recs; } state.loading=null; if(recs.length>0){ const r=recs[Math.floor(Math.random()*recs.length)]; state.currentSong={species:sound,zone:'center'}; await engine.play(sound,r); if(Math.random()<0.25){ setTimeout(()=>{ const r2=recs[Math.floor(Math.random()*recs.length)]; if(r2) engine.play(sound,r2); },600+Math.random()*800); } } }catch(e){ state.loading=null; } render(); }
function stopAll(){ if(engine) engine.stopAll(); clearAmbient(); clearAtmos(); if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; } state.auto=false; render(); }

  }
  document.getElementById('app').innerHTML = `
    <header class="sticky-header"><div class="container flex items-center justify-between gap-4 flex-wrap"><div class="flex items-center gap-3"><span class="text-2xl">🌲</span><div><div class="font-bold text-sm text-white">Bedfordshire Bird Sanctuary</div><div class="text-[9px] text-slate-500 uppercase tracking-wider font-semibold">91 Sounds · Circadian Engine · Always On</div></div></div><div class="flex items-center gap-3 flex-wrap"><span class="text-[10px] font-bold text-emerald-400 uppercase">${stageLabel}</span><input type="range" min="0" max="100" value="${state.volume}" oninput="state.volume=+this.value;engine&&engine.setVolume(state.volume/100);ambientGain&&(ambientGain.gain.value=state.volume/100);render();" class="w-20 h-1">${state.activeIds.length>0?`<button onclick="stopAll()" class="btn-secondary" style="background:#334155;color:#fff;padding:6px 16px;border-radius:40px;">⏹ Stop</button>`:''}</div></div></header>
    <main class="container" style="padding:20px 0 40px;">${liveIndicator}<div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-1 space-y-4"><div class="card"><div class="flex items-center justify-between mb-2"><span class="text-xs font-bold uppercase text-slate-400 tracking-wider">Layers</span><span class="text-[10px] font-black px-3 py-1 rounded-full bg-slate-800 text-slate-300">${state.layers} max</span></div><input type="range" min="1" max="8" value="${state.layers}" oninput="state.layers=+this.value;engine&&engine.setMaxLayers(state.layers);render();" class="w-full"><div class="flex justify-between text-[9px] text-slate-500 mt-1 font-bold"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span></div><div class="text-[9px] text-slate-500 mt-1">How many sounds overlap at once</div></div><div class="card"><div class="text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">Circadian Stage</div><div class="font-black text-sm text-white">${stageLabel}</div><div class="mt-2 progress-bar"><div class="progress-fill" style="width:${stageProgress}%"></div></div><div class="text-[9px] text-slate-500 mt-1">Auto-advances every 60 seconds</div></div>${state.currentSong?`<div class="card" style="background:linear-gradient(135deg,#0f172a,#0a0f1c);border-color:#10b981;"><div class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Now Playing</div><div class="font-bold text-lg mt-1 text-white">${state.currentSong.species.icon} ${state.currentSong.species.name}</div><div class="text-[10px] text-slate-400 mt-1">${state.currentSong.species.latinName} · ${state.currentSong.zone}</div><div class="text-[9px] text-slate-500 mt-2">${state.currentSong.species.description}</div></div>`:''}</div><div class="lg:col-span-2 space-y-4"><div class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">All Sounds — Click any to trigger</div><div class="grid-sounds">${AMBIENTS.map(a=>`<button onclick="playSound(AMBIENTS.find(x=>x.id==='${a.id}'))" class="ambient-btn ${ambientStops.has(a.id)?'ambient-btn-active':''}"><span class="text-xl">${a.icon}</span><span class="sound-name">${a.name}</span>${currentAmbientId===a.id?'<span class="w-1.5 h-1.5 bg-amber-500 rounded-full mt-0.5"></span>':''}</button>`).join('')}</div><div style="height:1px;background:#334155;margin:8px 0;"></div><div class="grid-sounds">${BIRDS.map(s=>{const active=state.activeIds.includes(s.id);const isLoading=state.loading===s.id;return `<button onclick="playSound(BIRDS.find(x=>x.id==='${s.id}'))" class="bird-btn ${active?'bird-btn-active':''}"><span class="text-xl drop-shadow-sm">${s.icon}</span><span class="sound-name">${s.name}</span>${isLoading?'<div class="spinner mt-1"></div>':''}</button>`;}).join('')}</div></div></div></main>`;
}
render();
window.startApp = startApp; window.playSound = playSound; window.stopAll = stopAll; window.BIRDS = BIRDS; window.AMBIENTS = AMBIENTS;
</script>
