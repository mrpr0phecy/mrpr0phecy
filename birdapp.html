<meta charset="UTF-8" />

<title>🌿 Beds & Northants Garden Birds · WORKING SOUNDSCAPE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0b1120;
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  color: #eef2ff;
  line-height: 1.5;
  overflow-x: hidden;
}
.container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11, 17, 32, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}
.btn-primary {
  background: linear-gradient(135deg, #10b981, #059669);
  padding: 12px 28px;
  border-radius: 40px;
  color: white;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: 0.2s;
  font-size: 1rem;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
.btn-secondary {
  background: #1e293b;
  padding: 8px 18px;
  border-radius: 40px;
  color: #cbd5e6;
  font-weight: 600;
  font-size: 0.75rem;
  border: 1px solid #334155;
  cursor: pointer;
}
.btn-secondary:hover { background: #2d3a4e; color: white; }
.sound-card {
  background: #111827;
  border-radius: 1.25rem;
  border: 2px solid #1f2a3e;
  padding: 0.75rem 0.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.sound-card:hover { background: #1a2538; transform: translateY(-2px); }
.sound-card-enabled { border-color: #10b981; background: #0f1a1f; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
.sound-card-playing { animation: playingPulse 1s ease-in-out infinite; border-color: #fbbf24; }
@keyframes playingPulse {
  0% { box-shadow: 0 0 0 0 rgba(251,191,36,0.6); }
  70% { box-shadow: 0 0 0 6px rgba(251,191,36,0); }
  100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
}
.sound-icon { font-size: 1.8rem; }
.sound-name { font-size: 0.7rem; font-weight: 700; text-align: center; line-height: 1.3; }
@media (min-width: 768px) {
  .sound-name { font-size: 0.8rem; }
  .sound-icon { font-size: 2rem; }
}
.badge-enabled {
  position: absolute;
  top: 6px;
  right: 8px;
  width: 10px;
  height: 10px;
  background: #10b981;
  border-radius: 50%;
  box-shadow: 0 0 6px #10b981;
}
.badge-playing {
  position: absolute;
  top: 6px;
  left: 8px;
  width: 8px;
  height: 8px;
  background: #fbbf24;
  border-radius: 50%;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
.grid-sounds {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
  gap: 10px;
}
@media (min-width: 640px) { .grid-sounds { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); } }
.live-panel {
  background: #0f172a;
  border-radius: 1rem;
  padding: 14px 18px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}
.now-playing {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(16, 185, 129, 0.15);
  padding: 5px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #6ee7b7;
}
.now-playing span { width: 8px; height: 8px; background: #6ee7b7; border-radius: 50%; animation: pulse 1s infinite; }
input[type="range"] { -webkit-appearance: none; background: #1e293b; height: 4px; border-radius: 10px; width: 100%; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #10b981; border-radius: 50%; cursor: pointer; }
.card { background: #111827; border-radius: 1.25rem; padding: 1rem; border: 1px solid #1f2a3e; }

  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #ef4444;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 0.8rem;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.error-toast.show { opacity: 1; }

<body>

// ============================================================================
// SOUNDSCAPE ENGINE - FIXED WITH ERROR HANDLING
// ============================================================================
class SoundscapeEngine {
  constructor() {
    this.enabled = new Map();
    this.activeAudios = new Map();
    this.currentlyPlaying = new Set();
    this.volume = 0.7;
    this.targetLayers = 5;
    this.onUpdate = null;
    this.isRunning = true;
    this.scheduleTimeouts = new Map();
    this.errorCount = new Map();
    this.maintenanceInterval = null;
  }

  setOnUpdate(cb) { this.onUpdate = cb; }
  setVolume(v) { 
    this.volume = v; 
    for (const audio of this.activeAudios.values()) {
      if (audio) audio.volume = this.volume * (0.6 + Math.random() * 0.4);
    }
  }
  setTargetLayers(n) { this.targetLayers = n; this.fillLayers(); }

  enableAll() {
    for (const bird of BIRDS) {
      this.enabled.set(bird.id, true);
      this.errorCount.set(bird.id, 0);
    }
    this.fillLayers();
    this.startMaintenanceLoop();
    if (this.onUpdate) this.onUpdate();
  }

  fillLayers() {
    if (!this.isRunning) return;
    const currentActive = this.currentlyPlaying.size;
    const needed = this.targetLayers - currentActive;
    if (needed <= 0) return;
    
    const eligible = BIRDS.filter(b => 
      this.enabled.get(b.id) && 
      !this.currentlyPlaying.has(b.id) &&
      (this.errorCount.get(b.id) || 0) < 3
    );
    if (eligible.length === 0) return;
    
    const shuffled = [...eligible];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    
    const toPlay = shuffled.slice(0, Math.min(needed, 3));
    for (const bird of toPlay) {
      this.playBirdNow(bird);
    }
  }

  playBirdNow(bird) {
    if (!this.enabled.get(bird.id)) return;
    if (this.currentlyPlaying.has(bird.id)) return;
    if (!bird.url) return;
    if ((this.errorCount.get(bird.id) || 0) >= 3) return;
    
    const audio = new Audio();
    audio.src = bird.url;
    audio.volume = this.volume * (0.5 + Math.random() * 0.5);
    audio.crossOrigin = 'anonymous';
    audio.preload = 'auto';
    
    let hasEnded = false;
    
    const onEnd = () => {
      if (hasEnded) return;
      hasEnded = true;
      this.currentlyPlaying.delete(bird.id);
      this.activeAudios.delete(bird.id);
      if (this.onUpdate) this.onUpdate();
      if (this.enabled.get(bird.id) && this.isRunning) {
        this.scheduleBird(bird);
      }
    };
    
    const onError = (e) => {
      if (hasEnded) return;
      hasEnded = true;
      const count = (this.errorCount.get(bird.id) || 0) + 1;
      this.errorCount.set(bird.id, count);
      this.currentlyPlaying.delete(bird.id);
      this.activeAudios.delete(bird.id);
      if (count >= 3) {
        showError(`${bird.name} audio unavailable (${count} fails)`);
      }
      if (this.onUpdate) this.onUpdate();
    };
    
    audio.addEventListener('ended', onEnd);
    audio.addEventListener('error', onError);
    audio.addEventListener('stalled', onError);
    
    // Set a timeout in case play() hangs
    const playTimeout = setTimeout(() => {
      if (!hasEnded && !this.currentlyPlaying.has(bird.id)) {
        onError();
      }
    }, 5000);
    
    const playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        clearTimeout(playTimeout);
        this.currentlyPlaying.add(bird.id);
        this.activeAudios.set(bird.id, audio);
        if (this.onUpdate) this.onUpdate();
      }).catch(e => {
        clearTimeout(playTimeout);
        onError(e);
      });
    }
  }

  scheduleBird(bird) {
    if (!this.enabled.get(bird.id)) return;
    if ((this.errorCount.get(bird.id) || 0) >= 3) return;
    
    const existing = this.scheduleTimeouts.get(bird.id);
    if (existing) clearTimeout(existing);
    
    const activity = bird.activity || 0.7;
    const delay = Math.max(3000, 16000 / Math.max(0.2, activity)) * (0.5 + Math.random());
    
    const timeout = setTimeout(() => {
      if (this.enabled.get(bird.id) && this.isRunning && !this.currentlyPlaying.has(bird.id)) {
        this.playBirdNow(bird);
      }
    }, delay);
    
    this.scheduleTimeouts.set(bird.id, timeout);
  }

  startMaintenanceLoop() {
    if (this.maintenanceInterval) clearInterval(this.maintenanceInterval);
    this.maintenanceInterval = setInterval(() => {
      if (this.isRunning) {
        this.fillLayers();
      }
    }, 4000);
  }

  toggleBird(bird) {
    const wasEnabled = this.enabled.get(bird.id);
    if (wasEnabled) {
      this.enabled.set(bird.id, false);
      const audio = this.activeAudios.get(bird.id);
      if (audio) {
        audio.pause();
        audio.src = '';
        this.activeAudios.delete(bird.id);
        this.currentlyPlaying.delete(bird.id);
      }
      const timeout = this.scheduleTimeouts.get(bird.id);
      if (timeout) clearTimeout(timeout);
      this.scheduleTimeouts.delete(bird.id);
    } else {
      this.enabled.set(bird.id, true);
      this.errorCount.set(bird.id, 0);
      if (this.currentlyPlaying.size < this.targetLayers) {
        this.playBirdNow(bird);
      } else {
        this.scheduleBird(bird);
      }
    }
    if (this.onUpdate) this.onUpdate();
    return !wasEnabled;
  }

  stopAll() {
    for (const audio of this.activeAudios.values()) {
      audio.pause();
      audio.src = '';
    }
    for (const timeout of this.scheduleTimeouts.values()) {
      clearTimeout(timeout);
    }
    this.scheduleTimeouts.clear();
    this.activeAudios.clear();
    this.currentlyPlaying.clear();
    if (this.onUpdate) this.onUpdate();
  }

  shutdown() {
    this.isRunning = false;
    if (this.maintenanceInterval) clearInterval(this.maintenanceInterval);
    this.stopAll();
  }
}

// ============================================================================
// UI APP
// ============================================================================
let engine = null;
let uiState = { started: false, volume: 70, targetLayers: 5 };

function showError(msg) {
  const toast = document.getElementById('error-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function init() {
  if (engine) engine.shutdown();
  
  engine = new SoundscapeEngine();
  engine.setVolume(uiState.volume / 100);
  engine.setTargetLayers(uiState.targetLayers);
  engine.setOnUpdate(() => render());
  engine.enableAll();
  
  uiState.started = true;
  render();
}

function toggleBird(bird) { if (engine) engine.toggleBird(bird); }
function updateVolume(val) { uiState.volume = val; if (engine) engine.setVolume(val / 100); render(); }
function updateLayers(val) { uiState.targetLayers = val; if (engine) engine.setTargetLayers(val); render(); }
function stopAll() { if (engine) engine.stopAll(); }

function render() {
  if (!uiState.started) {
    document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div class="card" style="max-width:550px;text-align:center;background:linear-gradient(135deg,#0f172a,#0a0f1c);">
          <div style="font-size:4rem;">🌲🐦</div>
          <h1 style="font-size:1.8rem;font-weight:900;margin:1rem 0 0.5rem;">Bedfordshire & Northamptonshire Garden Birds</h1>
          <p style="color:#94a3b8;margin-bottom:1rem;">30 real British bird species · Continuous layered soundscape<br><strong>All birds enabled by default</strong> — you will hear birds immediately!</p>
          <button class="btn-primary" onclick="init()">🌿 Enter the Garden</button>
          <p style="font-size:0.7rem;color:#475569;margin-top:1.5rem;">Real recordings from Wikimedia Commons · Birds sing immediately, then continuously in random layers</p>
        </div>
      </div>
    `;
    return;
  }

  const enabledCount = engine.enabled ? Array.from(engine.enabled.values()).filter(v => v === true).length : 0;
  const currentlyPlaying = engine.currentlyPlaying || new Set();
  const activeCount = currentlyPlaying.size;
  const fillPercent = Math.min(100, (activeCount / uiState.targetLayers) * 100);

  const html = `
    <header class="sticky-header">
      <div class="container" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:1.8rem;">🌲</span>
          <div>
            <div style="font-weight:800;">Bedfordshire & Northamptonshire Garden Birds</div>
            <div style="font-size:0.7rem;color:#10b981;">${enabledCount} birds enabled · <span style="font-size:1.1rem;font-weight:800;color:#fbbf24;">${activeCount}</span> / ${uiState.targetLayers} singing now</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🔊</span>
            <input type="range" min="0" max="100" value="${uiState.volume}" oninput="updateVolume(this.value)" style="width:100px;">
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🎚️ Target layers</span>
            <input type="range" min="1" max="10" value="${uiState.targetLayers}" oninput="updateLayers(this.value)" style="width:80px;">
          </div>
          <button class="btn-secondary" onclick="stopAll()">⏹️ Silence</button>
        </div>
      </div>
    </header>
    <main class="container" style="padding:24px 20px;">
      <div class="live-panel">
        <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <span style="font-size:0.75rem;font-weight:600;color:#94a3b8;">🎵 CONTINUOUS LAYERED CHORUS — ${activeCount} birds singing right now!</span>
          <span style="font-size:0.7rem;color:#6ee7b7;">${activeCount} of ${uiState.targetLayers} layers active</span>
        </div>
        <div style="height:6px;background:#1e293b;border-radius:10px;margin-bottom:12px;overflow:hidden;">
          <div style="width:${fillPercent}%;height:100%;background:linear-gradient(90deg,#10b981,#fbbf24);border-radius:10px;transition:width 0.3s;"></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${Array.from(currentlyPlaying).slice(0, 18).map(id => {
            const b = BIRDS.find(bird => bird.id === id);
            return b ? `<div class="now-playing"><span></span>${b.icon} ${b.name}</div>` : '';
          }).join('')}
          ${activeCount === 0 ? '<span style="font-size:0.7rem;color:#fbbf24;">✨ Birds will start singing immediately ✨</span>' : ''}
          ${activeCount > 18 ? `<div class="now-playing">+${activeCount-18} more</div>` : ''}
        </div>
      </div>
      
      <div class="grid-sounds">
        ${BIRDS.map(bird => {
          const isEnabled = engine.enabled?.get(bird.id) || false;
          const isPlaying = currentlyPlaying.has(bird.id);
          const errorCount = engine.errorCount?.get(bird.id) || 0;
          const hasError = errorCount >= 3;
          return `
            <div class="sound-card ${isEnabled ? 'sound-card-enabled' : ''} ${isPlaying ? 'sound-card-playing' : ''} ${hasError ? 'sound-card-error' : ''}" 
                 onclick="toggleBird(BIRDS.find(b=>b.id==='${bird.id}'))"
                 title="${hasError ? 'Audio unavailable' : (isEnabled ? 'Click to disable' : 'Click to enable')}">
              ${isEnabled ? '<div class="badge-enabled" title="Enabled"></div>' : ''}
              ${isPlaying ? '<div class="badge-playing" title="Singing now"></div>' : ''}
              ${hasError ? '<div style="position:absolute;top:6px;right:8px;width:10px;height:10px;background:#ef4444;border-radius:50%;" title="Error"></div>' : ''}
              <div class="sound-icon">${bird.icon}</div>
              <div class="sound-name">${bird.name}</div>
            </div>
          `;
        }).join('')}
      </div>
      
      <div style="margin-top:24px;padding:14px;background:#0f172a;border-radius:12px;border:1px solid #1e293b;">
        <div style="font-size:0.7rem;color:#94a3b8;text-align:center;">
          💫 <strong>Birds are singing RIGHT NOW!</strong> — All ${enabledCount} birds are enabled by default.<br>
          The engine maintains <strong>${uiState.targetLayers} layers</strong> of overlapping birdsong. Green border = enabled · Gold pulse = currently singing.<br>
          Click any bird to disable/enable it. The garden is alive with real Bedfordshire birds!
        </div>
      </div>
    </main>
  `;
  document.getElementById('app').innerHTML = html;
}

window.init = init;
window.toggleBird = toggleBird;
window.updateVolume = updateVolume;
window.updateLayers = updateLayers;
window.stopAll = stopAll;
window.BIRDS = BIRDS;

render();
</script>
</body>
</html>
