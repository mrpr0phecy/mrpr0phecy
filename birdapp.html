<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0b1120;
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  color: #eef2ff;
  line-height: 1.5;
  overflow-x: hidden;
}
.container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11, 17, 32, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}
.btn-primary {
  background: linear-gradient(135deg, #10b981, #059669);
  padding: 10px 24px;
  border-radius: 40px;
  color: white;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
.btn-secondary {
  background: #1e293b;
  padding: 8px 18px;
  border-radius: 40px;
  color: #cbd5e6;
  font-weight: 600;
  font-size: 0.75rem;
  border: 1px solid #334155;
  cursor: pointer;
}
.btn-secondary:hover { background: #2d3a4e; color: white; }
.sound-card {
  background: #111827;
  border-radius: 1.25rem;
  border: 2px solid #1f2a3e;
  padding: 0.75rem 0.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.sound-card:hover { background: #1a2538; transform: translateY(-2px); }
.sound-card-enabled { border-color: #10b981; background: #0f1a1f; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
.sound-card-playing { animation: playingPulse 1s ease-in-out infinite; border-color: #fbbf24; }
@keyframes playingPulse {
  0% { box-shadow: 0 0 0 0 rgba(251,191,36,0.6); }
  70% { box-shadow: 0 0 0 6px rgba(251,191,36,0); }
  100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
}
.sound-icon { font-size: 1.8rem; }
.sound-name { font-size: 0.7rem; font-weight: 700; text-align: center; line-height: 1.3; }
@media (min-width: 768px) {
  .sound-name { font-size: 0.8rem; }
  .sound-icon { font-size: 2rem; }
}
.badge-enabled {
  position: absolute;
  top: 6px;
  right: 8px;
  width: 10px;
  height: 10px;
  background: #10b981;
  border-radius: 50%;
  box-shadow: 0 0 6px #10b981;
}
.badge-playing {
  position: absolute;
  top: 6px;
  left: 8px;
  width: 8px;
  height: 8px;
  background: #fbbf24;
  border-radius: 50%;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
.grid-sounds {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
  gap: 10px;
}
@media (min-width: 640px) { .grid-sounds { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); } }
.live-panel {
  background: #0f172a;
  border-radius: 1rem;
  padding: 14px 18px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}
.now-playing {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(16, 185, 129, 0.15);
  padding: 5px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #6ee7b7;
}
.now-playing span { width: 8px; height: 8px; background: #6ee7b7; border-radius: 50%; animation: pulse 1s infinite; }
input[type="range"] { -webkit-appearance: none; background: #1e293b; height: 4px; border-radius: 10px; width: 100%; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #10b981; border-radius: 50%; cursor: pointer; }
.card { background: #111827; border-radius: 1.25rem; padding: 1rem; border: 1px solid #1f2a3e; }
.stat-number { font-size: 1.5rem; font-weight: 800; color: #10b981; }

// ============================================================================
// AUDIO FETCHING (REAL RECORDINGS FROM XENO-CANTO)
// ============================================================================
const recordingCache = new Map();
async function fetchBirdRecording(latinName) {
  if (recordingCache.has(latinName)) return recordingCache.get(latinName);
  try {
    const url = `https://xeno-canto.org/api/2/recordings?query=${encodeURIComponent(latinName)}+q:A+len:0-25`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.recordings && data.recordings.length > 0) {
      const rec = data.recordings.find(r => r.file) || data.recordings[0];
      const audioUrl = rec.file.startsWith('//') ? `https:${rec.file}` : rec.file;
      recordingCache.set(latinName, audioUrl);
      return audioUrl;
    }
  } catch(e) { console.warn(`Failed to fetch ${latinName}`, e); }
  // fallback to a generic bird sound (still real, from xeno-canto)
  const fallback = 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_5f5f5f5f5f.mp3';
  recordingCache.set(latinName, fallback);
  return fallback;
}

// ============================================================================
// CONTINUOUS LAYERED SOUNDSCAPE ENGINE
// ============================================================================
class SoundscapeEngine {
  constructor() {
    this.enabled = new Map();        // bird id -> boolean
    this.activeTimeouts = new Map(); // bird id -> timeout handle
    this.currentlyPlaying = new Set(); // bird ids actively playing audio
    this.activeAudios = new Map();    // bird id -> audio element
    this.volume = 0.65;
    this.targetLayers = 5;            // desired number of simultaneous birds
    this.onUpdate = null;
    this.isRunning = true;
    this.maintainInterval = null;
  }

  setOnUpdate(cb) { this.onUpdate = cb; }
  setVolume(v) { this.volume = v; this.updateAllVolumes(); }
  setTargetLayers(n) { this.targetLayers = n; this.fillLayersIfNeeded(); }

  updateAllVolumes() {
    for (const audio of this.activeAudios.values()) {
      if (audio) audio.volume = this.volume * (0.6 + Math.random() * 0.4);
    }
  }

  // Enable all birds by default
  enableAll() {
    for (const bird of BIRDS) {
      if (!this.enabled.get(bird.id)) {
        this.enabled.set(bird.id, true);
        this.scheduleBird(bird);
      }
    }
    this.startLayerMaintenance();
    if (this.onUpdate) this.onUpdate();
  }

  startLayerMaintenance() {
    if (this.maintainInterval) clearInterval(this.maintainInterval);
    this.maintainInterval = setInterval(() => this.fillLayersIfNeeded(), 3000);
    this.fillLayersIfNeeded();
  }

  fillLayersIfNeeded() {
    if (!this.isRunning) return;
    const currentActive = this.currentlyPlaying.size;
    const deficit = this.targetLayers - currentActive;
    if (deficit > 0) {
      // pick eligible birds (enabled and not already playing)
      const eligible = BIRDS.filter(b => this.enabled.get(b.id) && !this.currentlyPlaying.has(b.id));
      for (let i = 0; i < Math.min(deficit, eligible.length, 3); i++) {
        const bird = eligible[Math.floor(Math.random() * eligible.length)];
        if (bird) this.triggerBirdNow(bird);
      }
    }
  }

  async triggerBirdNow(bird) {
    if (!this.enabled.get(bird.id)) return;
    if (this.currentlyPlaying.has(bird.id)) return;
    if (this.currentlyPlaying.size >= this.targetLayers + 2) return; // soft limit

    const url = await fetchBirdRecording(bird.latin);
    const audio = new Audio();
    audio.src = url;
    audio.volume = this.volume * (0.5 + Math.random() * 0.5);
    audio.crossOrigin = 'anonymous';

    const onEnd = () => {
      this.currentlyPlaying.delete(bird.id);
      this.activeAudios.delete(bird.id);
      if (this.onUpdate) this.onUpdate();
      // after ending, schedule the bird's next random occurrence
      if (this.enabled.get(bird.id)) {
        this.scheduleBird(bird);
      }
    };

    audio.addEventListener('ended', onEnd);
    audio.addEventListener('error', onEnd);

    try {
      await audio.play();
      this.currentlyPlaying.add(bird.id);
      this.activeAudios.set(bird.id, audio);
      if (this.onUpdate) this.onUpdate();
    } catch(e) {
      console.warn(`Could not play ${bird.name}`, e);
      onEnd();
    }
  }

  scheduleBird(bird) {
    if (!this.enabled.get(bird.id)) return;
    // Cancel existing timeout for this bird
    const existing = this.activeTimeouts.get(bird.id);
    if (existing) clearTimeout(existing);

    // Activity-based delay: more active birds sing more often (2 to 18 seconds)
    const activity = bird.activity || 0.7;
    const baseDelay = Math.max(2000, 16000 / Math.max(0.2, activity));
    const delay = baseDelay * (0.5 + Math.random());

    const timeout = setTimeout(() => {
      if (this.enabled.get(bird.id) && this.isRunning) {
        this.triggerBirdNow(bird);
      }
    }, delay);
    this.activeTimeouts.set(bird.id, timeout);
  }

  toggleBird(bird) {
    const wasEnabled = this.enabled.get(bird.id);
    if (wasEnabled) {
      // Disable: cancel scheduled play, stop current audio
      this.enabled.set(bird.id, false);
      const timeout = this.activeTimeouts.get(bird.id);
      if (timeout) clearTimeout(timeout);
      this.activeTimeouts.delete(bird.id);
      const audio = this.activeAudios.get(bird.id);
      if (audio) {
        audio.pause();
        audio.src = '';
        this.activeAudios.delete(bird.id);
        this.currentlyPlaying.delete(bird.id);
      }
    } else {
      this.enabled.set(bird.id, true);
      this.scheduleBird(bird);
      // optionally fill layer if needed
      this.fillLayersIfNeeded();
    }
    if (this.onUpdate) this.onUpdate();
    return !wasEnabled;
  }

  stopAll() {
    // Stop all audio and cancel all timeouts
    for (const timeout of this.activeTimeouts.values()) clearTimeout(timeout);
    this.activeTimeouts.clear();
    for (const audio of this.activeAudios.values()) {
      audio.pause();
      audio.src = '';
    }
    this.activeAudios.clear();
    this.currentlyPlaying.clear();
    if (this.onUpdate) this.onUpdate();
  }

  shutdown() {
    this.isRunning = false;
    if (this.maintainInterval) clearInterval(this.maintainInterval);
    this.stopAll();
  }
}

// ============================================================================
let engine = null;
let uiState = { started: false, volume: 65, targetLayers: 5 };

function init() {
  if (engine) engine.shutdown();
  engine = new SoundscapeEngine();
  engine.setVolume(uiState.volume / 100);
  engine.setTargetLayers(uiState.targetLayers);
  engine.setOnUpdate(() => render());
  engine.enableAll();  // all birds start enabled → continuous layered soundscape
  uiState.started = true;
  render();
}

function toggleBird(bird) { if (engine) engine.toggleBird(bird); }
function updateVolume(val) { uiState.volume = val; if (engine) engine.setVolume(val / 100); render(); }
function updateLayers(val) { uiState.targetLayers = val; if (engine) engine.setTargetLayers(val); render(); }
function stopAll() { if (engine) engine.stopAll(); }

function render() {
  if (!uiState.started) {
    document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div class="card" style="max-width:550px;text-align:center;background:linear-gradient(135deg,#0f172a,#0a0f1c);">
          <div style="font-size:4rem;">🌲🐦</div>
          <h1 style="font-size:1.8rem;font-weight:900;margin:1rem 0 0.5rem;">Bedfordshire & Northamptonshire Garden Birds</h1>
          <p style="color:#94a3b8;margin-bottom:1rem;">82 real British bird species · Continuous layered soundscape<br><strong>All birds enabled by default</strong> — a rich, ever-changing chorus</p>
          <button class="btn-primary" onclick="init()">🌿 Enter the Garden</button>
          <p style="font-size:0.7rem;color:#475569;margin-top:1.5rem;">Real recordings from xeno-canto · Birds sing randomly, respecting your layer limit · Click any bird to enable/disable</p>
        </div>
      </div>
    `;
    return;
  }

  const enabledCount = engine.enabled ? Array.from(engine.enabled.values()).filter(v => v === true).length : 0;
  const currentlyPlaying = engine.currentlyPlaying || new Set();
  const activeCount = currentlyPlaying.size;
  const fillPercent = Math.min(100, (activeCount / uiState.targetLayers) * 100);

  const html = `
    <header class="sticky-header">
      <div class="container" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:1.8rem;">🌲</span>
          <div>
            <div style="font-weight:800;">Bedfordshire & Northamptonshire Garden Birds</div>
            <div style="font-size:0.7rem;color:#10b981;">${enabledCount} birds enabled · <span style="font-size:1.1rem;font-weight:800;color:#fbbf24;">${activeCount}</span> / ${uiState.targetLayers} singing now</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🔊</span>
            <input type="range" min="0" max="100" value="${uiState.volume}" oninput="updateVolume(this.value)" style="width:100px;">
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🎚️ Target layers</span>
            <input type="range" min="1" max="10" value="${uiState.targetLayers}" oninput="updateLayers(this.value)" style="width:80px;">
          </div>
          <button class="btn-secondary" onclick="stopAll()">⏹️ Silence</button>
        </div>
      </div>
    </header>
    <main class="container" style="padding:24px 20px;">
      <div class="live-panel">
        <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <span style="font-size:0.75rem;font-weight:600;color:#94a3b8;">🎵 CONTINUOUS LAYERED CHORUS — endless random birdsong</span>
          <span style="font-size:0.7rem;color:#6ee7b7;">${activeCount} of ${uiState.targetLayers} layers active</span>
        </div>
        <div style="height:6px;background:#1e293b;border-radius:10px;margin-bottom:12px;overflow:hidden;">
          <div style="width:${fillPercent}%;height:100%;background:linear-gradient(90deg,#10b981,#fbbf24);border-radius:10px;transition:width 0.3s;"></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${currentlyPlaying.size === 0 ? '<span style="font-size:0.7rem;color:#fbbf24;">✨ Building layers — birds will start singing any moment... ✨</span>' : ''}
          ${Array.from(currentlyPlaying).slice(0, 18).map(id => {
            const b = BIRDS.find(bird => bird.id === id);
            return b ? `<div class="now-playing"><span></span>${b.icon} ${b.name}</div>` : '';
          }).join('')}
          ${currentlyPlaying.size > 18 ? `<div class="now-playing">+${currentlyPlaying.size-18} more</div>` : ''}
        </div>
      </div>
      
      <div class="grid-sounds">
        ${BIRDS.map(bird => {
          const isEnabled = engine.enabled?.get(bird.id) || false;
          const isPlaying = currentlyPlaying.has(bird.id);
          return `
            <div class="sound-card ${isEnabled ? 'sound-card-enabled' : ''} ${isPlaying ? 'sound-card-playing' : ''}" onclick="toggleBird(BIRDS.find(b=>b.id==='${bird.id}'))">
              ${isEnabled ? '<div class="badge-enabled" title="Enabled"></div>' : ''}
              ${isPlaying ? '<div class="badge-playing" title="Singing now"></div>' : ''}
              <div class="sound-icon">${bird.icon}</div>
              <div class="sound-name">${bird.name}</div>
              <div style="font-size:0.55rem;color:#64748b;">🐦</div>
            </div>
          `;
        }).join('')}
      </div>
      
      <div style="margin-top:24px;padding:14px;background:#0f172a;border-radius:12px;border:1px solid #1e293b;">
        <div style="font-size:0.7rem;color:#94a3b8;text-align:center;">
          💫 <strong>Continuous layered soundscape</strong> — All ${enabledCount} birds are enabled by default.<br>
          The engine actively maintains <strong>${uiState.targetLayers} layers</strong> of overlapping birdsong. Green border = enabled · Gold pulse = currently singing.<br>
          Click any bird to enable/disable it. The garden never goes silent — enjoy the beautiful, ever-changing cacophony of real Bedfordshire birds!
        </div>
      </div>
    </main>
  `;
  document.getElementById('app').innerHTML = html;
}

// Expose globals
window.init = init;
window.toggleBird = toggleBird;
window.updateVolume = updateVolume;
window.updateLayers = updateLayers;
window.stopAll = stopAll;
window.BIRDS = BIRDS;

render();
</script>
</body>
</html>
