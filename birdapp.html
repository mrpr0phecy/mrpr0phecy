// ============================================================================
// SOUNDSCAPE ENGINE - ENABLED SOUNDS PLAY RANDOMLY WITH REAL INTERVALS
// ============================================================================
class GardenEngine {
  constructor() {
    this.enabled = new Map(); // soundId -> true/false
    this.activePlayers = new Map(); // soundId -> { audio, timeout }
    this.volume = 0.6;
    this.maxConcurrent = 6;
    this.onUpdate = null;
    this.currentlyPlaying = new Set(); // ids currently making sound
    // pre-fetch cache for bird recordings
    this.recordingCache = new Map();
  }

  setOnUpdate(cb) { this.onUpdate = cb; }
  setVolume(v) { this.volume = v; }
  setMaxConcurrent(n) { this.maxConcurrent = n; }

  toggleSound(sound) {
    const wasEnabled = this.enabled.get(sound.id);
    if (wasEnabled) {
      // disable: stop any ongoing playback and cancel future
      this.stopSound(sound.id);
      this.enabled.set(sound.id, false);
    } else {
      this.enabled.set(sound.id, true);
      // start the random loop for this sound
      this.scheduleSound(sound);
    }
    if (this.onUpdate) this.onUpdate();
    return !wasEnabled;
  }

  stopSound(soundId) {
    const player = this.activePlayers.get(soundId);
    if (player) {
      if (player.timeout) clearTimeout(player.timeout);
      if (player.audio) {
        player.audio.pause();
        player.audio.src = '';
      }
      this.activePlayers.delete(soundId);
      this.currentlyPlaying.delete(soundId);
    }
  }

  async scheduleSound(sound) {
    if (!this.enabled.get(sound.id)) return;
    
    // Check concurrency limit
    if (this.currentlyPlaying.size >= this.maxConcurrent) {
      // retry later
      const delay = 2000 + Math.random() * 3000;
      const timeout = setTimeout(() => this.scheduleSound(sound), delay);
      this.activePlayers.set(sound.id, { timeout });
      return;
    }

    // Determine delay based on activity (0.3 to 12 seconds)
    const activity = sound.activity || 0.6;
    const baseDelay = Math.max(1500, 12000 / Math.max(0.2, activity));
    const delay = baseDelay * (0.5 + Math.random());
    
    const timeout = setTimeout(async () => {
      if (!this.enabled.get(sound.id)) return;
      
      // Get audio URL
      let url = sound.url;
      if (sound.type === 'bird') {
        url = await this.getBirdRecording(sound.latin);
        if (!url) {
          // fallback: schedule again later
          this.scheduleSound(sound);
          return;
        }
      }
      
      // Play the sound
      const audio = new Audio();
      audio.crossOrigin = 'anonymous';
      audio.src = url;
      audio.volume = this.volume * 0.7;
      
      audio.addEventListener('ended', () => {
        if (this.currentlyPlaying.has(sound.id)) {
          this.currentlyPlaying.delete(sound.id);
          if (this.onUpdate) this.onUpdate();
        }
        // schedule next
        this.scheduleSound(sound);
      });
      
      audio.addEventListener('error', () => {
        if (this.currentlyPlaying.has(sound.id)) {
          this.currentlyPlaying.delete(sound.id);
          if (this.onUpdate) this.onUpdate();
        }
        this.scheduleSound(sound);
      });
      
      try {
        await audio.play();
        this.currentlyPlaying.add(sound.id);
        // store player for potential stop
        const existing = this.activePlayers.get(sound.id);
        if (existing && existing.timeout) clearTimeout(existing.timeout);
        this.activePlayers.set(sound.id, { audio });
        if (this.onUpdate) this.onUpdate();
      } catch(e) {
        console.warn(`Failed to play ${sound.name}`, e);
        this.scheduleSound(sound);
      }
    }, delay);
    
    this.activePlayers.set(sound.id, { timeout });
  }

  async getBirdRecording(latinName) {
    if (this.recordingCache.has(latinName)) return this.recordingCache.get(latinName);
    try {
      const url = `https://xeno-canto.org/api/2/recordings?query=${encodeURIComponent(latinName)}+q:A+len:0-20`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.recordings && data.recordings.length > 0) {
        const rec = data.recordings.find(r => r.file) || data.recordings[0];
        const audioUrl = rec.file.startsWith('//') ? `https:${rec.file}` : rec.file;
        this.recordingCache.set(latinName, audioUrl);
        return audioUrl;
      }
    } catch(e) { console.warn(e); }
    // fallback to a generic bird sound
    const fallback = 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_5f5f5f5f5f.mp3';
    this.recordingCache.set(latinName, fallback);
    return fallback;
  }

  stopAll() {
    for (const [id, player] of this.activePlayers) {
      if (player.timeout) clearTimeout(player.timeout);
      if (player.audio) {
        player.audio.pause();
        player.audio.src = '';
      }
    }
    this.activePlayers.clear();
    this.currentlyPlaying.clear();
    if (this.onUpdate) this.onUpdate();
  }

  reset() {
    this.stopAll();
    this.enabled.clear();
    if (this.onUpdate) this.onUpdate();
  }
}

  volume: 60,
  maxConcurrent: 5

  engine = new GardenEngine();

  engine.setMaxConcurrent(uiState.maxConcurrent);
  engine.setOnUpdate(() => render());
  uiState.started = true;
  render();
}

function toggleSound(sound) {
  if (!engine) return;
  engine.toggleSound(sound);
}

function updateVolume(val) {
  uiState.volume = val;
  if (engine) engine.setVolume(val / 100);
  render();
}

function updateConcurrent(val) {
  uiState.maxConcurrent = val;
  if (engine) engine.setMaxConcurrent(val);
  render();
}

function stopAll() {
  if (engine) engine.reset();
}

          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🔊</span>
            <input type="range" min="0" max="100" value="${uiState.volume}" oninput="updateVolume(this.value)" style="width:100px;">
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🎚️ Max layers</span>
            <input type="range" min="1" max="10" value="${uiState.maxConcurrent}" oninput="updateConcurrent(this.value)" style="width:80px;">
          </div>
          <button class="btn-secondary" onclick="stopAll()">⏹️ Stop all</button>
        </div>
      </div>
    </header>
    <main class="container" style="padding:24px 20px;">
      <div class="live-panel">
        <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
          <span style="font-size:0.75rem;font-weight:600;color:#94a3b8;">🎵 NOW PLAYING (random layers)</span>
          ${currentlyPlaying.size === 0 ? '<span style="font-size:0.7rem;color:#475569;">No sounds active — click any bird or ambient to enable</span>' : ''}
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            ${Array.from(currentlyPlaying).map(id => {
              const s = ALL_SOUNDS.find(snd => snd.id === id);
              return s ? `<div class="now-playing"><span></span>${s.icon} ${s.name}</div>` : '';
            }).join('')}
          </div>
        </div>
      </div>
      
      <div class="grid-sounds">
        ${ALL_SOUNDS.map(sound => {
          const isEnabled = engine.enabled?.get(sound.id) || false;
          const isPlaying = currentlyPlaying.has(sound.id);
          return `
            <div class="sound-card ${isEnabled ? 'sound-card-enabled' : ''} ${isPlaying ? 'sound-card-playing' : ''}" onclick="toggleSound(ALL_SOUNDS.find(s=>s.id==='${sound.id}'))">
              ${isEnabled ? '<div class="badge-enabled"></div>' : ''}
              ${isPlaying ? '<div class="badge-playing"></div>' : ''}
              <div class="sound-icon">${sound.icon}</div>
              <div class="sound-name">${sound.name}</div>
              <div style="font-size:0.55rem;color:#64748b;text-align:center;">${sound.type === 'bird' ? '🐦' : '🌿'}</div>
            </div>
          `;
        }).join('')}
      </div>
      <div style="margin-top:24px;padding:12px;background:#0f172a;border-radius:12px;border:1px solid #1e293b;">
        <div style="font-size:0.7rem;color:#94a3b8;text-align:center;">
          💡 Click any sound to enable/disable — enabled sounds play randomly in the background, creating an ever-changing garden soundscape.<br>
          Highlighted border = enabled · Pulsing ring = currently playing · Max layers controls how many sounds can overlap
        </div>
      </div>
    </main>
  `;
  document.getElementById('app').innerHTML = html;
}

// Expose globals
window.init = init;
window.toggleSound = toggleSound;
window.updateVolume = updateVolume;
window.updateConcurrent = updateConcurrent;
window.stopAll = stopAll;
window.ALL_SOUNDS = ALL_SOUNDS;
window.engine = () => engine;

render();
</script>
</body>
</html>
