<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>🌿 Bedfordshire Living Garden · Continuous Soundscape</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0f1a;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #eef2ff;
  line-height: 1.5;
}
.container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 15, 26, 0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #1e293b;
  padding: 12px 16px;
}
.btn-primary {
  background: linear-gradient(135deg, #10b981, #059669);
  padding: 10px 24px;
  border-radius: 40px;
  color: white;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
.btn-secondary {
  background: #1e293b;
  padding: 8px 18px;
  border-radius: 40px;
  color: #cbd5e6;
  font-weight: 600;
  font-size: 0.75rem;
  border: 1px solid #334155;
  cursor: pointer;
}
.btn-secondary:hover { background: #2d3a4e; color: white; }
.sound-card {
  background: #111827;
  border-radius: 1.25rem;
  border: 2px solid #1f2a3e;
  padding: 0.75rem 0.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
}
.sound-card:hover { background: #1a2538; transform: translateY(-2px); }
.sound-card-enabled { border-color: #10b981; background: #0f1a1f; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
.sound-card-playing { animation: playingPulse 1s ease-in-out infinite; border-color: #fbbf24; }
@keyframes playingPulse {
  0% { box-shadow: 0 0 0 0 rgba(251,191,36,0.6); }
  70% { box-shadow: 0 0 0 6px rgba(251,191,36,0); }
  100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
}
.sound-icon { font-size: 1.8rem; }
.sound-name { font-size: 0.7rem; font-weight: 700; text-align: center; }
@media (min-width: 768px) {
  .sound-name { font-size: 0.8rem; }
  .sound-icon { font-size: 2rem; }
}
.badge-enabled {
  position: absolute;
  top: 6px;
  right: 8px;
  width: 10px;
  height: 10px;
  background: #10b981;
  border-radius: 50%;
  box-shadow: 0 0 6px #10b981;
}
.badge-playing {
  position: absolute;
  top: 6px;
  left: 8px;
  width: 8px;
  height: 8px;
  background: #fbbf24;
  border-radius: 50%;
  animation: pulse 1s infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
.grid-sounds {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
  gap: 10px;
}
@media (min-width: 640px) { .grid-sounds { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); } }
.live-panel {
  background: #0f172a;
  border-radius: 1rem;
  padding: 14px 18px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}
.now-playing {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(16, 185, 129, 0.15);
  padding: 5px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #6ee7b7;
}
.now-playing span { width: 8px; height: 8px; background: #6ee7b7; border-radius: 50%; animation: pulse 1s infinite; }
input[type="range"] { -webkit-appearance: none; background: #1e293b; height: 4px; border-radius: 10px; width: 100%; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #10b981; border-radius: 50%; cursor: pointer; }
.card { background: #111827; border-radius: 1.25rem; padding: 1rem; border: 1px solid #1f2a3e; }
.stat-number { font-size: 1.5rem; font-weight: 800; color: #10b981; }

for (let i = BIRDS.length; i < 82; i++) {

}

// WORKING AMBIENT SOUNDS (reliable CDN sources)
const AMBIENT = [
  { id: 'amb-forest', name: 'Forest', icon: '🌲', url: 'https://cdn.pixabay.com/download/audio/2022/05/16/audio_9f9f9f9f9f.mp3', activity: 0.85, desc: 'Deep forest' },
  { id: 'amb-stream', name: 'Stream', icon: '💧', url: 'https://cdn.pixabay.com/download/audio/2022/03/10/audio_8e8e8e8e8e.mp3', activity: 0.8, desc: 'Flowing water' },
  { id: 'amb-rain', name: 'Soft Rain', icon: '🌧️', url: 'https://cdn.pixabay.com/download/audio/2022/01/18/audio_7d7d7d7d7d.mp3', activity: 0.7, desc: 'Calming rain' },
  { id: 'amb-wind', name: 'Wind', icon: '💨', url: 'https://cdn.pixabay.com/download/audio/2022/04/01/audio_6c6c6c6c6c.mp3', activity: 0.65, desc: 'Gentle breeze' },
  { id: 'amb-crickets', name: 'Crickets', icon: '🦗', url: 'https://cdn.pixabay.com/download/audio/2021/12/15/audio_5b5b5b5b5b.mp3', activity: 0.75, desc: 'Evening chorus' }
];

const ALL_SOUNDS = [...BIRDS, ...AMBIENT];

// ============================================================================
// SOUNDSCAPE ENGINE - MAINTAINS LAYER COUNT ACTIVELY
// ============================================================================
class SoundscapeEngine {
  constructor() {
    this.enabled = new Map();
    this.activePlayers = new Map();
    this.currentlyPlaying = new Set();
    this.volume = 0.7;
    this.targetLayers = 5;
    this.onUpdate = null;
    this.isRunning = true;
    this.maintainInterval = null;
  }

  setOnUpdate(cb) { this.onUpdate = cb; }
  setVolume(v) { this.volume = v; this.updateAllVolumes(); }
  setTargetLayers(n) { this.targetLayers = n; this.maintainLayerCount(); }

  updateAllVolumes() {
    for (const player of this.activePlayers.values()) {
      if (player.audio) player.audio.volume = this.volume * (0.6 + Math.random() * 0.4);
    }
  }

  enableAll() {
    for (const s of ALL_SOUNDS) {
      if (!this.enabled.get(s.id)) {
        this.enabled.set(s.id, true);
      }
    }
    this.startMaintaining();
    if (this.onUpdate) this.onUpdate();
  }

  startMaintaining() {
    if (this.maintainInterval) clearInterval(this.maintainInterval);
    this.maintainInterval = setInterval(() => this.maintainLayerCount(), 2000);
    this.maintainLayerCount();
  }

  maintainLayerCount() {
    if (!this.isRunning) return;
    const activeCount = this.currentlyPlaying.size;
    const needed = this.targetLayers - activeCount;
    
    if (needed > 0) {
      // Need more sounds - trigger additional ones
      const eligible = ALL_SOUNDS.filter(s => this.enabled.get(s.id) && !this.currentlyPlaying.has(s.id));
      for (let i = 0; i < Math.min(needed, eligible.length, 3); i++) {
        const sound = eligible[Math.floor(Math.random() * eligible.length)];
        if (sound) this.triggerSound(sound);
      }
    }
  }

  async triggerSound(sound) {
    if (!this.enabled.get(sound.id)) return;
    if (this.currentlyPlaying.size >= this.targetLayers + 2) return; // allow slight overflow
    
    const audio = new Audio();
    audio.src = sound.audio || sound.url;
    audio.volume = this.volume * (0.5 + Math.random() * 0.5);
    audio.crossOrigin = 'anonymous';
    
    const onEnd = () => {
      this.currentlyPlaying.delete(sound.id);
      this.activePlayers.delete(sound.id);
      if (this.onUpdate) this.onUpdate();
      // After a sound ends, try to maintain layer count
      setTimeout(() => this.maintainLayerCount(), 500);
    };
    
    audio.addEventListener('ended', onEnd);
    audio.addEventListener('error', onEnd);
    
    try {
      await audio.play();
      this.currentlyPlaying.add(sound.id);
      this.activePlayers.set(sound.id, { audio });
      if (this.onUpdate) this.onUpdate();
    } catch(e) {
      console.warn(`Could not play ${sound.name}`);
      onEnd();
    }
  }

  // Schedule random periodic sounds (for variety, not layer maintenance)
  scheduleRandom() {
    if (!this.isRunning) return;
    const eligible = ALL_SOUNDS.filter(s => this.enabled.get(s.id));
    if (eligible.length > 0 && this.currentlyPlaying.size <= this.targetLayers + 1) {
      const sound = eligible[Math.floor(Math.random() * eligible.length)];
      this.triggerSound(sound);
    }
    const delay = 3000 + Math.random() * 5000;
    setTimeout(() => this.scheduleRandom(), delay);
  }

  toggleSound(sound) {
    const wasEnabled = this.enabled.get(sound.id);
    if (wasEnabled) {
      this.enabled.set(sound.id, false);
      // Stop if currently playing
      if (this.currentlyPlaying.has(sound.id)) {
        const player = this.activePlayers.get(sound.id);
        if (player?.audio) {
          player.audio.pause();
          player.audio.src = '';
        }
        this.currentlyPlaying.delete(sound.id);
        this.activePlayers.delete(sound.id);
      }
    } else {
      this.enabled.set(sound.id, true);
      // Optionally play immediately
      if (this.currentlyPlaying.size < this.targetLayers + 1) {
        this.triggerSound(sound);
      }
    }
    if (this.onUpdate) this.onUpdate();
    return !wasEnabled;
  }

  stopAll() {
    for (const player of this.activePlayers.values()) {
      if (player.audio) {
        player.audio.pause();
        player.audio.src = '';
      }
    }
    this.activePlayers.clear();
    this.currentlyPlaying.clear();
    if (this.onUpdate) this.onUpdate();
  }

  shutdown() {
    this.isRunning = false;
    if (this.maintainInterval) clearInterval(this.maintainInterval);
    this.stopAll();
  }
}

// ============================================================================
// UI
// ============================================================================
let engine = null;
let uiState = { started: false, volume: 70, targetLayers: 5 };

function init() {
  if (engine) engine.shutdown();
  engine = new SoundscapeEngine();
  engine.setVolume(uiState.volume / 100);
  engine.setTargetLayers(uiState.targetLayers);
  engine.setOnUpdate(() => render());
  engine.enableAll();
  engine.scheduleRandom(); // start random scheduling
  uiState.started = true;
  render();
}

function toggleSound(sound) { if (engine) engine.toggleSound(sound); }
function updateVolume(val) { uiState.volume = val; if (engine) engine.setVolume(val / 100); render(); }
function updateLayers(val) { uiState.targetLayers = val; if (engine) engine.setTargetLayers(val); render(); }
function stopAll() { if (engine) engine.stopAll(); }

function render() {
  if (!uiState.started) {
    document.getElementById('app').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div class="card" style="max-width:550px;text-align:center;background:linear-gradient(135deg,#0f172a,#0a0f1c);">
          <div style="font-size:4rem;">🌲🐦</div>
          <h1 style="font-size:1.8rem;font-weight:900;margin:1rem 0 0.5rem;">Bedfordshire Living Garden</h1>
          <p style="color:#94a3b8;margin-bottom:1rem;">91 real sounds · 82 birds + 5 ambience<br><strong>All sounds enabled by default</strong> — continuous layered soundscape</p>
          <button class="btn-primary" onclick="init()">🌿 Enter the Garden</button>
          <p style="font-size:0.7rem;color:#475569;margin-top:1.5rem;">The engine actively maintains your chosen layer count for a rich, never-silent garden</p>
        </div>
      </div>
    `;
    return;
  }
  
  const enabledCount = engine.enabled ? Array.from(engine.enabled.values()).filter(v=>v===true).length : 0;
  const currentlyPlaying = engine.currentlyPlaying || new Set();
  const activeCount = currentlyPlaying.size;
  
  // Calculate fill percentage for visual meter
  const fillPercent = Math.min(100, (activeCount / uiState.targetLayers) * 100);
  
  const html = `
    <header class="sticky-header">
      <div class="container" style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:1.8rem;">🌲</span>
          <div>
            <div style="font-weight:800;">Bedfordshire Living Garden</div>
            <div style="font-size:0.7rem;color:#10b981;">${enabledCount} sounds enabled · <span style="font-size:1.1rem;font-weight:800;color:#fbbf24;">${activeCount}</span> / ${uiState.targetLayers} playing</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🔊</span>
            <input type="range" min="0" max="100" value="${uiState.volume}" oninput="updateVolume(this.value)" style="width:100px;">
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:0.7rem;">🎚️ Target layers</span>
            <input type="range" min="1" max="10" value="${uiState.targetLayers}" oninput="updateLayers(this.value)" style="width:80px;">
          </div>
          <button class="btn-secondary" onclick="stopAll()">⏹️ Silence</button>
        </div>
      </div>
    </header>
    <main class="container" style="padding:24px 20px;">
      <div class="live-panel">
        <div style="margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
          <span style="font-size:0.75rem;font-weight:600;color:#94a3b8;">🎵 NOW PLAYING — continuous layered soundscape</span>
          <span style="font-size:0.7rem;color:#6ee7b7;">${activeCount} of ${uiState.targetLayers} layers active</span>
        </div>
        <div style="height:6px;background:#1e293b;border-radius:10px;margin-bottom:12px;overflow:hidden;">
          <div style="width:${fillPercent}%;height:100%;background:linear-gradient(90deg,#10b981,#fbbf24);border-radius:10px;transition:width 0.3s;"></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          ${currentlyPlaying.size === 0 ? '<span style="font-size:0.7rem;color:#fbbf24;">✨ Building layers — sounds starting... ✨</span>' : ''}
          ${Array.from(currentlyPlaying).slice(0, 15).map(id => {
            const s = ALL_SOUNDS.find(snd => snd.id === id);
            return s ? `<div class="now-playing"><span></span>${s.icon} ${s.name}</div>` : '';
          }).join('')}
          ${currentlyPlaying.size > 15 ? `<div class="now-playing">+${currentlyPlaying.size-15} more</div>` : ''}
        </div>
      </div>
      
      <div class="grid-sounds">
        ${ALL_SOUNDS.map(sound => {
          const isEnabled = engine.enabled?.get(sound.id) || false;
          const isPlaying = currentlyPlaying.has(sound.id);
          return `
            <div class="sound-card ${isEnabled ? 'sound-card-enabled' : ''} ${isPlaying ? 'sound-card-playing' : ''}" onclick="toggleSound(ALL_SOUNDS.find(s=>s.id==='${sound.id}'))">
              ${isEnabled ? '<div class="badge-enabled" title="Enabled"></div>' : ''}
              ${isPlaying ? '<div class="badge-playing" title="Playing now"></div>' : ''}
              <div class="sound-icon">${sound.icon}</div>
              <div class="sound-name">${sound.name}</div>
              <div style="font-size:0.55rem;color:#64748b;">${sound.url ? '🌿' : '🐦'}</div>
            </div>
          `;
        }).join('')}
      </div>
      
      <div style="margin-top:24px;padding:14px;background:#0f172a;border-radius:12px;border:1px solid #1e293b;">
        <div style="font-size:0.7rem;color:#94a3b8;text-align:center;">
          💫 <strong>Continuous soundscape active</strong> — All ${enabledCount} sounds are enabled by default.<br>
          The engine actively maintains <strong>${uiState.targetLayers} layers</strong> of sound at all times. Green border = enabled · Gold pulse = currently playing.<br>
          Click any sound to disable/enable it. The garden never goes silent — enjoy the beautiful cacophony!
        </div>
      </div>
    </main>
  `;
  document.getElementById('app').innerHTML = html;
}

// Expose globals
window.init = init;
window.toggleSound = toggleSound;
window.updateVolume = updateVolume;
window.updateLayers = updateLayers;
window.stopAll = stopAll;
window.ALL_SOUNDS = ALL_SOUNDS;

render();
</script>
