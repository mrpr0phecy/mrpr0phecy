// =========================================================================
// REAL AUDIO FETCHING (xeno-canto + Wikimedia Commons)
// =========================================================================
const recordingCache = new Map();

async function fetchXenoCanto(latinName) {
  const queries = [
    `${latinName} cnt:"united kingdom" q:A len:0-15`,
    `${latinName} cnt:"united kingdom" q:A`,
    `${latinName} q:A len:0-20`,
    `${latinName} q:A`
  ];
  for (const query of queries) {
    try {
      const url = `https://xeno-canto.org/api/2/recordings?query=${encodeURIComponent(query)}`;
      const response = await fetch(url);
      if (!response.ok) continue;
      const data = await response.json();
      if (data.recordings && data.recordings.length) {
        return data.recordings.slice(0, 10).filter(r => r.file).map(r => ({
          id: `xc-${r.id}`,
          url: r.file.startsWith('//') ? `https:${r.file}` : r.file,
          recordist: r.rec || 'Unknown',
          location: r.loc || 'Unknown',
          source: 'xeno-canto',
          attribution: `XC${r.id} · ${r.rec || 'Unknown'} · xeno-canto.org`
        }));
      }
    } catch(e) { console.warn(e); }
  }
  return [];
}

async function fetchWikimedia(latinName, commonName) {
  try {
    const searches = [`${latinName} song`, `${latinName} call`, `${commonName} song`, latinName];
    for (const searchTerm of searches) {
      const url = `https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(searchTerm)}+filetype:audio&srnamespace=6&format=json&origin=*&srlimit=8`;
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const data = await resp.json();
      if (data.query?.search?.length) {
        const recordings = [];
        for (const item of data.query.search.slice(0, 4)) {
          const title = item.title;
          const detailUrl = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=imageinfo&iiprop=url|mime&format=json&origin=*`;
          const det = await fetch(detailUrl);
          const detData = await det.json();
          const pages = detData.query?.pages;
          if (!pages) continue;
          const page = Object.values(pages)[0];
          const info = page?.imageinfo?.[0];
          if (!info || !info.url || !info.mime?.startsWith('audio/')) continue;
          recordings.push({
            id: `wm-${title.replace(/\s+/g, '_')}`,
            url: info.url,
            recordist: 'Wikimedia Commons',
            location: 'Wikimedia',
            source: 'wikimedia',
            attribution: title
          });
        }
        if (recordings.length) return recordings;
      }
    }
  } catch(e) { console.warn(e); }
  return [];
}

async function fetchRecordings(latinName, commonName) {
  if (recordingCache.has(latinName)) return recordingCache.get(latinName);
  const [xc, wm] = await Promise.allSettled([fetchXenoCanto(latinName), fetchWikimedia(latinName, commonName)]);
  const all = [];
  if (xc.status === 'fulfilled') all.push(...xc.value);
  if (wm.status === 'fulfilled') all.push(...wm.value);
  recordingCache.set(latinName, all);
  return all;
}

// =========================================================================
// SPATIAL SOUNDSCAPE ENGINE (real audio only)
// =========================================================================
const GARDEN_ZONES = [
  { label: 'Left Hedge', pan: -0.7 },
  { label: 'Left Tree', pan: -0.4 },
  { label: 'Center Lawn', pan: 0 },
  { label: 'Bird Bath', pan: 0.2 },
  { label: 'Right Tree', pan: 0.5 },
  { label: 'Right Hedgerow', pan: 0.8 }
];

class GardenSoundscape {
  constructor() {
    this.calls = [];
    this.volume = 0.5;
    this.maxLayers = 4;
    this.onChange = null;
    this.stage = 'morning';
  }
  setVolume(v) { this.volume = v; this.calls.forEach(c => { if(c.audio) c.audio.volume = v; }); }
  setMaxLayers(n) { this.maxLayers = n; while(this.calls.length > n) { const c = this.calls.shift(); if(c && c.audio) { c.audio.pause(); c.audio.src = ''; } } }
  setOnChange(cb) { this.onChange = cb; }
  setStage(s) { this.stage = s; }
  getActive() { return this.calls; }
  async play(species, rec) {
    while(this.calls.length >= this.maxLayers) {
      const c = this.calls.shift();
      if(c && c.audio) { c.audio.pause(); c.audio.src = ''; }
    }
    const zone = GARDEN_ZONES[Math.floor(Math.random() * GARDEN_ZONES.length)];
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.src = rec.url;
    audio.volume = 0;
    // Apply stereo panning using Web Audio if available
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const panner = ctx.createStereoPanner();
      panner.pan.value = zone.pan;
      const source = ctx.createMediaElementSource(audio);
      source.connect(panner);
      panner.connect(ctx.destination);
    } catch(e) { console.warn('panning not supported', e); }
    const call = { id: `${species.id}-${Date.now()}`, speciesId: species.id, audio, pan: zone.pan, recording: rec, species, startedAt: Date.now() };
    audio.addEventListener('ended', () => this.remove(call.id));
    audio.addEventListener('error', () => this.remove(call.id));
    this.calls.push(call);
    if(this.onChange) this.onChange();
    try {
      await audio.play();
      audio.volume = 0;
      this.fadeTo(audio, this.volume * 0.85, 800);
      // fade out near end
      if(audio.duration) {
        const remaining = (audio.duration - audio.currentTime) * 1000;
        if(remaining > 500) setTimeout(() => this.fadeTo(audio, 0, 1000), remaining - 1000);
      }
    } catch(e) { this.remove(call.id); }
  }
  fadeTo(audio, target, ms) {
    const start = audio.volume;
    const diff = target - start;
    const steps = 20;
    for(let i = 1; i <= steps; i++) {
      setTimeout(() => { try { audio.volume = start + diff * (i / steps); } catch(e) {} }, i * (ms / steps));
    }
  }
  remove(id) {
    this.calls = this.calls.filter(c => c.id !== id);
    if(this.onChange) this.onChange();
  }
  stopAll() {
    this.calls.forEach(c => { if(c.audio) { c.audio.pause(); c.audio.src = ''; } });
    this.calls = [];
    if(this.onChange) this.onChange();
  }
  getActivityForStage() {
    const rates = { dawn: 0.6, morning: 0.4, midday: 0.12, afternoon: 0.25, dusk: 0.45, night: 0.05 };
    return rates[this.stage];
  }
}

// =========================================================================
// APP STATE
// =========================================================================
let engine = null;
let audioContext = null; // kept for potential future use but not mandatory
let autoTimer = null;
let stageTimer = null;
let state = {
  started: false,
  volume: 45,
  layers: 4,
  activeIds: [],
  loading: null,
  autoEnabled: true,
  stage: 'morning',
  cache: {},
  currentSong: null
};

function setState(updates) { Object.assign(state, updates); render(); }

function stopAutoInterval() { if(autoTimer) clearTimeout(autoTimer); autoTimer = null; }
function startAutoInterval() {
  if(!state.autoEnabled || !engine) return;
  stopAutoInterval();
  const tick = () => {
    if(!state.autoEnabled || !engine) return;
    const welcomingBirds = ALL_BIRDS.filter(b => b.welcoming === true);
    if(welcomingBirds.length) {
      const bird = welcomingBirds[Math.floor(Math.random() * welcomingBirds.length)];
      const recs = state.cache[bird.latinName];
      if(recs && recs.length) {
        engine.play(bird, recs[Math.floor(Math.random() * recs.length)]);
        state.currentSong = { species: bird, zone: 'garden' };
        render();
      }
    }
    const activity = engine.getActivityForStage();
    const delay = Math.max(2000, (5000 / Math.max(0.08, activity)) * (0.6 + Math.random()));
    autoTimer = setTimeout(tick, delay);
  };
  autoTimer = setTimeout(tick, 1000);
}

function clearBirdsOnly() { if(engine) engine.stopAll(); state.currentSong = null; render(); }
function toggleAuto() { state.autoEnabled = !state.autoEnabled; if(state.autoEnabled && state.started) startAutoInterval(); else stopAutoInterval(); render(); }

const STAGE_LABELS = { dawn: '🌅 Dawn Chorus', morning: '☀️ Morning', midday: '🌤️ Midday', afternoon: '🌿 Afternoon', dusk: '🌇 Dusk', night: '🌙 Night' };
function advanceStage() {
  const order = ['dawn', 'morning', 'midday', 'afternoon', 'dusk', 'night'];
  const idx = order.indexOf(state.stage);
  const next = order[(idx + 1) % order.length];
  state.stage = next;
  if(engine) engine.setStage(next);
  render();
}

async function startApp() {
  if(!engine) {
    engine = new GardenSoundscape();
    engine.setVolume(state.volume / 100);
    engine.setMaxLayers(state.layers);
    engine.setOnChange(() => {
      state.activeIds = engine.getActive().map(c => c.speciesId);
      if(engine.getActive().length) {
        const last = engine.getActive()[engine.getActive().length - 1];
        state.currentSong = { species: last.species, zone: GARDEN_ZONES.find(z => Math.abs(z.pan - last.pan) < 0.2)?.label || 'Garden' };
      } else state.currentSong = null;
      render();
    });
  }
  state.started = true;
  if(stageTimer) clearInterval(stageTimer);
  stageTimer = setInterval(advanceStage, 60000);
  if(state.autoEnabled) startAutoInterval();
  render();
}

async function playSound(species) {
  if(!engine) return;
  state.loading = species.id;
  render();
  try {
    let recs = state.cache[species.latinName];
    if(!recs) {
      recs = await fetchRecordings(species.latinName, species.name);
      state.cache[species.latinName] = recs || [];
    }
    state.loading = null;
    if(recs && recs.length) {
      const rec = recs[Math.floor(Math.random() * recs.length)];
      await engine.play(species, rec);
      // occasional call & response
      if(Math.random() < 0.25) {
        setTimeout(async () => {
          const secondRec = recs[Math.floor(Math.random() * recs.length)];
          if(secondRec) engine.play(species, secondRec);
        }, 700 + Math.random() * 1000);
      }
    } else {
      console.warn(`No recordings found for ${species.name}`);
    }
  } catch(e) { console.error(e); state.loading = null; }
  render();
}

    return;
  }

  const html = `
    <header class="sticky-header">
      <div class="container flex flex-wrap items-center justify-between gap-3">
        <div class="flex items-center gap-3">
          <span class="text-2xl">🌲</span>
          <div>
            <div class="font-bold text-sm text-white">Bedfordshire Bird Sanctuary</div>
            <div class="text-[10px] text-emerald-400 font-mono">82 real bird species · natural recordings only</div>
          </div>
        </div>
        <div class="flex items-center gap-4 flex-wrap">
          <div class="flex items-center gap-2"><span class="text-xs text-slate-300">🔊</span><input type="range" min="0" max="100" value="${state.volume}" oninput="state.volume=+this.value;engine&&engine.setVolume(state.volume/100);render();" style="width:110px"></div>
          <button class="btn-secondary" onclick="clearBirdsOnly()">🕊️ Stop birds</button>
          <label class="toggle-switch text-xs font-semibold" style="display:flex;align-items:center;gap:8px;"><input type="checkbox" ${state.autoEnabled ? 'checked' : ''} onchange="toggleAuto()" style="display:none"><span class="toggle-slider" style="width:38px;height:20px;background:#334155;border-radius:30px;position:relative;display:inline-block;"></span><span class="ml-2 text-slate-200">Auto 🎵</span></label>
        </div>
      </div>
    </header>
    <main class="container py-5">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-7">
        <div class="space-y-5">
          <div class="card">
            <div class="flex justify-between items-center"><span class="text-sm font-bold">🎚️ Max layers</span><span class="text-emerald-400 text-xs">${state.layers}</span></div>
            <input type="range" min="1" max="8" value="${state.layers}" oninput="state.layers=+this.value;engine&&engine.setMaxLayers(state.layers);render();" class="mt-1">
            <div class="text-slate-500 text-[11px] mt-1">How many birds can sing at once</div>
            <div class="mt-4"><div class="flex justify-between text-xs"><span class="uppercase tracking-wide">${stageLabel}</span><span class="text-slate-400 text-[10px]">auto-cycle 60s</span></div><div class="progress-bar mt-1"><div class="progress-fill" style="width:${stageProgress}%"></div></div></div>
          </div>
          ${state.currentSong ? `<div class="card-glow"><div class="text-[10px] font-bold text-emerald-400">♫ NOW PLAYING</div><div class="font-bold text-lg flex gap-2 items-center mt-1"><span>${state.currentSong.species.icon}</span> ${state.currentSong.species.name}</div><div class="text-slate-400 text-xs">${state.currentSong.species.latinName} · ${state.currentSong.zone}</div><div class="text-slate-400 text-xs mt-2">${state.currentSong.species.description}</div></div>` : ''}
        </div>
        <div class="lg:col-span-2">
          <div class="mb-3 flex justify-between items-center"><span class="text-xs font-bold text-slate-400 uppercase">🐦 82 garden birds — click any to call</span><span class="text-[10px] text-slate-500">real field recordings</span></div>
          ${liveHtml}
          <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-2 mt-4">
            ${ALL_BIRDS.map(s => `<button onclick="playSound(ALL_BIRDS.find(x=>x.id==='${s.id}'))" class="bird-btn ${state.activeIds.includes(s.id) ? 'bird-btn-active' : ''}" title="${s.latinName} · ${s.habitat}"><span class="text-2xl drop-shadow">${s.icon}</span><span class="bird-name">${s.name}</span>${state.loading === s.id ? '<div class="spinner mt-1"></div>' : ''}</button>`).join('')}
          </div>
        </div>
      </div>
    </main>
  `;
  document.getElementById('app').innerHTML = html;
  // manually set toggle slider style after render
  const toggle = document.querySelector('.toggle-switch input');
  if(toggle) {
    const slider = toggle.parentElement.querySelector('.toggle-slider');
    if(slider) {
      slider.style.position = 'relative';
      slider.style.display = 'inline-block';
      if(!slider.querySelector('::before')) {
        const style = document.createElement('style');

}

// expose globals for onclick handlers
window.startApp = startApp;
window.playSound = playSound;
window.clearBirdsOnly = clearBirdsOnly;

window.ALL_BIRDS = ALL_BIRDS;
