<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Most Useful Site in the World | Free Online Tools</title>
    <meta name="description" content="Collection of essential tools for developers, designers, students, and professionals. All free, no sign-ups required.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== CSS VARIABLES ===== */
        :root {
            --accent: #2dd4ff;
            --accent-dark: #1aa3cc;
            --accent-glow: rgba(45, 212, 255, 0.4);
            --text: #e6faff;
            --text-secondary: rgba(230, 250, 255, 0.7);
            --bg-primary: #0a0f14;
            --bg-secondary: #141e28;
            --border-light: rgba(255, 255, 255, 0.08);
            --success: #39ff14;
            --error: #ff4d4d;
            --premium: #ffd700;
            --love: #9d4edd;
            --grid-mode: #00ffaa;
            --list-mode: #2dd4ff;
            
            --card-radius: 16px;
            --panel-radius: 20px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        /* ===== ANIMATED BACKGROUND ===== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 80%, var(--accent-glow) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(0, 255, 170, 0.3) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }
        
        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }
        
        /* ===== STICKY COMMAND BAR ===== */
        .sticky-command-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 15, 20, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 20px;
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            gap: 12px;
        }
        
        .sticky-command-bar.show {
            transform: translateY(0);
        }
        
        .sticky-search-container {
            flex: 1;
        }
        
        .sticky-search-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid var(--border-light);
            overflow: hidden;
            height: 40px;
        }
        
        .sticky-search-bar input {
            flex: 1;
            border: 0;
            background: transparent;
            color: var(--text);
            padding: 0 16px;
            font-size: 0.95rem;
            font-family: 'Exo 2', sans-serif;
            outline: none;
        }
        
        .sticky-actions {
            display: flex;
            gap: 8px;
        }
        
        .sticky-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
            position: relative;
        }
        
        .sticky-action-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        
        .sticky-action-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* ===== ENHANCED TOOLBOX ===== */
        .toolbox {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 800px;
            height: 650px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 100px);
            background: rgba(10, 15, 20, 0.98);
            border: 2px solid var(--grid-mode);
            border-radius: var(--panel-radius);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 255, 170, 0.2);
            display: none;
            z-index: 9998;
            resize: both;
            overflow: hidden;
        }
        
        .toolbox.open {
            display: flex;
            flex-direction: column;
            animation: toolboxEnter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes toolboxEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .toolbox::after {
            content: '';
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--grid-mode) 50%, transparent 50%);
            cursor: se-resize;
            opacity: 0.6;
            border-radius: 6px;
        }
        
        .toolbox.list-mode {
            border-color: var(--list-mode);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 40px rgba(45, 212, 255, 0.2);
        }
        
        .toolbox.list-mode::after {
            background: linear-gradient(135deg, var(--list-mode) 50%, transparent 50%);
        }
        
        .toolbox .titlebar {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(180deg, rgba(0, 255, 170, 0.1), rgba(0, 255, 170, 0.02));
            cursor: grab;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        
        .toolbox.list-mode .titlebar {
            background: linear-gradient(180deg, rgba(45, 212, 255, 0.1), rgba(45, 212, 255, 0.02));
        }
        
        .toolbox-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: var(--grid-mode);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .toolbox.list-mode .toolbox-title {
            color: var(--list-mode);
        }
        
        .toolbox-controls {
            display: flex;
            gap: 6px;
        }
        
        .toolbox-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .toolbox-btn:hover {
            background: rgba(0, 255, 170, 0.2);
            border-color: var(--grid-mode);
            color: var(--grid-mode);
        }
        
        .toolbox.list-mode .toolbox-btn:hover {
            background: rgba(45, 212, 255, 0.2);
            border-color: var(--list-mode);
            color: var(--list-mode);
        }
        
        .toolbox-btn.mode-btn.active {
            background: rgba(0, 255, 170, 0.3);
            border-color: var(--grid-mode);
            color: var(--grid-mode);
        }
        
        .toolbox.list-mode .toolbox-btn.mode-btn.active {
            background: rgba(45, 212, 255, 0.3);
            border-color: var(--list-mode);
            color: var(--list-mode);
        }
        
        .toolbox .content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        /* Grid Mode */
        .grid-mode-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            grid-auto-rows: minmax(160px, auto);
            gap: 16px;
            padding: 16px;
            height: 100%;
            overflow-y: auto;
            align-content: start;
        }
        
        .grid-mode-card {
            background: linear-gradient(145deg, rgba(0, 255, 170, 0.08), rgba(0, 255, 170, 0.02));
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 170, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 160px;
            animation: gridCardEnter 0.4s ease-out;
        }
        
        @keyframes gridCardEnter {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .grid-mode-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 255, 170, 0.3);
            border-color: var(--grid-mode);
        }
        
        .grid-mode-card.expanded {
            grid-column: span 2;
            grid-row: span 2;
            z-index: 10;
            box-shadow: 0 20px 60px rgba(0, 255, 170, 0.4);
            border-color: var(--grid-mode);
        }
        
        .grid-mode-card-header {
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 255, 170, 0.2);
        }
        
        .grid-mode-card-header h4 {
            color: var(--grid-mode);
            font-size: 0.9rem;
            font-weight: 700;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Rajdhani', sans-serif;
        }
        
        .grid-mode-card-actions {
            display: flex;
            gap: 4px;
        }
        
        .grid-mode-card-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid rgba(0, 255, 170, 0.3);
            color: var(--grid-mode);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .grid-mode-card-btn:hover {
            background: var(--grid-mode);
            color: #000;
        }
        
        .grid-mode-card-content {
            padding: 14px;
            flex: 1;
            overflow: hidden;
            max-height: 100px;
            transition: max-height 0.3s;
        }
        
        .grid-mode-card.expanded .grid-mode-card-content {
            max-height: 500px;
            overflow-y: auto;
        }
        
        /* List Mode */
        .list-mode-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 16px;
            height: 100%;
            overflow-y: auto;
        }
        
        .list-mode-item {
            background: rgba(45, 212, 255, 0.05);
            border: 1px solid rgba(45, 212, 255, 0.15);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            animation: listItemEnter 0.3s ease-out;
        }
        
        @keyframes listItemEnter {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .list-mode-item:hover {
            background: rgba(45, 212, 255, 0.1);
            border-color: var(--list-mode);
            border-left-color: var(--list-mode);
            transform: translateX(6px);
        }
        
        .list-mode-item.expanded {
            background: rgba(45, 212, 255, 0.12);
            border-color: var(--list-mode);
            box-shadow: 0 8px 30px rgba(45, 212, 255, 0.2);
        }
        
        .list-mode-item-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            color: var(--text);
            font-size: 1rem;
        }
        
        .list-mode-item-actions {
            display: flex;
            gap: 6px;
        }
        
        .list-mode-item-btn {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            background: rgba(45, 212, 255, 0.1);
            border: 1px solid rgba(45, 212, 255, 0.3);
            color: var(--list-mode);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .list-mode-item-btn:hover {
            background: var(--list-mode);
            color: #000;
        }
        
        /* ===== PALETTE PANEL ===== */
        .palette-panel {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 400px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 100px);
            background: rgba(10, 15, 20, 0.98);
            border: 1px solid var(--border-light);
            border-radius: var(--panel-radius);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 9999;
            overflow: hidden;
        }
        
        .palette-panel.open {
            display: block;
            animation: panelEnter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes panelEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .palette-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-light);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .palette-title {
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .palette-close {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .palette-close:hover {
            background: rgba(255, 77, 77, 0.1);
            border-color: var(--error);
            color: var(--error);
            transform: rotate(90deg);
        }
        
        .palette-content {
            padding: 20px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }
        
        .palette-section {
            margin-bottom: 24px;
        }
        
        .palette-section-title {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            font-family: 'Rajdhani', sans-serif;
        }
        
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }
        
        .palette-color {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .palette-color:hover {
            transform: scale(1.15);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 10;
        }
        
        .palette-color.active {
            border-color: white;
            box-shadow: 0 0 0 3px var(--accent), 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .palette-color.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .theme-btn {
            height: 60px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .theme-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .theme-btn.active {
            border-color: white;
            box-shadow: 0 0 0 3px var(--accent), 0 12px 30px rgba(0,0,0,0.5);
        }
        
        .theme-btn::after {
            content: attr(data-name);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
        }
        
        /* Options */
        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .toggle-switch {
            width: 50px;
            height: 26px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .toggle-switch.active {
            background: var(--accent);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .toggle-switch.active::after {
            transform: translateX(24px);
        }
        
        /* ===== MAIN HEADER ===== */
        .main-header {
            padding: 60px 20px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
            position: relative;
        }
        
        h1 {
            font-size: 3.5rem;
            background: linear-gradient(90deg, var(--accent), #ffffff, var(--grid-mode));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            animation: gradientFlow 3s ease infinite;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        @keyframes gradientFlow {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 32px;
            font-weight: 300;
        }
        
        .main-search-container {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .main-search-bar {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--card-radius);
            border: 1px solid var(--border-light);
            overflow: hidden;
            transition: all 0.2s;
        }
        
        .main-search-bar:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        
        .main-search-bar input {
            flex: 1;
            border: 0;
            background: transparent;
            color: var(--text);
            padding: 18px 24px;
            font-size: 1.1rem;
            outline: none;
            font-family: 'Exo 2', sans-serif;
        }
        
        .main-search-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            border: none;
            color: #000;
            padding: 18px 32px;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        
        .main-search-btn:hover {
            filter: brightness(1.2);
        }
        
        /* ===== DASHBOARD ===== */
        .dashboard {
            column-count: 4;
            column-gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            padding-top: 100px;
        }
        
        @media (max-width: 1400px) { .dashboard { column-count: 3; } }
        @media (max-width: 1024px) { .dashboard { column-count: 2; } }
        @media (max-width: 640px) { .dashboard { column-count: 1; } }
        
        .card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.05));
            border: 1px solid var(--border-light);
            border-radius: var(--card-radius);
            overflow: hidden;
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            break-inside: avoid;
            transition: all 0.3s;
            animation: cardFadeIn 0.6s ease-out;
        }
        
        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-glow);
        }
        
        .card-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-light);
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-header h3 {
            font-size: 1.2rem;
            color: var(--accent);
            margin: 0;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-actions {
            display: flex;
            gap: 6px;
        }
        
        .card-action-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .card-action-btn:hover {
            background: var(--accent-glow);
            color: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .card-action-btn.add-grid:hover {
            background: rgba(0, 255, 170, 0.15);
            color: var(--grid-mode);
            border-color: var(--grid-mode);
        }
        
        .card-action-btn.add-list:hover {
            background: rgba(45, 212, 255, 0.15);
            color: var(--list-mode);
            border-color: var(--list-mode);
        }
        
        .card-content {
            min-height: 200px;
        }
        
        .card-sandbox {
            padding: 16px;
        }
        
        .card-footer {
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.8));
            padding: 12px 16px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .rating-display {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .rating-bar {
            width: 50px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .rating-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
        }
        
        .rating-percentage {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 700;
            font-family: 'Rajdhani', sans-serif;
        }
        
        /* ===== NOTIFICATIONS ===== */
        .notification {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 16px 24px;
            border-radius: var(--card-radius);
            backdrop-filter: blur(20px);
            z-index: 10000;
            animation: notificationSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 350px;
            border: 1px solid;
            font-family: 'Exo 2', sans-serif;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        
        @keyframes notificationSlide {
            from { opacity: 0; transform: translateX(100px) scale(0.8); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        
        .notification.success {
            background: rgba(57, 255, 20, 0.1);
            border-color: var(--success);
            color: var(--success);
        }
        
        .notification.error {
            background: rgba(255, 77, 77, 0.1);
            border-color: var(--error);
            color: var(--error);
        }
        
        .notification.info {
            background: rgba(45, 212, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .toolbox, .palette-panel {
                width: calc(100% - 32px);
                right: 16px;
                left: 16px;
            }
            .grid-mode-container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <!-- Sticky Command Bar -->
    <div class="sticky-command-bar" id="stickyCommandBar">
        <div class="sticky-search-container">
            <div class="sticky-search-bar">
                <input type="text" id="stickySearchInput" placeholder="Search tools...">
            </div>
        </div>
        <div class="sticky-actions">
            <button class="sticky-action-btn" id="stickyToolboxToggle" title="Toolbox (Ctrl+T)">🧰</button>
            <button class="sticky-action-btn" id="stickyPaletteToggle" title="Themes (Ctrl+P)">🎨</button>
            <button class="sticky-action-btn" id="stickyReaderToggle" title="Reader Mode (Ctrl+R)">👓</button>
            <button class="sticky-action-btn" id="stickyContributionsToggle" title="Support (Ctrl+D)">💜</button>
        </div>
    </div>
    
    <!-- Toolbox -->
    <div id="toolbox" class="toolbox">
        <div class="titlebar" id="toolboxTitle">
            <div class="toolbox-title">
                <span id="toolboxIcon">🧰</span>
                <span id="toolboxModeText">Toolbox</span>
                <span style="font-size:12px;opacity:0.7" id="toolboxCardCount">(0 cards)</span>
            </div>
            <div class="toolbox-controls">
                <button id="gridModeBtn" class="toolbox-btn mode-btn active" title="Grid Mode">🔲</button>
                <button id="listModeBtn" class="toolbox-btn mode-btn" title="List Mode">📋</button>
                <button id="clearToolboxBtn" class="toolbox-btn" title="Clear All">🗑️</button>
                <button id="toolboxClose" class="toolbox-btn" title="Close">✕</button>
            </div>
        </div>
        <div class="content" id="toolboxContent"></div>
    </div>
    
    <!-- Palette Panel -->
    <div id="palettePanel" class="palette-panel">
        <div class="palette-header">
            <div class="palette-title">🎨 Customization</div>
            <button id="paletteClose" class="palette-close">✕</button>
        </div>
        <div class="palette-content">
            <div class="palette-section">
                <div class="palette-section-title">Accent Colors</div>
                <div class="palette-grid">
                    <div class="palette-color active" data-accent="#2dd4ff" style="background:#2dd4ff"></div>
                    <div class="palette-color" data-accent="#00ffaa" style="background:#00ffaa"></div>
                    <div class="palette-color" data-accent="#ff2d55" style="background:#ff2d55"></div>
                    <div class="palette-color" data-accent="#ffcc00" style="background:#ffcc00"></div>
                    <div class="palette-color" data-accent="#9d4edd" style="background:#9d4edd"></div>
                    <div class="palette-color" data-accent="#ff6b35" style="background:#ff6b35"></div>
                    <div class="palette-color" data-accent="#ff006e" style="background:#ff006e"></div>
                </div>
            </div>
            
            <div class="palette-section">
                <div class="palette-section-title">Background Themes</div>
                <div class="theme-grid">
                    <button class="theme-btn active" data-theme="default" data-name="Midnight" style="background:linear-gradient(135deg, #0a0f14, #141e28)"></button>
                    <button class="theme-btn" data-theme="deep-blue" data-name="Abyss" style="background:linear-gradient(135deg, #020617, #0f172a)"></button>
                    <button class="theme-btn" data-theme="deep-purple" data-name="Nebula" style="background:linear-gradient(135deg, #1a0b2e, #2d1b4e)"></button>
                    <button class="theme-btn" data-theme="deep-teal" data-name="Ocean" style="background:linear-gradient(135deg, #042f2e, #0f766e)"></button>
                    <button class="theme-btn" data-theme="deep-red" data-name="Crimson" style="background:linear-gradient(135deg, #2a0a0a, #450a0a)"></button>
                    <button class="theme-btn" data-theme="deep-forest" data-name="Forest" style="background:linear-gradient(135deg, #052e16, #14532d)"></button>
                    <button class="theme-btn" data-theme="cyber" data-name="Cyber" style="background:linear-gradient(135deg, #0a0118, #1a0b2e)"></button>
                    <button class="theme-btn" data-theme="warm" data-name="Sunset" style="background:linear-gradient(135deg, #1a0f0a, #2d1b0f)"></button>
                </div>
            </div>
            
            <div class="palette-section">
                <div class="palette-section-title">Display Options</div>
                <div class="option-row">
                    <span>🔮 Glassmorphism</span>
                    <div class="toggle-switch active" id="glassToggle"></div>
                </div>
                <div class="option-row">
                    <span>✨ Animations</span>
                    <div class="toggle-switch active" id="animToggle"></div>
                </div>
                <div class="option-row">
                    <span>🔳 Compact Mode</span>
                    <div class="toggle-switch" id="compactToggle"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Main Header -->
    <header class="main-header">
        <h1>The Most Useful Site in the World</h1>
        <p class="subtitle">Essential tools for productivity, creativity, and problem-solving. All free, no sign-ups required.</p>
        <div class="main-search-container">
            <div class="main-search-bar">
                <input type="text" id="mainSearchInput" placeholder="🔍 Search tools, calculators, converters...">
                <button id="mainSearchBtn" class="main-search-btn">Search</button>
            </div>
        </div>
    </header>
    
    <!-- Dashboard -->
    <div id="dashboard" class="dashboard"></div>
    
    <script>
        // ===== CONFIGURATION =====
        const CONFIG = {
            CARDS: [
                'password-generator', 'json-formatter', 'base64-encoder', 'color-converter',
                'unit-converter', 'lorem-ipsum', 'regex-tester', 'markdown-preview',
                'html-encoder', 'url-parser', 'uuid-generator', 'hash-generator',
                'text-diff', 'csv-to-json', 'qr-code', 'barcode-generator'
            ]
        };
        
        // ===== STATE =====
        let allCards = CONFIG.CARDS;
        let loadedCards = new Set();
        let toolboxCards = [];
        let toolboxMode = 'grid';
        let expandedGridCards = new Set();
        let expandedListCards = new Set();
        
        const themes = {
            'default': { bg1: '#0a0f14', bg2: '#141e28' },
            'deep-blue': { bg1: '#020617', bg2: '#0f172a' },
            'deep-purple': { bg1: '#1a0b2e', bg2: '#2d1b4e' },
            'deep-teal': { bg1: '#042f2e', bg2: '#0f766e' },
            'deep-red': { bg1: '#2a0a0a', bg2: '#450a0a' },
            'deep-forest': { bg1: '#052e16', bg2: '#14532d' },
            'cyber': { bg1: '#0a0118', bg2: '#1a0b2e' },
            'warm': { bg1: '#1a0f0a', bg2: '#2d1b0f' }
        };
        
        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', () => {
            createCards();
            setupEventListeners();
            setupStickyCommandBar();
            initToolbox();
            initPanels();
        });
        
        // ===== CREATE CARDS =====
        function createCards() {
            const dashboard = document.getElementById('dashboard');
            
            allCards.forEach((cardName, index) => {
                const displayName = cardName.replace(/-/g, ' ').replace(/\\b\\w/g, l => l.toUpperCase());
                
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.name = cardName;
                card.dataset.displayName = displayName;
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${displayName}</h3>
                        <div class="card-actions">
                            <button class="card-action-btn add-grid" title="Add to Grid">🔲</button>
                            <button class="card-action-btn add-list" title="Add to List">📋</button>
                            <button class="card-action-btn expand" title="Open">↗</button>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-sandbox">
                            <div style="padding:20px;">
                                <h4 style="color:var(--accent);margin-bottom:10px;">${displayName}</h4>
                                <p style="color:var(--text-secondary);font-size:0.9rem;">Tool content would load here from cards/${cardName}.html</p>
                                <button style="margin-top:15px;padding:10px 20px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:600;">Use Tool</button>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="rating-display">
                            <div class="rating-bar"><div class="rating-fill" style="width:${Math.floor(Math.random() * 40 + 60)}%"></div></div>
                            <span class="rating-percentage">${Math.floor(Math.random() * 40 + 60)}%</span>
                        </div>
                    </div>
                `;
                
                dashboard.appendChild(card);
                
                // Add listeners
                card.querySelector('.add-grid').addEventListener('click', (e) => {
                    e.stopPropagation();
                    addCardToToolbox(displayName, card.querySelector('.card-sandbox').innerHTML, 'grid');
                });
                
                card.querySelector('.add-list').addEventListener('click', (e) => {
                    e.stopPropagation();
                    addCardToToolbox(displayName, card.querySelector('.card-sandbox').innerHTML, 'list');
                });
            });
        }
        
        // ===== TOOLBOX =====
        function initToolbox() {
            const toolbox = document.getElementById('toolbox');
            const titlebar = document.getElementById('toolboxTitle');
            
            // Dragging
            let isDragging = false;
            let dragOffset = { x: 0, y: 0 };
            
            titlebar.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                isDragging = true;
                const rect = toolbox.getBoundingClientRect();
                dragOffset.x = e.clientX - rect.left;
                dragOffset.y = e.clientY - rect.top;
                titlebar.style.cursor = 'grabbing';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                toolbox.style.left = (e.clientX - dragOffset.x) + 'px';
                toolbox.style.top = (e.clientY - dragOffset.y) + 'px';
                toolbox.style.right = 'auto';
            });
            
            document.addEventListener('mouseup', () => {
                isDragging = false;
                titlebar.style.cursor = 'grab';
            });
            
            // Mode buttons
            document.getElementById('gridModeBtn').addEventListener('click', () => switchMode('grid'));
            document.getElementById('listModeBtn').addEventListener('click', () => switchMode('list'));
            document.getElementById('clearToolboxBtn').addEventListener('click', clearToolbox);
            document.getElementById('toolboxClose').addEventListener('click', closeToolbox);
        }
        
        function switchMode(mode) {
            toolboxMode = mode;
            const toolbox = document.getElementById('toolbox');
            const gridBtn = document.getElementById('gridModeBtn');
            const listBtn = document.getElementById('listModeBtn');
            const titleText = document.getElementById('toolboxModeText');
            const icon = document.getElementById('toolboxIcon');
            
            if (mode === 'grid') {
                toolbox.classList.remove('list-mode');
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
                titleText.textContent = 'Grid Toolbox';
                icon.textContent = '🔲';
            } else {
                toolbox.classList.add('list-mode');
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
                titleText.textContent = 'List Toolbox';
                icon.textContent = '📋';
            }
            
            renderToolbox();
        }
        
        function addCardToToolbox(name, content, mode) {
            if (toolboxCards.find(c => c.name === name)) {
                showNotification(`${name} already in toolbox`, 'info');
                return;
            }
            
            toolboxCards.push({ name, content, id: Date.now() });
            
            if (mode && mode !== toolboxMode) {
                switchMode(mode);
            }
            
            const toolbox = document.getElementById('toolbox');
            if (!toolbox.classList.contains('open')) {
                toolbox.classList.add('open');
                document.getElementById('stickyToolboxToggle').classList.add('active');
            }
            
            renderToolbox();
            showNotification(`Added ${name} to toolbox`, 'success');
        }
        
        function renderToolbox() {
            const content = document.getElementById('toolboxContent');
            const count = document.getElementById('toolboxCardCount');
            
            count.textContent = `(${toolboxCards.length} cards)`;
            
            if (toolboxCards.length === 0) {
                content.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);text-align:center;padding:40px;">
                        <div style="font-size:64px;margin-bottom:20px;opacity:0.3;">🧰</div>
                        <h3 style="color:var(--accent);margin-bottom:10px;">Empty Toolbox</h3>
                        <p>Add cards by clicking the grid or list buttons on any card</p>
                    </div>
                `;
                return;
            }
            
            if (toolboxMode === 'grid') {
                renderGridMode(content);
            } else {
                renderListMode(content);
            }
        }
        
        function renderGridMode(container) {
            container.innerHTML = '<div class="grid-mode-container"></div>';
            const grid = container.querySelector('.grid-mode-container');
            
            toolboxCards.forEach((card, index) => {
                const isExpanded = expandedGridCards.has(index);
                const cardEl = document.createElement('div');
                cardEl.className = `grid-mode-card ${isExpanded ? 'expanded' : ''}`;
                
                cardEl.innerHTML = `
                    <div class="grid-mode-card-header">
                        <h4>${card.name}</h4>
                        <div class="grid-mode-card-actions">
                            <button class="grid-mode-card-btn expand-btn">${isExpanded ? '−' : '+'}</button>
                            <button class="grid-mode-card-btn remove-btn">✕</button>
                        </div>
                    </div>
                    <div class="grid-mode-card-content">
                        <div class="grid-mode-card-content-inner">${card.content}</div>
                    </div>
                `;
                
                cardEl.addEventListener('click', (e) => {
                    if (!e.target.closest('.grid-mode-card-actions')) {
                        toggleGridCard(index);
                    }
                });
                
                cardEl.querySelector('.expand-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleGridCard(index);
                });
                
                cardEl.querySelector('.remove-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeCard(index);
                });
                
                grid.appendChild(cardEl);
            });
        }
        
        function renderListMode(container) {
            container.innerHTML = '<div class="list-mode-container"></div>';
            const list = container.querySelector('.list-mode-container');
            
            toolboxCards.forEach((card, index) => {
                const isExpanded = expandedListCards.has(index);
                const item = document.createElement('div');
                item.className = `list-mode-item ${isExpanded ? 'expanded' : ''}`;
                
                item.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;">
                        <span class="list-mode-item-name">${card.name}</span>
                        <div class="list-mode-item-actions">
                            <button class="list-mode-item-btn expand-btn">${isExpanded ? '−' : '+'}</button>
                            <button class="list-mode-item-btn remove">✕</button>
                        </div>
                    </div>
                    ${isExpanded ? `<div class="list-mode-item-content">${card.content}</div>` : ''}
                `;
                
                item.addEventListener('click', (e) => {
                    if (!e.target.closest('.list-mode-item-actions')) {
                        toggleListCard(index);
                    }
                });
                
                item.querySelector('.expand-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleListCard(index);
                });
                
                item.querySelector('.remove').addEventListener('click', (e) => {
                    e.stopPropagation();
                    removeCard(index);
                });
                
                list.appendChild(item);
            });
        }
        
        function toggleGridCard(index) {
            if (expandedGridCards.has(index)) {
                expandedGridCards.delete(index);
            } else {
                expandedGridCards.add(index);
            }
            renderToolbox();
        }
        
        function toggleListCard(index) {
            if (expandedListCards.has(index)) {
                expandedListCards.delete(index);
            } else {
                expandedListCards.add(index);
            }
            renderToolbox();
        }
        
        function removeCard(index) {
            toolboxCards.splice(index, 1);
            expandedGridCards.delete(index);
            expandedListCards.delete(index);
            renderToolbox();
            showNotification('Card removed', 'info');
        }
        
        function clearToolbox() {
            if (toolboxCards.length === 0) return;
            if (confirm('Clear all cards from toolbox?')) {
                toolboxCards = [];
                expandedGridCards.clear();
                expandedListCards.clear();
                renderToolbox();
                showNotification('Toolbox cleared', 'success');
            }
        }
        
        function closeToolbox() {
            document.getElementById('toolbox').classList.remove('open');
            document.getElementById('stickyToolboxToggle').classList.remove('active');
        }
        
        // ===== PANELS =====
        function initPanels() {
            // Palette
            document.getElementById('stickyPaletteToggle').addEventListener('click', () => {
                togglePanel('palettePanel');
            });
            document.getElementById('paletteClose').addEventListener('click', () => {
                document.getElementById('palettePanel').classList.remove('open');
            });
            
            // Color selection
            document.querySelectorAll('.palette-color').forEach(color => {
                color.addEventListener('click', () => {
                    document.querySelectorAll('.palette-color').forEach(c => c.classList.remove('active'));
                    color.classList.add('active');
                    setAccent(color.dataset.accent);
                });
            });
            
            // Theme selection
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    applyTheme(btn.dataset.theme);
                });
            });
            
            // Toggles
            document.getElementById('glassToggle').addEventListener('click', function() {
                this.classList.toggle('active');
            });
            
            document.getElementById('animToggle').addEventListener('click', function() {
                this.classList.toggle('active');
            });
            
            document.getElementById('compactToggle').addEventListener('click', function() {
                this.classList.toggle('active');
            });
            
            // Close on outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.panel') && !e.target.closest('.sticky-action-btn')) {
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
                    document.querySelectorAll('.sticky-action-btn').forEach(b => b.classList.remove('active'));
                }
            });
        }
        
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            const isOpen = panel.classList.contains('open');
            
            // Close all panels
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
            document.querySelectorAll('.sticky-action-btn').forEach(b => b.classList.remove('active'));
            
            if (!isOpen) {
                panel.classList.add('open');
                if (panelId === 'palettePanel') {
                    document.getElementById('stickyPaletteToggle').classList.add('active');
                }
            }
        }
        
        function setAccent(color) {
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-dark', adjustBrightness(color, -20));
            document.documentElement.style.setProperty('--accent-glow', hexToRgba(color, 0.4));
            showNotification('Accent color updated', 'success');
        }
        
        function applyTheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;
            
            document.body.style.background = `linear-gradient(135deg, ${theme.bg1}, ${theme.bg2})`;
            showNotification(`Theme changed to ${themeName}`, 'success');
        }
        
        function adjustBrightness(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + 
                         (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + 
                         (B < 255 ? B < 1 ? 0 : B : 255))
                         .toString(16).slice(1);
        }
        
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        
        // ===== EVENT LISTENERS =====
        function setupEventListeners() {
            // Search
            const mainSearch = document.getElementById('mainSearchInput');
            const stickySearch = document.getElementById('stickySearchInput');
            
            mainSearch.addEventListener('input', (e) => performSearch(e.target.value));
            stickySearch.addEventListener('input', (e) => performSearch(e.target.value));
            
            // Reader mode
            document.getElementById('stickyReaderToggle').addEventListener('click', () => {
                document.body.classList.toggle('reader-mode');
                document.getElementById('stickyReaderToggle').classList.toggle('active');
            });
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    switch(e.key) {
                        case 't':
                            e.preventDefault();
                            document.getElementById('stickyToolboxToggle').click();
                            break;
                        case 'p':
                            e.preventDefault();
                            document.getElementById('stickyPaletteToggle').click();
                            break;
                        case 'r':
                            e.preventDefault();
                            document.getElementById('stickyReaderToggle').click();
                            break;
                    }
                }
            });
        }
        
        function performSearch(query) {
            query = query.toLowerCase().trim();
            const cards = document.querySelectorAll('.card');
            
            cards.forEach(card => {
                const name = card.dataset.displayName.toLowerCase();
                const matches = name.includes(query);
                card.style.display = matches ? '' : 'none';
            });
        }
        
        // ===== STICKY COMMAND BAR =====
        function setupStickyCommandBar() {
            const bar = document.getElementById('stickyCommandBar');
            let lastScroll = 0;
            
            window.addEventListener('scroll', () => {
                const currentScroll = window.pageYOffset;
                if (currentScroll > 150) {
                    bar.classList.add('show');
                } else {
                    bar.classList.remove('show');
                }
                lastScroll = currentScroll;
            }, { passive: true });
        }
        
        // ===== NOTIFICATIONS =====
        function showNotification(message, type = 'info') {
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transform = 'translateX(100px)';
                setTimeout(() => notif.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
