<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPNEWS | WORLD SERVICE LIVE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#cc1a2a;--red2:#e8192c;
  --blue:#00b8d9;--blue2:#00d4f5;
  --amber:#e8a020;--green:#00d46e;
  --gold:#c8a84b;
  --bg:#05060e;--panel:rgba(5,6,14,0.96);
  --border:rgba(255,255,255,0.08);
  --text:rgba(255,255,255,0.85);--dim:rgba(255,255,255,0.42);
}
html,body{margin:0;overflow:hidden;background:var(--bg);color:#fff;font-family:'Barlow Condensed',sans-serif;}
canvas{display:block;}
#canvas-wrap{position:absolute;inset:0;z-index:1;}
.scanlines{position:fixed;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.055) 3px,rgba(0,0,0,0.055) 4px);}

/* LOADING */
#loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity 1.4s ease;}
#loading.out{opacity:0;pointer-events:none;}
.l-logo{font-family:'Oswald',sans-serif;font-size:76px;font-weight:700;letter-spacing:14px;background:linear-gradient(135deg,var(--red2) 20%,var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:breathe 2.1s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.82;transform:scale(1.03);}}
.l-sub{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:5px;color:var(--dim);text-transform:uppercase;}
.l-bar{width:380px;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden;position:relative;}
.l-fill{position:absolute;inset-block:0;left:0;width:0%;background:linear-gradient(90deg,var(--red),var(--blue2));box-shadow:0 0 12px var(--blue2);transition:width 0.35s ease;}

/* TOP CHROME */
.top-chrome{position:fixed;top:0;left:0;right:0;height:50px;z-index:400;background:linear-gradient(to bottom,rgba(5,6,14,0.99) 65%,transparent);border-bottom:1px solid rgba(204,26,42,0.35);display:flex;align-items:center;padding:0 22px;gap:0;}
.tc-logo{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:4px;color:#fff;padding-right:18px;border-right:1px solid var(--border);flex-shrink:0;}
.tc-logo em{color:var(--red2);font-style:normal;}
.tc-logo.twirl{animation:logoTwirl 1.15s cubic-bezier(.2,.8,.2,1);}
@keyframes logoTwirl{0%{transform:rotateY(0deg) scale(1);}45%{transform:rotateY(180deg) scale(1.08);}100%{transform:rotateY(360deg) scale(1);}}
.tc-service{padding:0 16px;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:3px;color:var(--dim);flex-shrink:0;}
.tc-spacer{flex:1;}
.tc-seg{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 12px;border-radius:2px;margin-right:10px;display:none;transition:all 0.4s;}
.tc-seg.active{display:block;}
.tc-seg.wx{background:rgba(0,180,210,0.12);border:1px solid rgba(0,180,210,0.35);color:var(--blue2);}
.tc-seg.sp{background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.35);color:var(--gold);}
.tc-live{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:2px;color:var(--red2);margin-right:14px;flex-shrink:0;}
.tc-dot{width:7px;height:7px;background:var(--red2);border-radius:50%;box-shadow:0 0 8px var(--red2);animation:dpulse 1.05s infinite;}
@keyframes dpulse{0%,100%{opacity:1;}50%{opacity:0.2;}}
.tc-status{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1.2px;color:rgba(255,255,255,0.62);margin-right:14px;padding:3px 8px;border:1px solid rgba(255,255,255,0.14);border-radius:2px;flex-shrink:0;}
.tc-clock{font-family:'Space Mono',monospace;font-size:12.5px;letter-spacing:1.5px;color:rgba(255,255,255,0.72);flex-shrink:0;}

/* ANCHOR */
#anchorWrap{position:fixed;bottom:106px;right:20px;width:168px;height:184px;z-index:350;border:1px solid rgba(0,184,217,0.45);border-radius:7px;background:rgba(4,7,18,0.97);overflow:hidden;box-shadow:0 0 28px rgba(0,184,217,0.15),0 0 60px rgba(0,0,0,0.7);}
#anchorCanvas{display:block;width:100%;height:100%;}
.anchor-nameplate{position:absolute;bottom:0;left:0;right:0;padding:5px 8px 6px;background:linear-gradient(to top,rgba(5,6,14,0.96),transparent);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.8px;color:var(--blue);text-align:center;}
.anchor-nameplate strong{display:block;color:#fff;font-size:9px;letter-spacing:2.5px;margin-bottom:1px;}
.anc-eq{position:absolute;bottom:26px;right:6px;display:flex;gap:2px;align-items:flex-end;height:13px;}
.aeq{width:2.5px;background:var(--green);border-radius:1px;animation:aeq 0.38s ease infinite alternate;}
.aeq:nth-child(1){height:35%;animation-delay:0s;}.aeq:nth-child(2){height:100%;animation-delay:0.09s;}.aeq:nth-child(3){height:58%;animation-delay:0.04s;}.aeq:nth-child(4){height:82%;animation-delay:0.13s;}.aeq:nth-child(5){height:42%;animation-delay:0.07s;}
.aeq.off{animation:none;height:10%!important;opacity:0.18;}
@keyframes aeq{from{transform:scaleY(1);}to{transform:scaleY(0.22);}}

/* MUTE */
.mute-btn{position:fixed;bottom:106px;right:198px;z-index:351;background:rgba(5,6,14,0.9);border:1px solid var(--border);color:var(--blue);font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:1.5px;padding:5px 9px;border-radius:3px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.mute-btn:hover{border-color:var(--blue);background:rgba(0,184,217,0.08);}

/* NEWS CARD */
.news-card{position:fixed;left:-680px;top:50%;transform:translateY(-50%);width:min(580px,43vw);background:var(--panel);border-left:5px solid var(--red2);border-top-right-radius:5px;border-bottom-right-radius:5px;padding:18px 24px 16px;box-shadow:10px 0 44px rgba(204,26,42,0.22);transition:left 0.62s cubic-bezier(0.22,1,0.36,1);z-index:300;pointer-events:none;}
.news-card.in{left:0;}
.nc-meta{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:2.5px;display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.nc-tag{padding:2px 7px;font-size:8px;letter-spacing:1.5px;border-radius:1px;}
.nc-tag.world{background:var(--red2);color:#fff;}
.nc-tag.mil{background:#dd5500;color:#fff;}
.nc-tag.nat{background:#009944;color:#fff;}
.nc-tag.wx{background:var(--blue);color:#000;}
.nc-tag.sport{background:var(--gold);color:#000;}
.nc-tag.break{background:#ff2f2f;color:#fff;box-shadow:0 0 10px rgba(255,47,47,0.55);}
.nc-time{color:var(--dim);}
.nc-src{color:rgba(255,255,255,0.28);}
.nc-hl{font-family:'Oswald',sans-serif;font-size:clamp(16px,1.9vw,23px);font-weight:600;line-height:1.22;color:#fff;margin-bottom:9px;}
.nc-body{font-family:'Barlow Condensed',sans-serif;font-size:14px;line-height:1.52;color:var(--text);}
.nc-div{margin-top:11px;border:none;border-top:1px solid var(--border);}

/* SEGMENT PANEL */
.seg-panel{position:fixed;right:-540px;top:50%;transform:translateY(-50%);width:min(480px,36vw);background:var(--panel);border-right:5px solid var(--blue);border-top-left-radius:5px;border-bottom-left-radius:5px;padding:16px 20px;transition:right 0.62s cubic-bezier(0.22,1,0.36,1),border-color 0.3s;z-index:300;pointer-events:none;box-shadow:-10px 0 44px rgba(0,140,200,0.18);}
.seg-panel.sport-mode{border-color:var(--gold);box-shadow:-10px 0 44px rgba(200,168,75,0.18);}
.seg-panel.in{right:0;}
.sp-hdr{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:3px;margin-bottom:12px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.sp-hdr.wc{color:var(--blue2);}
.sp-hdr.sc{color:var(--gold);}
.sp-row{display:grid;grid-template-columns:28px 1fr;gap:9px;align-items:start;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.sp-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.sp-icon{font-size:17px;line-height:28px;}
.sp-t{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:#fff;line-height:1.2;}
.sp-d{font-size:12.5px;color:var(--text);margin-top:3px;line-height:1.45;}

/* LOC BANNER */
.loc-banner{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-6px);z-index:300;text-align:center;pointer-events:none;background:rgba(5,6,14,0.95);border:1px solid rgba(0,184,217,0.3);padding:9px 28px;border-radius:3px;box-shadow:0 4px 28px rgba(0,0,0,0.75);opacity:0;transition:opacity 0.38s ease,transform 0.38s ease;}
.loc-banner.show{opacity:1;transform:translateX(-50%) translateY(0);}
.lb-name{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;letter-spacing:5px;}
.lb-coords{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:2px;color:var(--blue);margin-top:3px;}

/* SEGMENT TIMER */
.seg-timer{position:fixed;top:60px;right:20px;z-index:300;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:1.5px;padding:5px 12px;border-radius:2px;pointer-events:none;opacity:0;transition:opacity 0.3s;}
.seg-timer.show{opacity:1;}
.seg-timer.wx{background:rgba(0,140,190,0.12);border:1px solid rgba(0,184,217,0.28);color:var(--blue2);}
.seg-timer.sp{background:rgba(180,148,50,0.12);border:1px solid rgba(200,168,75,0.28);color:var(--gold);}

/* BOTTOM */
.bottom{position:fixed;bottom:0;left:0;right:0;z-index:300;}
.b-fade{height:64px;background:linear-gradient(to top,rgba(5,6,14,1) 55%,transparent);pointer-events:none;}
.ticker-wrap{background:rgba(5,6,14,0.99);border-top:2px solid var(--red2);height:36px;display:flex;align-items:center;overflow:hidden;position:relative;}
.ticker-label{flex-shrink:0;background:var(--red2);color:#fff;font-family:'Oswald',sans-serif;font-size:11.5px;font-weight:700;letter-spacing:2px;padding:0 16px;height:100%;display:flex;align-items:center;clip-path:polygon(0 0,88% 0,100% 100%,0 100%);z-index:2;transition:background 0.4s;}
.ticker-label.wxm{background:var(--blue)!important;color:#000!important;}
.ticker-label.spm{background:var(--gold)!important;color:#000!important;}
.ticker-mask{flex:1;overflow:hidden;-webkit-mask-image:linear-gradient(to right,transparent,#000 25px,#000 calc(100% - 16px),transparent);}
.ticker-track{display:flex;white-space:nowrap;align-items:center;height:36px;animation:tick 60s linear infinite;}
@keyframes tick{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ti{display:inline-flex;align-items:center;gap:11px;padding-right:40px;font-family:'Space Mono',monospace;font-size:11px;}
.ti-t{color:var(--blue);font-weight:700;}
.ti-k{padding:1px 6px;border-radius:1px;font-size:8px;letter-spacing:1.5px;}
.ti-k.w{background:var(--red2);}.ti-k.m{background:#dd5500;}.ti-k.n{background:#009944;}.ti-k.x{background:var(--blue);color:#000;}.ti-k.s{background:var(--gold);color:#000;}
.ti-txt{color:rgba(255,255,255,0.8);}
.ti-sep{color:rgba(255,255,255,0.15);}
</style>
</head>
<body>

<div id="loading">
  <div class="l-logo">MPNEWS</div>
  <div class="l-sub">World Service · Live Global Broadcast</div>
  <div class="l-bar"><div class="l-fill" id="lFill"></div></div>
</div>

<div class="scanlines"></div>
<div id="canvas-wrap"></div>

<div class="top-chrome">
  <div class="tc-logo" id="tcLogo">MP<em>NEWS</em></div>

  <div class="tc-seg wx" id="segWxLabel">● WORLD WEATHER</div>
  <div class="tc-seg sp" id="segSpLabel">● SPORTS DESK</div>

</div>

<div id="anchorWrap">
  <canvas id="anchorCanvas" width="168" height="184"></canvas>
  <div class="anchor-nameplate"><strong>MR. PROPHECY</strong>ANCHOR · WORLD SERVICE</div>

    <div class="aeq"></div><div class="aeq"></div><div class="aeq"></div>
    <div class="aeq"></div><div class="aeq"></div>
  </div>
</div>

<button class="mute-btn" id="muteBtn" onclick="toggleMute()">⏸ MUTE</button>

<div class="news-card" id="newsCard">

    <span class="nc-tag world" id="ncTag">WORLD NEWS</span>
    <span class="nc-time" id="ncTime">—</span>

</div>

<div class="seg-panel" id="segPanel">

</div>

<div class="loc-banner" id="locBanner">
  <div class="lb-name" id="locName">—</div>
  <div class="lb-coords" id="locCoords">—</div>
</div>

<div class="seg-timer" id="segTimer"></div>

<div class="bottom">
  <div class="b-fade"></div>
  <div class="ticker-wrap">
    <div class="ticker-label" id="tickerLabel">LIVE</div>
    <div class="ticker-mask">
      <div class="ticker-track" id="tickerTrack">
        <div class="ti"><span class="ti-txt">Connecting to global correspondents — please stand by</span></div>
      </div>
    </div>
  </div>
</div>

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */

// ── GLOBALS ────────────────────────────────────

let allNews=[],wxNews=[],sportNews=[];

let currentSeg='news'; // 'news'|'wx'|'sport'
let segEnd=0;

let weatherAlerts=[];
let worldBoundaryLoaded=false;
let milLastFetch=0;
let activityBursts=[];
let adaptiveDetail=1;
let socialPosts=[];
let storyCursor=0;

const PROXY='https://api.allorigins.win/get?url=';
const DIRECT_TIMEOUT_MS=9000;
const SOCIAL_FEEDS=[

// ── FEEDS ──────────────────────────────────────
const FEEDS=[

const GEO_KEYS=Object.keys(GEO).sort((a,b)=>b.length-a.length);

function geoFromText(t){
  if(!t) return null;
  const low=t.toLowerCase();
  for(const k of GEO_KEYS){ if(low.includes(k)) return GEO[k]; }
  return null;
}

// ── UTILITIES ──────────────────────────────────
function ll2v(lat,lon,r=25){
  const ph=(90-lat)*(Math.PI/180),th=(lon+180)*(Math.PI/180);
  return new THREE.Vector3(r*Math.sin(ph)*Math.sin(th),r*Math.cos(ph),r*Math.sin(ph)*Math.cos(th));
}
function utcStr(){ const n=new Date(); return n.toISOString().slice(0,19).replace('T',' ')+' UTC'; }
function hm(){ const n=new Date(); return n.getUTCHours().toString().padStart(2,'0')+':'+n.getUTCMinutes().toString().padStart(2,'0')+' UTC'; }
function pad2(n){ return n.toString().padStart(2,'0'); }
function cleanText(v=''){
  return String(v).replace(/<!\[CDATA\[|\]\]>/g,'').replace(/<[^>]+>/g,' ').replace(/&\w+;/g,' ').replace(/\s+/g,' ').trim();
}
function speechText(v=''){
  return cleanText(v).replace(/\bUS\b/g,'U S').replace(/\bUK\b/g,'U K').replace(/\bEU\b/g,'E U').replace(/\s*[-|]\s*/g,'. ').replace(/\.\s*\./g,'.');
}
function updateSourceStatus(){
  document.getElementById('srcStatus').textContent=`SOURCES: ${sourceHealth.active}/${sourceHealth.total} LIVE`;
}
async function fetchFeedText(url){
  const proxyFetch=()=>fetch(PROXY+encodeURIComponent(url)).then(r=>r.json()).then(d=>d.contents||'');
  try{
    const ctl=new AbortController();
    const timer=setTimeout(()=>ctl.abort(),DIRECT_TIMEOUT_MS);
    const direct=await fetch(url,{signal:ctl.signal,mode:'cors'});
    clearTimeout(timer);
    if(direct.ok) return await direct.text();
    return await proxyFetch();
  }catch(_){
    return await proxyFetch();
  }
}
const MIL_FEEDS=()=>FEEDS.filter(f=>f.cat==='mil');

function makeStoryArc(startLat,startLon,endLat,endLon,color=0xff4444){
  const p0=ll2v(startLat,startLon,25.5);
  const p2=ll2v(endLat,endLon,25.5);
  const mid=p0.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(34);
  const curve=new THREE.QuadraticBezierCurve3(p0,mid,p2);
  const pts=curve.getPoints(48);
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity:0.9});
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat);
  line.userData={born:Date.now(),ttl:12000,mat};
  scene.add(line);
  activityBursts.push(line);
}

function makePulseAtGeo(geo,color=0xff8844){
  if(!geo) return;
  const pulse=new THREE.Mesh(
    new THREE.RingGeometry(0.14,0.22,22),
    new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.9,side:THREE.DoubleSide})
  );
  pulse.position.copy(ll2v(geo.lat,geo.lon,26.3));
  pulse.lookAt(new THREE.Vector3(0,0,0));
  pulse.userData={born:Date.now(),ttl:3000,mat:pulse.material};
  scene.add(pulse);
  activityBursts.push(pulse);
}

function reportActivity(item){
  if(!item?.geo) return;
  const col=item.cat==='mil'?0xff3a3a:item.cat==='nat'||item.cat==='wx'?0xffaa33:0x33ddff;
  const srcGeo=sourceFallbackGeo(item.src||'')||{lat:51.5,lon:-0.1};
  makeStoryArc(srcGeo.lat,srcGeo.lon,item.geo.lat,item.geo.lon,col);
  makePulseAtGeo(item.geo,col);
}
function sourceFallbackGeo(src=''){
  for(const [k,v] of Object.entries(SOURCE_GEO)){ if(src.includes(k)) return v; }
  return null;
}
function resolveGeo(item){
  return item?.geo || sourceFallbackGeo(item?.src||'') || null;
}
function isBreaking(item){
  const t=`${item?.title||''} ${item?.desc||''}`.toLowerCase();
  return /breaking|urgent|alert|strike|missile|invasion|evacuat|earthquake|tsunami|hurricane|cyclone|flood|wildfire|volcano/.test(t);
}
function storyScore(item){
  const t=`${item?.title||''} ${item?.desc||''}`.toLowerCase();
  let s=0;
  if(item.cat==='mil') s+=7;
  if(item.cat==='nat'||item.cat==='wx') s+=6;
  if(item.cat==='social') s+=2;
  if(isBreaking(item)) s+=12;
  if(/defense|military|airstrike|fleet|missile|nato|troop/.test(t)) s+=7;
  if(/earthquake|storm|hurricane|cyclone|flood|eruption|wildfire|tsunami/.test(t)) s+=8;
  return s;
}
function topStories(pool,count=40){
  return [...pool].sort((a,b)=>storyScore(b)-storyScore(a)).slice(0,Math.max(1,count));
}
async function fetchSocialFeeds(){
  const jobs=SOCIAL_FEEDS.map(async feed=>{
    try{
      const xmlText=await fetchFeedText(feed.url);
      const dom=new DOMParser().parseFromString(xmlText,'text/xml');
      return Array.from(dom.querySelectorAll('item,entry')).slice(0,7).map(item=>{
        const title=cleanText(item.querySelector('title')?.textContent||'');
        const desc=cleanText(item.querySelector('description,summary,content')?.textContent||'').slice(0,200);
        const pd=item.querySelector('pubDate,published,updated')?.textContent;
        const time=pd?new Date(pd).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'})+' UTC':hm();
        return {title,desc,time,src:feed.src,cat:'social',geo:geoFromText(title)||geoFromText(desc)||sourceFallbackGeo(feed.src)};
      }).filter(x=>x.title.length>8);
    }catch(_){ return []; }
  });
  socialPosts=(await Promise.all(jobs)).flat();
}

// ── VOICE ──────────────────────────────────────
function pickBritishVoice(){
  const vs=speechSynthesis.getVoices();
  let v=vs.find(v=>/en.GB/i.test(v.lang)&&/daniel|george|oliver|harry|malcolm/i.test(v.name));
  if(!v) v=vs.find(v=>/en.GB/i.test(v.lang));
  if(!v) v=vs.find(v=>/en/i.test(v.lang)&&/male/i.test(v.name));
  if(!v) v=vs.find(v=>/en/i.test(v.lang));
  if(!v && vs.length) v=vs[0];
  britishVoice=v||null;
}
if('speechSynthesis' in window){
  speechSynthesis.addEventListener('voiceschanged',pickBritishVoice);
  pickBritishVoice();
}

// ── NARRATION QUEUE ────────────────────────────
function enqueue(text,onDone){
  narrateQ.push({text,onDone});
  if(!narrating) drainQ();
}
function drainQ(){
  if(!narrateQ.length||muteOn){ narrating=false; return; }
  if(!('speechSynthesis' in window)){ narrating=false; return; }
  narrating=true;
  const {text,onDone}=narrateQ.shift();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.84; u.pitch=0.89; u.volume=0.96;
  if(britishVoice) u.voice=britishVoice;
  isTalking=true; setEq(true);
  u.onend=()=>{ isTalking=false; setEq(false); narrating=false; if(onDone) onDone(); drainQ(); };
  u.onerror=()=>{ isTalking=false; setEq(false); narrating=false; drainQ(); };
  speechSynthesis.speak(u);
}
function setEq(on){ document.querySelectorAll('.aeq').forEach(b=>b.classList.toggle('off',!on)); }
function clearQ(){ narrateQ=[]; if(narrating){ speechSynthesis.cancel(); narrating=false; isTalking=false; setEq(false); } }

window.toggleMute=function(){
  muteOn=!muteOn;
  document.getElementById('muteBtn').textContent=muteOn?'▶ UNMUTE':'⏸ MUTE';
  if(muteOn){ clearQ(); }
};

async function loadCountryBoundaries(){
  if(worldBoundaryLoaded) return;
  try{
    const geo=await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson').then(r=>r.json());
    const mat=new THREE.LineBasicMaterial({color:0x1f6f9f,transparent:true,opacity:0.32});
    const labelBudget=Math.floor(110*adaptiveDetail);
    let count=0;
    geo.features.slice(0,260).forEach(f=>{
      const coords=f?.geometry?.coordinates||[];
      const type=f?.geometry?.type||'';
      const groups=type==='MultiPolygon'?coords: type==='Polygon'?[coords]:[];
      groups.forEach(poly=>{
        poly.forEach(ring=>{
          const pts=ring.map(([lon,lat])=>ll2v(lat,lon,25.16));
          if(pts.length>2) scene.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),mat));
        });
      });
      if(count<labelBudget){
        const ring=groups?.[0]?.[0];
        if(ring && ring.length>5){
          const sample=ring[Math.floor(ring.length/2)];
          const name=f?.properties?.name||f?.properties?.NAME||f?.properties?.admin||'';
          if(name && sample){
            mkCountryLabel(name,sample[1],sample[0]);
            count++;
          }
        }
      }
    });
    worldBoundaryLoaded=true;
  }catch(_){}
}

  const kickHeavy=()=>{ setTimeout(()=>loadCountryBoundaries(),1200); setTimeout(()=>fetchFlights(),2200); };

    setTimeout(()=>kickHeavy(),2400);

  });
}

function buildSeaLanes(){
  const lanes=[
    [[1.29,103.85],[25.2,55.3]],[[35.7,139.7],[34.1,-118.3]],[[31.2,121.5],[34.1,-118.3]],
    [[51.5,-0.1],[40.7,-74.0]],[[25.8,-80.2],[-23.5,-46.6]],[[31.5,34.4],[43.0,34.0]]
  ];
  lanes.forEach(([a,b])=>{

    const mid=p0.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(30);

      new THREE.LineBasicMaterial({color:0x1d6f8c,transparent:true,opacity:0.35})

const IDLE_HOTSPOTS=Object.values(GEO).filter((v,i,a)=>a.findIndex(x=>x.name===v.name)===i);
let idleIdx=0,idleTimer=Date.now();

function initCamCtrl(){
  camCtrl={
    update(){
      if(camTarget){
        const t=Math.min((Date.now()-camMoveStart)/2200,1);
        camera.position.lerpVectors(camFrom,camTarget,1-Math.pow(1-t,4));
        camera.lookAt(0,8,0);
        if(t>=1) camTarget=null;
      } else {
        if(Date.now()-idleTimer>16000){
          idleIdx=(idleIdx+1)%IDLE_HOTSPOTS.length;
          this.flyTo(IDLE_HOTSPOTS[idleIdx]);
          idleTimer=Date.now();
        }
      }
    },
    flyTo(geo){
      const surf=ll2v(geo.lat,geo.lon,25);
      const tgt=surf.clone().normalize().multiplyScalar(54).add(new THREE.Vector3(10,20,12));
      camFrom=camera.position.clone();
      camTarget=tgt; camMoveStart=Date.now();
      showLocBanner(geo); idleTimer=Date.now();
    }
  };
}

function showLocBanner(geo){
  document.getElementById('locName').textContent=geo.name;
  document.getElementById('locCoords').textContent=geo.coords;
  const b=document.getElementById('locBanner'); b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),5000);
}

// ── ANIMATE ────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const t=Date.now()*0.001;
  camCtrl.update();
  globe.rotation.y=t*0.0052;
  clouds.rotation.y=t*0.0059;
  if(nightLights) nightLights.rotation.y=t*0.0052;
  if(starField){
    starField.rotation.y=t*0.0009;
    starField.material.opacity=0.72+Math.sin(t*0.9)*0.12;
  }
  if(starFieldFar){
    starFieldFar.rotation.y=-t*0.00045;
    starFieldFar.material.opacity=0.35+Math.sin(t*0.43)*0.08;
  }
  shipMeshes.forEach(s=>{
    s.userData.lon=(s.userData.lon+s.userData.spd*36)%360;
    s.position.copy(ll2v(s.userData.lat,s.userData.lon,25.62));
    s.lookAt(0,0,0);
  });
  satMeshes.forEach(s=>{
    s.userData.a+=s.userData.spd;
    const a=s.userData.a,r=s.userData.r,ti=s.userData.tilt;
    s.position.set(Math.cos(a)*r,Math.sin(a*0.6)*r*Math.sin(ti)+13,Math.sin(a)*r);
    s.lookAt(0,0,0);
  });
  carMeshes.forEach(c=>{
    c.userData.a+=c.userData.spd;
    const lat=c.userData.cLat+Math.sin(c.userData.a)*c.userData.radius*0.22;
    const lon=c.userData.cLon+Math.cos(c.userData.a)*c.userData.radius;
    c.position.copy(ll2v(lat,lon,25.5));
  });
  if(terrainRelief) terrainRelief.rotation.y=t*0.00525;
  activityBursts=activityBursts.filter(obj=>{
    const age=Date.now()-(obj.userData?.born||0);
    const ttl=obj.userData?.ttl||5000;
    const k=Math.max(0,1-age/ttl);
    if(obj.userData?.mat) obj.userData.mat.opacity=Math.min(0.95,k);
    if(obj.scale) obj.scale.multiplyScalar(1.005);
    if(age>ttl){ scene.remove(obj); return false; }
    return true;
  });
  renderer.render(scene,camera);
}

async function fetchFeeds(){
  if(Date.now()-lastFetch<65000) return;
  lastFetch=Date.now();
  sourceHealth.total=FEEDS.length;
  const jobs=FEEDS.map(async feed=>{
    try{
      const xmlText=await fetchFeedText(feed.url);
      const dom=new DOMParser().parseFromString(xmlText,'text/xml');
      const items=Array.from(dom.querySelectorAll('item,entry')).slice(0,12).map(item=>{
        const rawTitle=cleanText(item.querySelector('title')?.textContent||'');
        const rawDesc=cleanText(item.querySelector('description,summary,content')?.textContent||'');
        const pd=item.querySelector('pubDate,published,updated')?.textContent;
        const time=pd?new Date(pd).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'})+' UTC':hm();
        return {title:rawTitle,desc:rawDesc.substring(0,250)+(rawDesc.length>250?'…':''),time,src:feed.src,cat:feed.cat,geo:geoFromText(rawTitle)||geoFromText(rawDesc)||sourceFallbackGeo(feed.src)};
      }).filter(x=>x.title.length>10);
      return {ok:true,items};
    }catch(_){
      return {ok:false,items:[]};
    }
  });
  const settled=await Promise.all(jobs);
  sourceHealth.active=settled.filter(x=>x.ok).length;
  updateSourceStatus();
  await fetchSocialFeeds();
  const all=settled.flatMap(x=>x.items);
  const seen=new Set();
  const dedup=all.filter(x=>{ const k=x.title.slice(0,55); if(seen.has(k)) return false; seen.add(k); return true; });
  allNews=[...dedup.filter(x=>x.cat==='world'||x.cat==='mil'),...socialPosts];
  wxNews=dedup.filter(x=>x.cat==='nat'||x.cat==='wx');
  sportNews=dedup.filter(x=>x.cat==='sport');
  weatherAlerts=wxNews.slice(0,8);
  refreshDynamicLayers();
  buildTicker();
}

async function fetchMilitaryFeedsFast(){
  if(Date.now()-milLastFetch<25000) return;
  milLastFetch=Date.now();
  const jobs=MIL_FEEDS().map(async feed=>{
    try{
      const xmlText=await fetchFeedText(feed.url);
      const dom=new DOMParser().parseFromString(xmlText,'text/xml');
      const items=Array.from(dom.querySelectorAll('item,entry')).slice(0,8).map(item=>{
        const title=cleanText(item.querySelector('title')?.textContent||'');
        const desc=cleanText(item.querySelector('description,summary,content')?.textContent||'').slice(0,220);
        const pd=item.querySelector('pubDate,published,updated')?.textContent;
        const time=pd?new Date(pd).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'UTC'})+' UTC':hm();
        return {title,desc,time,src:feed.src,cat:'mil',geo:geoFromText(title)||geoFromText(desc)};
      }).filter(x=>x.title.length>12);
      return items;
    }catch(_){ return []; }
  });
  const fresh=(await Promise.all(jobs)).flat();
  if(!fresh.length) return;
  const merged=[...fresh,...allNews.filter(n=>n.cat==='world')];
  const seen=new Set();
  allNews=merged.filter(x=>{ const k=`${x.src}:${x.title.slice(0,70)}`; if(seen.has(k)) return false; seen.add(k); return true; }).slice(0,220);
  refreshDynamicLayers();
  buildTicker();
}

function refreshDynamicLayers(){
  const severe=weatherAlerts.filter(n=>/quake|storm|hurricane|cyclone|flood|eruption|wildfire/i.test(`${n.title} ${n.desc}`));
  severe.slice(0,10).forEach(n=>{
    if(!n.geo) return;
    const pulse=new THREE.Mesh(
      new THREE.SphereGeometry(0.18+Math.random()*0.22,10,10),
      new THREE.MeshBasicMaterial({color:0xffaa33,transparent:true,opacity:0.7})
    );
    pulse.position.copy(ll2v(n.geo.lat,n.geo.lon,26.1));
    scene.add(pulse);
    setTimeout(()=>scene.remove(pulse),120000);
  });
  allNews.filter(n=>n.cat==='mil' && n.geo).slice(0,8).forEach(n=>reportActivity(n));
}

// ── TICKER ─────────────────────────────────────
function buildTicker(){
  const pool=currentSeg==='sport'?sportNews:currentSeg==='wx'?wxNews:[...allNews,...wxNews,...sportNews];
  if(!pool.length) return;
  const doubled=[...pool,...pool];
  document.getElementById('tickerTrack').innerHTML=doubled.map(n=>{
    const cls=n.cat==='sport'?'s':n.cat==='wx'?'x':n.cat==='nat'?'n':n.cat==='mil'?'m':'w';
    const lbl=isBreaking(n)?'BREAKING':(n.cat==='sport'?'SPORT':n.cat==='wx'?'WEATHER':n.cat==='nat'?'NATURAL EVENT':n.cat==='mil'?'MILITARY':n.cat==='social'?'SOCIAL':'WORLD');
    return `<div class="ti"><span class="ti-t">${n.time}</span><span class="ti-k ${cls}">${lbl}</span><span class="ti-txt">${n.title}</span><span class="ti-sep"> ◆ </span></div>`;
  }).join('');
}

// ── SEGMENT SCHEDULING ─────────────────────────
// On the hour (:00) → 5 min weather. On :30 → 5 min sport.
function checkSchedule(){
  const n=new Date();
  const min=n.getUTCMinutes(), sec=n.getUTCSeconds();
  if(currentSeg==='news'){
    const urgent=allNews.find(i=>isBreaking(i) && (i.cat==='mil' || i.cat==='nat' || i.cat==='wx'));
    if(urgent && sec%20===0){
      const geo=resolveGeo(urgent); if(geo && camCtrl) camCtrl.flyTo(geo);
    }
  }
  if(sec<8){ // trigger window
    if(min===0 && currentSeg==='news') startWxSeg();
    if(min===30 && currentSeg==='news') startSpSeg();
  }
  if((currentSeg==='wx'||currentSeg==='sport') && Date.now()>segEnd) endSeg();
  updateSegUI();
}

function startWxSeg(){
  currentSeg='wx'; segEnd=Date.now()+5*60*1000;
  document.getElementById('tickerLabel').className='ticker-label wxm';
  document.getElementById('segWxLabel').classList.add('active');
  document.getElementById('segSpLabel').classList.remove('active');
  clearQ();
  showSegPanel('wx');
  buildTicker();
  enqueue("Good day. I'm Mister Prophecy. This is the MPNEWS World Weather Report. Here is a summary of significant meteorological and natural events around the globe.", ()=>{
    narrate_pool(wxNews,3,()=>{ enqueue("That concludes the weather report. I'm Mister Prophecy. You're watching MPNEWS World Service.", null); });
  });
}

function startSpSeg(){
  currentSeg='sport'; segEnd=Date.now()+5*60*1000;
  document.getElementById('tickerLabel').className='ticker-label spm';
  document.getElementById('segSpLabel').classList.add('active');
  document.getElementById('segWxLabel').classList.remove('active');
  clearQ();
  showSegPanel('sport');
  buildTicker();
  enqueue("Welcome to the Sports Desk on MPNEWS. I'm Mister Prophecy with the latest from the world of sport.", ()=>{
    narrate_pool(sportNews,4,()=>{ enqueue("That is the latest in sport. We now return to our main broadcast. I'm Mister Prophecy, MPNEWS World Service.", null); });
  });
}

function narrate_pool(pool,count,done){
  if(!pool.length){ if(done) done(); return; }
  let i=0;
  function next(){
    if(i>=Math.min(pool.length,count)){ if(done) done(); return; }
    const item=pool[i++];
    if(item.geo && camCtrl) camCtrl.flyTo(item.geo);
    reportActivity(item);
    showCard(item);
    enqueue(speechText(item.title)+'. '+speechText(item.desc), ()=>{ hideCard(); setTimeout(next,800); });
  }
  next();
}

function endSeg(){
  currentSeg='news';
  document.getElementById('tickerLabel').className='ticker-label';
  document.getElementById('segWxLabel').classList.remove('active');
  document.getElementById('segSpLabel').classList.remove('active');
  document.getElementById('segPanel').classList.remove('in','sport-mode');
  buildTicker();
  enqueue("We now return to our regular news coverage. You are watching MPNEWS World Service.", ()=>{ scheduleNextStory(); });
}

function updateSegUI(){
  const el=document.getElementById('segTimer');
  if(currentSeg!=='news'){
    const rem=Math.max(0,Math.ceil((segEnd-Date.now())/1000));
    const m=Math.floor(rem/60),s=rem%60;
    el.textContent=(currentSeg==='wx'?'WEATHER REPORT':'SPORTS DESK')+': '+pad2(m)+':'+pad2(s)+' remaining';
    el.className='seg-timer show '+(currentSeg==='wx'?'wx':'sp');
  } else {
    el.classList.remove('show');
  }
}

function showSegPanel(mode){
  const panel=document.getElementById('segPanel');
  const hdr=document.getElementById('segHdr');
  const body=document.getElementById('segBody');
  hdr.textContent=mode==='wx'?'WORLD WEATHER REPORT':'SPORTS DESK';
  hdr.className='sp-hdr '+(mode==='wx'?'wc':'sc');
  panel.className='seg-panel'+(mode==='sport'?' sport-mode':'');
  const pool=mode==='wx'?wxNews:sportNews;
  const icon=mode==='wx'?'🌍':'⚽';
  body.innerHTML=pool.slice(0,6).map(n=>`
    <div class="sp-row">
      <div class="sp-icon">${icon}</div>
      <div><div class="sp-t">${n.title}</div><div class="sp-d">${n.desc.substring(0,140)}</div></div>
    </div>`).join('')||(mode==='wx'?
    '<div class="sp-row"><div class="sp-icon">🌐</div><div><div class="sp-t">Meteorological feeds loading</div><div class="sp-d">Connecting to GDACS, USGS and Met Office data streams.</div></div></div>':
    '<div class="sp-row"><div class="sp-icon">📡</div><div><div class="sp-t">Sports feeds loading</div><div class="sp-d">Connecting to global correspondents.</div></div></div>');
  panel.classList.add('in');
}

// ── NEWS NARRATION ─────────────────────────────
function showCard(item){
  const tagMap={world:'world',mil:'mil',nat:'nat',wx:'wx',sport:'sport',social:'world'};
  const lblMap={world:'WORLD NEWS',mil:'MILITARY',nat:'NATURAL EVENT',wx:'WEATHER',sport:'SPORT',social:'SOCIAL DESK'};
  document.getElementById('ncTag').textContent=isBreaking(item)?'BREAKING':(lblMap[item.cat]||'NEWS');
  document.getElementById('ncTag').className='nc-tag '+(isBreaking(item)?'break':(tagMap[item.cat]||'world'));
  document.getElementById('ncTime').textContent=item.time;
  document.getElementById('ncSrc').textContent=item.cat==='social' ? `SOCIAL • ${item.src}` : item.src;
  document.getElementById('ncHl').textContent=item.title;
  document.getElementById('ncBody').textContent=item.desc;
  document.getElementById('newsCard').classList.add('in');
}
function hideCard(){ document.getElementById('newsCard').classList.remove('in'); }

let cycleTimer=null;
function scheduleNextStory(){
  clearTimeout(cycleTimer);
  if(currentSeg!=='news') return;
  if(!allNews.length){ cycleTimer=setTimeout(scheduleNextStory,6000); return; }
  const ranked=topStories(allNews,60);
  const urgent=ranked.find(i=>isBreaking(i) && (i.cat==='mil' || i.cat==='nat' || i.cat==='wx'));
  const item=urgent || ranked[storyCursor%ranked.length];
  if(!urgent) storyCursor++;
  const geo=resolveGeo(item);
  if(geo && camCtrl) camCtrl.flyTo(geo);
  item.geo=geo||item.geo;
  reportActivity(item);
  showCard(item);
  const txt=newsIdx===1
    ? `Good day. You are watching MPNEWS World Service. I am Mister Prophecy. Here is our lead story. ${speechText(item.title)}. ${speechText(item.desc)}`
    : item.cat==='mil'
      ? `Developing military brief. ${speechText(item.title)}. ${speechText(item.desc)}`
      : `From the global desk. ${speechText(item.title)}. ${speechText(item.desc)}`;
  enqueue(txt,()=>{ hideCard(); cycleTimer=setTimeout(scheduleNextStory,2200); });
}

// ── ANCHOR 3D ──────────────────────────────────
function initAnchor(){
  const cv=document.getElementById('anchorCanvas');
  aRenderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  aRenderer.setSize(168,184); aRenderer.setClearColor(0x000000,0);
  aScene=new THREE.Scene();
  aCamera=new THREE.PerspectiveCamera(46,168/184,0.1,100);
  aCamera.position.set(0,0.55,5.0);

  aScene.add(new THREE.AmbientLight(0x6677aa,1.25));
  const k=new THREE.DirectionalLight(0xfff4ec,1.9); k.position.set(3,7,6); aScene.add(k);
  const b=new THREE.DirectionalLight(0x2255cc,0.45); b.position.set(-3,1,4); aScene.add(b);

  // Head
  aHead=new THREE.Mesh(new THREE.SphereGeometry(1,40,40),new THREE.MeshPhongMaterial({color:0xffcfa0,shininess:18}));

  // Hair – dark brown
  const hairM=new THREE.MeshPhongMaterial({color:0xb28b47,emissive:0x2a1f0f,emissiveIntensity:0.22,shininess:34});
  aHairTop=new THREE.Mesh(new THREE.SphereGeometry(1.13,32,32),hairM);
  aHairTop.scale.set(1,0.54,1); aHairTop.position.y=0.68; aHead.add(aHairTop);
  // Side hair
  aHairL=new THREE.Mesh(new THREE.SphereGeometry(0.38,16,16),hairM);
  aHairR=new THREE.Mesh(new THREE.SphereGeometry(0.38,16,16),hairM);
  aHairL.scale.set(0.5,0.68,0.5); aHairR.scale.set(0.5,0.68,0.5);
  aHairL.position.set(-0.82,0.28,-0.1); aHairR.position.set(0.82,0.28,-0.1);
  aHead.add(aHairL); aHead.add(aHairR);

  // Ears
  [-1,1].forEach(s=>{
    const e=new THREE.Mesh(new THREE.SphereGeometry(0.19,14,14),new THREE.MeshPhongMaterial({color:0xffbf8a}));
    e.position.set(s*0.97,0.05,0.12); e.scale.z=0.48; aHead.add(e);
  });

  // Eyebrows
  aBrowL=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.05,0.07),new THREE.MeshPhongMaterial({color:0x280e00}));
  aBrowR=new THREE.Mesh(new THREE.BoxGeometry(0.26,0.05,0.07),new THREE.MeshPhongMaterial({color:0x280e00}));
  aBrowL.position.set(-0.34,0.6,0.97); aBrowR.position.set(0.34,0.6,0.97);
  aBrowL.rotation.z=0.1; aBrowR.rotation.z=-0.1;
  aHead.add(aBrowL); aHead.add(aBrowR);

  // Eyes
  const eG=new THREE.SphereGeometry(0.148,20,20), eM=new THREE.MeshPhongMaterial({color:0x080c18});
  aLEye=new THREE.Mesh(eG,eM); aREye=new THREE.Mesh(eG,eM);
  aLEye.position.set(-0.34,0.36,0.97); aREye.position.set(0.34,0.36,0.97);
  [aLEye,aREye].forEach(e=>{ const h=new THREE.Mesh(new THREE.SphereGeometry(0.065,10,10),new THREE.MeshPhongMaterial({color:0x4466aa,emissive:0x112244,emissiveIntensity:0.5})); h.position.set(0.03,0.03,0.11); e.add(h); });
  aHead.add(aLEye); aHead.add(aREye);

  // Eyelids
  aLidL=new THREE.Mesh(new THREE.SphereGeometry(0.165,14,10),new THREE.MeshPhongMaterial({color:0xffc59b}));
  aLidR=new THREE.Mesh(new THREE.SphereGeometry(0.165,14,10),new THREE.MeshPhongMaterial({color:0xffc59b}));
  aLidL.scale.set(1.05,0.42,0.7); aLidR.scale.set(1.05,0.42,0.7);
  aLidL.position.set(-0.34,0.43,0.97); aLidR.position.set(0.34,0.43,0.97);
  aHead.add(aLidL); aHead.add(aLidR);

  // Nose
  const ns=new THREE.Mesh(new THREE.SphereGeometry(0.105,16,16),new THREE.MeshPhongMaterial({color:0xf0aa80}));
  ns.scale.set(0.9,0.75,0.48); ns.position.set(0,0.08,1.02); aHead.add(ns);
  const nsBridge=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.24,0.06),new THREE.MeshPhongMaterial({color:0xf4b48c}));
  nsBridge.position.set(0,0.2,0.92); aHead.add(nsBridge);

  // Cheek definition
  const cheekL=new THREE.Mesh(new THREE.SphereGeometry(0.11,12,12),new THREE.MeshPhongMaterial({color:0xf0b18a}));
  const cheekR=cheekL.clone();
  cheekL.position.set(-0.43,-0.04,0.9); cheekR.position.set(0.43,-0.04,0.9);
  aHead.add(cheekL); aHead.add(cheekR);

  // Lips
  const lipM=new THREE.MeshPhongMaterial({color:0xbb6644});
  const topL=new THREE.Mesh(new THREE.SphereGeometry(0.2,18,10),lipM);
  topL.scale.set(1.4,0.38,0.45); topL.position.set(0,-0.4,1.0); aHead.add(topL);
  aMouth=new THREE.Mesh(new THREE.SphereGeometry(0.19,18,10),lipM);
  aMouth.scale.set(1.5,0.28,0.45); aMouth.position.set(0,-0.49,0.98); aHead.add(aMouth);

  aJaw=new THREE.Mesh(new THREE.SphereGeometry(0.58,18,10),new THREE.MeshPhongMaterial({color:0xffbf88}));

  beardShadow.scale.set(1.04,0.52,0.68); beardShadow.position.set(0,-0.75,0.46); aHead.add(beardShadow);

  // Neck
  const nk=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.41,0.78,18),new THREE.MeshPhongMaterial({color:0xffca98}));
  nk.position.set(0,-1.42,0); aScene.add(nk);

  // Suit
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.92,1.02,1.9,24),new THREE.MeshPhongMaterial({color:0x14202e,shininess:4}));
  body.position.set(0,-2.45,0); aScene.add(body);

  // Shirt
  const sht=new THREE.Mesh(new THREE.PlaneGeometry(0.46,1.05),new THREE.MeshPhongMaterial({color:0xf0f0ee,side:THREE.DoubleSide}));
  sht.position.set(0,-2.2,0.74); aScene.add(sht);

  // Tie – dark red (professional)
  const te=new THREE.Mesh(new THREE.PlaneGeometry(0.16,0.88),new THREE.MeshPhongMaterial({color:0x7a0000,shininess:35,side:THREE.DoubleSide}));
  te.position.set(0,-2.2,0.75); aScene.add(te);

  // Shoulders
  [-1,1].forEach(s=>{
    const sh=new THREE.Mesh(new THREE.SphereGeometry(0.56,16,12),new THREE.MeshPhongMaterial({color:0x14202e}));
    sh.position.set(s*1.08,-1.88,0); sh.scale.set(1,0.65,0.82); aScene.add(sh);
  });

  // Collar
  const col=new THREE.Mesh(new THREE.TorusGeometry(0.36,0.065,10,22),new THREE.MeshPhongMaterial({color:0xf0f0ee}));
  col.position.set(0,-1.74,0.26); col.rotation.x=Math.PI/2.6; aScene.add(col);

  (function loop(){
    requestAnimationFrame(loop);
    const t=Date.now();
    if(isTalking){
      aMouth.scale.y=0.25+Math.sin(t*0.034)*1.1+Math.sin(t*0.021)*0.4;
      aHead.rotation.y=Math.sin(t*0.006)*0.04;
      aHead.rotation.x=-0.025+Math.sin(t*0.0045)*0.022;
      aHead.position.y=Math.sin(t*0.004)*0.03;
      aLEye.rotation.y=Math.sin(t*0.003)*0.06;
      aREye.rotation.y=Math.sin(t*0.003)*0.06;
      aLidL.scale.y=0.38+Math.sin(t*0.018)*0.05;
      aLidR.scale.y=0.38+Math.sin(t*0.018+0.5)*0.05;
      aBrowL.position.y=0.61+Math.sin(t*0.012)*0.02;
      aBrowR.position.y=0.61+Math.sin(t*0.012+0.4)*0.02;
      aJaw.position.y=-0.88+Math.sin(t*0.03)*0.03;
      aHairTop.rotation.z=Math.sin(t*0.0027)*0.02;
      aHairL.rotation.z=Math.sin(t*0.0031)*0.03;
      aHairR.rotation.z=-Math.sin(t*0.0031)*0.03;
    } else {
      aMouth.scale.y+=(0.28-aMouth.scale.y)*0.13;
      aHead.rotation.y*=0.93; aHead.rotation.x*=0.93;
      aHead.position.y*=0.92;
      aLEye.rotation.y*=0.9; aREye.rotation.y*=0.9;
      aLidL.scale.y+=(0.42-aLidL.scale.y)*0.14;
      aLidR.scale.y+=(0.42-aLidR.scale.y)*0.14;
      aBrowL.position.y+=(0.6-aBrowL.position.y)*0.1;
      aBrowR.position.y+=(0.6-aBrowR.position.y)*0.1;
      aJaw.position.y+=(-0.88-aJaw.position.y)*0.12;
      aHairTop.rotation.z*=0.92;
      aHairL.rotation.z*=0.9;
      aHairR.rotation.z*=0.9;
    }
    if(Math.random()<0.007){ aLEye.scale.y=0.06; aREye.scale.y=0.06; setTimeout(()=>{ aLEye.scale.y=1; aREye.scale.y=1; },82); }
    aRenderer.render(aScene,aCamera);
  })();
}

// ── FLIGHT DATA ────────────────────────────────
async function fetchFlights(){
  try{
    const data=await fetch('https://opensky-network.org/api/states/all').then(r=>r.json());
    const states=(data.states||[]).filter(s=>s[5]&&s[6]).slice(0,100);
    flightMeshes.forEach(m=>scene.remove(m)); flightMeshes=[];
    states.forEach(s=>{
      const g=new THREE.Group();
      const c=new THREE.Mesh(new THREE.ConeGeometry(0.18,2.4,5),new THREE.MeshPhongMaterial({color:0x00ccee,shininess:40,emissive:0x003344,emissiveIntensity:0.4}));
      c.rotation.x=Math.PI/2; g.add(c);
      g.position.copy(ll2v(s[6],s[5],25.65+(s[13]||0)/120000));
      g.lookAt(0,0,0); scene.add(g); flightMeshes.push(g);
    });
  }catch(e){}
}

  initGlobe(); initAnchor(); animate(); startClock();

  pickBritishVoice();
  if('speechSynthesis' in window) speechSynthesis.addEventListener('voiceschanged',pickBritishVoice);
  await fetchFeeds();
  await fetchMilitaryFeedsFast();
  setInterval(fetchFeeds,68000);
  setInterval(fetchMilitaryFeedsFast,25000);
  setInterval(fetchFlights,20000);
  // Opening ident
  setTimeout(()=>{
    enqueue("M P NEWS. World Service. Broadcasting live.",()=>{
      setTimeout(()=>{ scheduleNextStory(); },1000);
    });
  },1400);
})();
